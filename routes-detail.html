<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <title>OLVEND | Detail trasy</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b0b0d;
      --panel: rgba(18,19,24,0.94);
      --panel-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f6;
      --muted: #a5a8b2;
      --soft: #7d818c;
      --accent: #d5101a;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(213,16,26,0.12), transparent 24%),
        linear-gradient(135deg, #09090b, #101116, #0b0b0e);
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .main {
      min-width: 0;
      padding: 24px;
    }

    .page-shell {
      display: grid;
      gap: 18px;
      width: min(100%, 1480px);
      margin: 0 auto;
    }

    .mobile-nav-shell {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
    }

    .btn.danger {
      background: rgba(255,91,102,0.18);
      border: 1px solid rgba(255,91,102,0.24);
      color: #ffc5ca;
    }

    .status-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .status-line.success { color: #9be7b8; }
    .status-line.warning { color: #ffd68f; }
    .status-line.error { color: #ffb0b6; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.1;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .panel-body {
      padding: 12px;
    }

    .route-detail-panel {
      border-radius: 22px;
    }

    .route-detail-header {
      align-items: center;
      background:
        linear-gradient(90deg, rgba(213,16,26,0.08), transparent 36%),
        rgba(255,255,255,0.02);
    }

    .route-title-block {
      min-width: 0;
    }

    .route-title-block h2 {
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    .route-title-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .route-header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .route-excel {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: rgba(255,255,255,0.02);
    }

    .route-excel table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: auto;
    }

    .route-excel th,
    .route-excel td {
      padding: 7px 9px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
      line-height: 1.25;
    }

    .route-excel th:last-child,
    .route-excel td:last-child {
      border-right: 0;
    }

    .route-excel tr:last-child th,
    .route-excel tr:last-child td {
      border-bottom: 0;
    }

    .route-excel th {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(236,241,248,0.72);
      white-space: nowrap;
    }

    .route-excel td {
      color: var(--text);
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .route-excel .numeric {
      text-align: right;
      white-space: nowrap;
    }

    .route-excel .strong-number {
      font-size: 15px;
      font-weight: 900;
    }

    .route-excel .muted-cell {
      color: var(--muted);
      font-weight: 700;
    }

    .route-excel .diff-positive {
      color: #9be7b8;
    }

    .route-excel .diff-negative {
      color: #ffb0b6;
    }

    .route-map-strip {
      display: flex;
      align-items: stretch;
      gap: 10px;
      margin-top: 10px;
    }

    .route-map-toolbar {
      width: 190px;
      flex: 0 0 190px;
      display: grid;
      align-content: start;
      gap: 4px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .route-map-toolbar strong {
      font-size: 14px;
    }

    .route-map-toolbar span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .route-badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .route-badge.live { color: #baf3cf; border-color: rgba(46,204,113,0.24); background: rgba(46,204,113,0.12); }
    .route-badge.saved { color: #baf3cf; border-color: rgba(46,204,113,0.24); background: rgba(46,204,113,0.12); }
    .route-badge.window { color: #bbd8ff; border-color: rgba(88,166,255,0.24); background: rgba(88,166,255,0.12); }
    .route-badge.heuristic { color: #ffe1aa; border-color: rgba(255,182,72,0.24); background: rgba(255,182,72,0.12); }
    .route-badge.critical { color: #ffc5ca; border-color: rgba(255,91,102,0.24); background: rgba(255,91,102,0.12); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .mini-stat {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-stat-label {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .mini-stat-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .cash-report-list {
      display: grid;
      gap: 10px;
    }

    .cash-report-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.35fr) minmax(130px, 0.75fr) minmax(130px, 0.75fr) minmax(140px, 0.8fr) minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border-radius: 16px;
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .cash-report-title {
      display: grid;
      gap: 4px;
      align-self: center;
      min-width: 0;
    }

    .cash-report-title strong {
      font-size: 15px;
      line-height: 1.25;
    }

    .cash-report-title span,
    .cash-report-field small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .cash-report-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .cash-report-field label {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cash-report-field input,
    .cash-report-field select {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 9px 11px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
    }

    .cash-report-field input::placeholder {
      color: var(--soft);
    }

    .cash-report-field select option {
      background: #12151d;
      color: #fff;
    }

    .cash-report-diff {
      font-weight: 800;
      color: var(--muted);
    }

    .cash-report-diff.positive { color: #9be7b8; }
    .cash-report-diff.negative { color: #ffb0b6; }

    .map-shell {
      height: 360px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      margin-top: 18px;
    }

    .route-map-strip .map-shell {
      flex: 1;
      height: 190px;
      min-height: 190px;
      margin-top: 0;
      border-radius: 10px;
    }

    .route-excel input,
    .route-excel select {
      width: 100%;
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.7);
      color: var(--text);
      padding: 6px 8px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
    }

    .route-excel .btn {
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    #routeMap { width: 100%; height: 100%; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #12151d; color: #fff; }
    .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.5; }

    .number-pin {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #d5101a;
      border: 2px solid rgba(255,255,255,0.8);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(213,16,26,0.35);
    }

    .section-stack {
      display: grid;
      gap: 18px;
    }

    .stop-list {
      display: grid;
      gap: 12px;
    }

    .stop-card {
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 14px;
    }

    .stop-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .subtext {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .timeline-item strong {
      font-size: 14px;
    }

    .timeline-item span {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed rgba(255,255,255,0.14);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside.sidebar {
        display: none;
      }

      .mobile-nav-shell {
        display: block;
      }

      .main {
        padding: 16px;
      }

      .topbar {
        flex-direction: column;
      }

      .title h1 {
        font-size: 30px;
      }

      .timeline-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .timeline-item span {
        text-align: left;
      }

      .route-map-strip {
        flex-direction: column;
      }

      .route-map-toolbar {
        width: 100%;
        flex-basis: auto;
      }

      .route-map-strip .map-shell {
        height: 240px;
      }

      .cash-report-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .route-detail-header,
      .route-header-actions,
      .route-map-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .route-header-actions .btn,
      .route-map-toolbar .btn {
        width: 100%;
      }

      .route-excel table {
        min-width: 860px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="mobile-nav-shell" id="mobileNavShell"></div>
      <div class="page-shell">
        <header class="topbar">
          <div class="title">
            <h1>Detail trasy</h1>
            <p>Jedna trasa, všechny důležité informace na jednom místě. Zpět se vracíš na hlavní přehled tras.</p>
          </div>
          <div class="actions">
            <a class="btn secondary" href="routes.html">Zpět na Trasy</a>
          </div>
        </header>

        <div class="status-line" id="statusLine">Načítám detail trasy…</div>

        <div class="section-stack" id="detailShell">
          <section class="panel">
            <div class="panel-body">
              <div class="empty-state">Načítám trasu…</div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./sidebar.js?v=20260712lightfix2"></script>
  <script type="module">
    import { supabase } from './supabase.js'

    const LOCAL_STORAGE_KEY = 'olvendRoutePilotPlans'
    const statusLine = document.getElementById('statusLine')
    const detailShell = document.getElementById('detailShell')
    const routeId = new URLSearchParams(window.location.search).get('id')

    const state = {
      plan: null,
      employees: [],
      vehicles: [],
      warehouses: [],
      cashReports: [],
      mobileVisits: [],
      routeVehicleLog: null,
      map: null,
      mapLayer: null,
    }

    function setStatus(message, tone = '') {
      statusLine.hidden = false
      statusLine.textContent = message
      statusLine.className = `status-line${tone ? ` ${tone}` : ''}`
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    }

    function formatNumber(value, digits = 0) {
      const number = Number(value ?? 0)
      if (Number.isNaN(number)) return '0'
      return number.toLocaleString('cs-CZ', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      })
    }

    function formatDateLabel(dateString) {
      if (!dateString) return 'Bez data'
      const date = new Date(`${dateString}T12:00:00`)
      if (Number.isNaN(date.getTime())) return dateString
      return date.toLocaleDateString('cs-CZ')
    }

    function formatDateTime(value) {
      if (!value) return '—'
      return new Date(value).toLocaleString('cs-CZ', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      })
    }

    function formatMoney(value) {
      return new Intl.NumberFormat('cs-CZ', {
        style: 'currency',
        currency: 'CZK',
        maximumFractionDigits: 0,
      }).format(Number(value || 0))
    }

    function formatKm(value, digits = 0) {
      if (value == null || value === '' || Number.isNaN(Number(value))) return '—'
      return `${formatNumber(Number(value), digits)} km`
    }

    function getMileageSummary(plan) {
      const log = state.routeVehicleLog || null
      const startKm = log?.start_odometer_km != null ? Number(log.start_odometer_km) : null
      const realEndKm = log?.end_odometer_km != null ? Number(log.end_odometer_km) : null
      const expectedDistance = Number(plan?.estimatedDistanceKm || 0)
      const expectedEndKm = startKm != null && Number.isFinite(expectedDistance)
        ? Math.round(startKm + expectedDistance)
        : null
      const realDistanceKm = log?.distance_km != null
        ? Number(log.distance_km)
        : startKm != null && realEndKm != null
          ? realEndKm - startKm
          : null
      const diffKm = expectedEndKm != null && realEndKm != null ? realEndKm - expectedEndKm : null

      return {
        startKm,
        expectedEndKm,
        realEndKm,
        expectedDistance,
        realDistanceKm,
        diffKm,
        status: log?.status || null,
      }
    }

    function formatMileageDiff(value) {
      if (value == null || Number.isNaN(Number(value))) return 'Čeká na ukončení'
      const number = Number(value)
      if (number === 0) return '0 km'
      return `${number > 0 ? '+' : ''}${formatKm(number)}`
    }

    function getDiffClass(value) {
      const number = Number(value || 0)
      if (number > 0) return 'diff-negative'
      if (number < 0) return 'diff-positive'
      return ''
    }

    function getCashReport(machineId) {
      return state.cashReports.find((report) => String(report.machine_id) === String(machineId)) || null
    }

    function getMobileVisitForMachine(machineId) {
      return state.mobileVisits.find((visit) => String(visit.machine_id) === String(machineId)) || null
    }

    function getVisitCashReport(visit) {
      if (!visit) return null
      const nested = visit.route_machine_cash_reports
      if (Array.isArray(nested)) return nested[0] || null
      return nested || null
    }

    function getMobileVisitStatusLabel(visit) {
      const status = String(visit?.status || '').toLowerCase()
      const map = {
        draft: 'Rozpracováno',
        arrived: 'Na místě',
        completed: 'Hotovo',
        skipped: 'Přeskočeno',
        sync_error: 'Chyba sync',
      }
      return visit ? (map[status] || status || 'Zapsáno') : 'Čeká na mobil'
    }

    function getMobileCashStatusLabel(visit, cashReport) {
      if (!visit) return 'Čeká na mobil'
      if (!cashReport) return 'Bez zápisu hotovosti'
      return cashReport.operator_collected_confirmed ? 'Vybráno v mobilu' : 'Nevybráno v mobilu'
    }

    function getCashRuleNote(expectedCash, cashReport) {
      const cash = Number(expectedCash || 0)
      if (cash <= 100) return 'Pravidlo: do 100 Kč nevybírat'
      if (!cashReport) return 'Nad 100 Kč čekáme výběr nebo důvod'
      return cashReport.operator_collected_confirmed
        ? 'Výběr potvrzený v mobilu'
        : 'Nad 100 Kč nevybráno - zkontrolovat důvod'
    }

    function renderCashReportSection(plan) {
      const breakdown = Array.isArray(plan?.telemetryRevenue?.machineBreakdown)
        ? plan.telemetryRevenue.machineBreakdown
        : []

      return `
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Svoz hotovosti</h2>
              <p>Kontrola z mobilní aplikace. Operátorka potvrzuje výběr a sáček v mobilu, desktop tady jen vyhodnocuje.</p>
            </div>
          </div>
          <div class="panel-body">
            ${breakdown.length ? `
              <div class="route-excel">
                <table>
                  <thead>
                    <tr>
                      <th>Automat</th>
                      <th>Lokalita</th>
                      <th>Návštěva v mobilu</th>
                      <th>Svoz v mobilu</th>
                      <th class="numeric">Oček. hotovost</th>
                      <th class="numeric">Kartou</th>
                      <th>Sáček</th>
                      <th class="numeric">Reálně dovezeno</th>
                      <th>Rozdíl</th>
                      <th>Poznámka</th>
                      <th>Akce</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${breakdown.map((row) => {
                      const legacyReport = getCashReport(row.machineId)
                      const visit = getMobileVisitForMachine(row.machineId)
                      const mobileCash = getVisitCashReport(visit)
                      const expectedCash = Number(mobileCash?.expected_cash_czk ?? row.expectedCashCzk ?? legacyReport?.expected_cash_czk ?? 0)
                      const expectedCard = Number(mobileCash?.expected_card_czk ?? row.expectedCardCzk ?? legacyReport?.expected_card_czk ?? 0)
                      const countedCash = mobileCash?.supervisor_counted_cash_czk ?? legacyReport?.actual_cash_czk ?? null
                      const diff = mobileCash?.difference_cash_czk ?? legacyReport?.difference_cash_czk ?? null
                      const diffText = diff != null
                        ? `${Number(diff) > 0 ? '+' : ''}${formatMoney(diff)}`
                        : mobileCash?.operator_collected_confirmed === false
                          ? 'Nesvezeno'
                          : 'Čeká'
                      const cashRuleNote = getCashRuleNote(expectedCash, mobileCash)
                      return `
                        <tr>
                          <td><strong>${escapeHtml(row.machineName || `Stroj ${row.machineId}`)}</strong></td>
                          <td class="muted-cell">${escapeHtml(row.locationName || 'Bez lokality')}</td>
                          <td>${escapeHtml(getMobileVisitStatusLabel(visit))}</td>
                          <td>${escapeHtml(getMobileCashStatusLabel(visit, mobileCash))}</td>
                          <td class="numeric strong-number">${escapeHtml(formatMoney(expectedCash))}</td>
                          <td class="numeric">${escapeHtml(formatMoney(expectedCard))}</td>
                          <td>${escapeHtml(mobileCash?.operator_bag_label || '—')}</td>
                          <td>${visit ? `<input data-supervisor-cash="${escapeHtml(visit.id)}" type="number" step="1" min="0" value="${escapeHtml(countedCash ?? '')}" placeholder="${mobileCash?.operator_collected_confirmed ? escapeHtml(String(Math.round(expectedCash))) : '0'}" />` : '—'}</td>
                          <td class="${escapeHtml(getDiffClass(diff))}">${escapeHtml(diffText)}</td>
                          <td>
                            <div class="muted-cell">${escapeHtml(cashRuleNote)}</div>
                            ${visit ? `<input data-supervisor-note="${escapeHtml(visit.id)}" type="text" value="${escapeHtml(mobileCash?.note || legacyReport?.note || '')}" placeholder="např. chybí 50 Kč" />` : escapeHtml('Čeká na mobilní zápis.')}
                          </td>
                          <td>${visit ? `<button class="btn secondary" type="button" data-save-supervisor-cash="${escapeHtml(visit.id)}" data-cash-report-id="${escapeHtml(mobileCash?.id || '')}" data-machine-id="${escapeHtml(row.machineId)}" data-expected-cash="${escapeHtml(expectedCash)}" data-expected-card="${escapeHtml(expectedCard)}">Uložit přepočet</button>` : '—'}</td>
                        </tr>
                      `
                    }).join('')}
                  </tbody>
                </table>
              </div>
            ` : '<div class="empty-state">Pro tuhle trasu zatím nemám online tržby ze strojů. Jakmile bude v trase stroj s telemetrií, objeví se tady očekávaná hotovost a karta.</div>'}
          </div>
        </section>

    function getExecutionStatusMeta(status) {
      const normalized = String(status || 'draft').toLowerCase()
      const map = {
        draft: { label: 'Vytvořeno', cls: 'heuristic' },
        assigned: { label: 'Přiřazeno', cls: 'window' },
        in_progress: { label: 'V terénu', cls: 'live' },
        done: { label: 'Hotovo', cls: 'saved' },
        cancelled: { label: 'Zrušeno', cls: 'critical' },
      }
      return map[normalized] || map.draft
    }

    function getPlanKey(plan) {
      return String(plan?.id || plan?.local_saved_at || plan?.title || '')
    }

    function getSavedPlanEmployeeLabel(plan) {
      const payloadName = plan?.route_payload?.planned_employee_name
      if (payloadName && payloadName !== 'Bez výběru') return payloadName
      const employeeId = plan?.planned_employee_id
      if (!employeeId) return 'Bez zaměstnance'
      const employee = state.employees.find((item) => String(item.id) === String(employeeId))
      return employee ? ([employee.name, employee.surname].filter(Boolean).join(' ') || employee.email || 'Bez zaměstnance') : 'Bez zaměstnance'
    }

    function getWarehouseLabel(plan) {
      if (plan?.warehouse_id) {
        const warehouse = state.warehouses.find((item) => String(item.id) === String(plan.warehouse_id))
        if (warehouse?.name) return warehouse.name
      }
      return plan?.route_payload?.startPoint?.label || 'Bez skladu'
    }

    function buildPlan(plan) {
      const payload = plan.route_payload || {}
      const payloadStops = Array.isArray(payload.orderedStops) ? payload.orderedStops : []
      const dbStops = Array.isArray(plan.route_plan_stops) ? plan.route_plan_stops : []

      const orderedStops = (dbStops.length ? dbStops : payloadStops)
        .slice()
        .sort((a, b) => Number(a.stop_order || 0) - Number(b.stop_order || 0))
        .map((stop, index) => ({
          ...stop,
          id: stop.id || `${getPlanKey(plan)}-${index}`,
          title: stop.title || stop.name || `Zastávka ${index + 1}`,
          name: stop.name || stop.title || `Zastávka ${index + 1}`,
          address: stop.address || stop.address_snapshot || '',
          city: stop.city || stop.city_snapshot || '',
          latitude: stop.latitude != null ? Number(stop.latitude) : null,
          longitude: stop.longitude != null ? Number(stop.longitude) : null,
          estimatedServiceMinutes: Number(stop.estimatedServiceMinutes ?? stop.estimated_service_minutes ?? 0),
        }))

      return {
        ...plan,
        ...payload,
        orderedStops,
        title: plan.title || payload.title || `Trasa ${formatDateLabel(plan.planning_date)}`,
        vehicle_label: plan.vehicle_id
          ? state.vehicles.find((item) => String(item.id) === String(plan.vehicle_id))?.vehicle_label || 'Bez vozidla'
          : 'Bez vozidla',
        planned_employee_name: getSavedPlanEmployeeLabel(plan),
        estimatedDistanceKm: Number(plan.estimated_distance_km ?? payload.estimatedDistanceKm ?? 0),
        estimatedDriveMinutes: Number(plan.estimated_drive_minutes ?? payload.estimatedDriveMinutes ?? 0),
        estimatedServiceMinutes: Number(plan.estimated_service_minutes ?? payload.estimatedServiceMinutes ?? orderedStops.reduce((sum, stop) => sum + Number(stop.estimatedServiceMinutes || 0), 0)),
        telemetryRevenue: payload.telemetryRevenue || plan.telemetryRevenue || null,
      }
    }

    function buildMapSearchUrl(item) {
      if (item?.latitude != null && item?.longitude != null) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${item.latitude},${item.longitude}`)}`
      }
      const query = [item?.name, item?.title, item?.address, item?.city].filter(Boolean).join(', ')
      return query ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}` : '#'
    }

    function buildMultiStopMapsUrl(plan) {
      const stops = Array.isArray(plan?.orderedStops) ? plan.orderedStops.filter((stop) => stop.latitude != null && stop.longitude != null) : []
      if (!stops.length) return null

      const origin = plan.start_latitude != null && plan.start_longitude != null
        ? `${plan.start_latitude},${plan.start_longitude}`
        : `${stops[0].latitude},${stops[0].longitude}`

      const destination = plan.return_to_start
        ? origin
        : `${stops[stops.length - 1].latitude},${stops[stops.length - 1].longitude}`

      const waypointStops = plan.return_to_start ? stops : stops.slice(0, -1)
      const waypoints = waypointStops.map((stop) => `${stop.latitude},${stop.longitude}`).join('|')
      const params = new URLSearchParams({
        api: '1',
        origin,
        destination,
        travelmode: 'driving',
      })

      if (waypoints) params.set('waypoints', waypoints)
      return `https://www.google.com/maps/dir/?${params.toString()}`
    }

    function ensureMap() {
      const container = document.getElementById('routeMap')
      if (!container) return

      if (state.map) {
        const currentContainer = state.map.getContainer()
        if (currentContainer === container) return
        state.map.remove()
        state.map = null
        state.mapLayer = null
      }

      state.map = L.map('routeMap', { zoomControl: true }).setView([49.85, 15.5], 7)
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(state.map)
      state.mapLayer = L.layerGroup().addTo(state.map)
    }

    function renderMap(plan) {
      if (!document.getElementById('routeMap')) return
      ensureMap()
      state.mapLayer.clearLayers()

      const points = Array.isArray(plan?.orderedStops)
        ? plan.orderedStops.filter((stop) => stop.latitude != null && stop.longitude != null)
        : []

      if (!points.length) {
        state.map.setView([49.85, 15.5], 7)
        return
      }

      const bounds = []

      if (plan.start_latitude != null && plan.start_longitude != null) {
        L.circleMarker([plan.start_latitude, plan.start_longitude], {
          radius: 9,
          color: '#ffffff',
          weight: 2,
          fillColor: '#1e90ff',
          fillOpacity: 0.95,
        })
          .bindPopup(`<strong>Start</strong><br>${escapeHtml(plan.route_payload?.startPoint?.label || 'Sklad / základna')}`)
          .addTo(state.mapLayer)
        bounds.push([plan.start_latitude, plan.start_longitude])
      }

      const latLngs = points.map((stop, index) => {
        const latLng = [stop.latitude, stop.longitude]
        bounds.push(latLng)
        L.marker(latLng, {
          icon: L.divIcon({
            className: '',
            html: `<div class="number-pin">${index + 1}</div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
          }),
        })
          .bindPopup(`<strong>${escapeHtml(stop.title || stop.name)}</strong><br>${escapeHtml([stop.address, stop.city].filter(Boolean).join(', ') || 'Bez adresy')}`)
          .addTo(state.mapLayer)
        return latLng
      })

      if (latLngs.length >= 2) {
        L.polyline(latLngs, {
          color: '#d5101a',
          weight: 4,
          opacity: 0.82,
        }).addTo(state.mapLayer)
      }

      state.map.fitBounds(bounds, { padding: [30, 30] })
    }

    async function loadLookups() {
      const [vehiclesResult, employeesResult, warehousesResult] = await Promise.all([
        supabase.from('vehicles').select('id, plate, brand, model, name, active').eq('active', true).order('plate', { ascending: true }),
        supabase.from('employees').select('id, name, surname, email, active').order('surname', { ascending: true }),
        supabase.from('warehouses').select('id, name').order('name', { ascending: true }),
      ])

      if (vehiclesResult.error) throw vehiclesResult.error
      if (employeesResult.error) throw employeesResult.error
      if (warehousesResult.error) throw warehousesResult.error

      state.vehicles = (vehiclesResult.data || []).map((vehicle) => ({
        ...vehicle,
        vehicle_label: [vehicle.plate, vehicle.brand, vehicle.model, vehicle.name].filter(Boolean).join(' · ') || `Vozidlo ${vehicle.id}`,
      }))
      state.employees = (employeesResult.data || []).filter((employee) => employee.active !== false)
      state.warehouses = warehousesResult.data || []
    }

    async function loadCashReports(routePlanId) {
      state.cashReports = []
      if (!Number.isFinite(Number(routePlanId))) return

      const { data, error } = await supabase
        .from('route_cash_reports')
        .select('id, route_plan_id, route_plan_stop_id, machine_id, location_id, collection_status, expected_cash_czk, expected_card_czk, expected_total_czk, actual_cash_czk, difference_cash_czk, telemetry_from_at, telemetry_to_at, reported_at, note')
        .eq('route_plan_id', Number(routePlanId))
        .order('reported_at', { ascending: false })

      if (error) {
        if (String(error.message || '').includes('route_cash_reports')) return
        throw error
      }

      state.cashReports = data || []
    }

    async function loadMobileRouteExecution(routePlanId) {
      state.mobileVisits = []
      if (!Number.isFinite(Number(routePlanId))) return

      const { data, error } = await supabase
        .from('route_machine_visits')
        .select('id, route_plan_id, route_plan_stop_id, machine_id, employee_id, vehicle_id, visit_date, status, arrived_at, completed_at, skipped_at, skip_reason, operator_note, synced_at, route_machine_cash_reports(id, expected_cash_czk, expected_card_czk, expected_total_czk, operator_bag_label, operator_collected_confirmed, operator_collected_at, supervisor_counted_cash_czk, difference_cash_czk, note)')
        .eq('route_plan_id', Number(routePlanId))
        .order('created_at', { ascending: false })

      if (error) {
        if (/route_machine_visits|route_machine_cash_reports/i.test(String(error.message || ''))) return
        throw error
      }

      state.mobileVisits = data || []
    }

    async function loadRouteVehicleLog(plan) {
      state.routeVehicleLog = null
      if (!plan?.vehicle_id || !plan?.planning_date) return

      try {
        let attendanceDayId = null
        if (plan.planned_employee_id) {
          const { data: day, error: dayError } = await supabase
            .from('attendance_days')
            .select('id, actual_start, actual_end, status')
            .eq('employee_id', plan.planned_employee_id)
            .eq('attendance_date', plan.planning_date)
            .eq('vehicle_id', Number(plan.vehicle_id))
            .maybeSingle()

          if (!dayError && day?.id) {
            attendanceDayId = day.id
          } else if (dayError && !/attendance_days/i.test(String(dayError.message || ''))) {
            console.warn('Route attendance lookup failed:', dayError)
          }
        }

        let query = supabase
          .from('vehicle_operation_logs')
          .select('id, attendance_day_id, vehicle_id, employee_id, log_date, started_at, ended_at, start_odometer_km, end_odometer_km, distance_km, status, trip_note')
          .eq('vehicle_id', Number(plan.vehicle_id))
          .eq('log_date', plan.planning_date)
          .order('created_at', { ascending: false })
          .limit(1)

        if (attendanceDayId) {
          query = query.eq('attendance_day_id', attendanceDayId)
        } else if (plan.planned_employee_id) {
          query = query.eq('employee_id', plan.planned_employee_id)
        }

        const { data, error } = await query.maybeSingle()
        if (error) {
          if (/vehicle_operation_logs/i.test(String(error.message || ''))) return
          throw error
        }

        state.routeVehicleLog = data || null
      } catch (error) {
        console.warn('Route vehicle km lookup failed:', error)
        state.routeVehicleLog = null
      }
    }

    async function getCurrentEmployeeId() {
      try {
        const { data: sessionData } = await supabase.auth.getSession()
        const authUserId = sessionData?.session?.user?.id
        if (!authUserId) return null

        const { data, error } = await supabase
          .from('employees')
          .select('id')
          .eq('auth_user_id', authUserId)
          .maybeSingle()

        if (error) return null
        return data?.id || null
      } catch (error) {
        console.warn('Current employee lookup failed:', error)
        return null
      }
    }

    async function saveSupervisorCashCount(button) {
      const visitId = button?.dataset?.saveSupervisorCash
      const reportId = button?.dataset?.cashReportId
      const machineId = button?.dataset?.machineId
      if (!visitId || !machineId) return

      const cashInput = detailShell.querySelector(`[data-supervisor-cash="${CSS.escape(String(visitId))}"]`)
      const noteInput = detailShell.querySelector(`[data-supervisor-note="${CSS.escape(String(visitId))}"]`)
      const cashText = String(cashInput?.value || '').trim()
      const countedCash = cashText ? Number(cashText) : null

      if (cashText && !Number.isFinite(countedCash)) {
        setStatus('Reálně dovezená hotovost musí být číslo.', 'warning')
        return
      }

      const expectedCash = Number(button.dataset.expectedCash || 0)
      const expectedCard = Number(button.dataset.expectedCard || 0)
      const supervisorId = await getCurrentEmployeeId()
      const payload = {
        supervisor_counted_cash_czk: countedCash,
        supervisor_counted_by: supervisorId,
        supervisor_counted_at: new Date().toISOString(),
        note: String(noteInput?.value || '').trim() || null,
      }

      try {
        let result
        if (reportId) {
          result = await supabase
            .from('route_machine_cash_reports')
            .update(payload)
            .eq('id', Number(reportId))
        } else {
          result = await supabase
            .from('route_machine_cash_reports')
            .insert([{
              ...payload,
              visit_id: Number(visitId),
              machine_id: Number(machineId),
              expected_cash_czk: expectedCash,
              expected_card_czk: expectedCard,
              expected_total_czk: expectedCash + expectedCard,
            }])
        }

        if (result.error) throw result.error
        setStatus('Přepočet hotovosti je uložený.', 'success')
        await loadMobileRouteExecution(state.plan?.id)
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se uložit přepočet hotovosti: ${error.message || error}`, 'error')
      }
    }

    async function loadPlan() {
      if (!routeId) {
        state.plan = null
        state.cashReports = []
        state.mobileVisits = []
        state.routeVehicleLog = null
        return
      }

      const numericId = Number(routeId)
      if (Number.isFinite(numericId) && String(numericId) === String(routeId)) {
        const { data, error } = await supabase
          .from('route_plans')
          .select('id, planning_date, title, vehicle_id, planned_employee_id, optimization_provider, provider_status, execution_status, assigned_at, started_at, completed_at, stop_count, estimated_distance_km, estimated_drive_minutes, estimated_service_minutes, route_payload, return_to_start, start_latitude, start_longitude, warehouse_id, created_at, route_plan_stops(id, location_id, machine_id, stop_order, status, arrived_at, completed_at, skipped_at, title, address_snapshot, city_snapshot, latitude, longitude, priority_snapshot, service_window_snapshot, estimated_service_minutes, note)')
          .eq('id', numericId)
          .maybeSingle()

        if (!error && data) {
          state.plan = buildPlan(data)
          await Promise.all([
            loadCashReports(data.id),
            loadMobileRouteExecution(data.id),
            loadRouteVehicleLog(state.plan),
          ])
          return
        }

        if (error && !String(error.message || '').includes('route_plans')) {
          throw error
        }
      }

      const localPlans = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]')
      const localPlan = localPlans.find((item) => getPlanKey(item) === routeId)
      state.plan = localPlan ? buildPlan(localPlan) : null
      state.cashReports = []
      state.mobileVisits = []
      state.routeVehicleLog = null
    }

    async function updateRouteStatus(nextStatus) {
      if (!state.plan) return
      const routeKey = getPlanKey(state.plan)
      const nowIso = new Date().toISOString()

      const confirmed = window.confirm(
        nextStatus === 'done'
          ? 'Opravdu chceš označit trasu jako hotovou?'
          : 'Opravdu chceš trasu zrušit?'
      )
      if (!confirmed) return

      try {
        if (Number.isFinite(Number(state.plan.id))) {
          const patch = {
            execution_status: nextStatus,
            completed_at: nowIso,
          }

          const { error } = await supabase
            .from('route_plans')
            .update(patch)
            .eq('id', state.plan.id)

          if (error) throw error
        } else {
          const localPlans = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]')
          const updated = localPlans.map((item) => {
            if (getPlanKey(item) !== routeKey) return item
            return {
              ...item,
              execution_status: nextStatus,
              completed_at: nowIso,
            }
          })
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated))
        }

        setStatus(
          nextStatus === 'done' ? 'Trasa byla označena jako hotová.' : 'Trasa byla zrušena.',
          nextStatus === 'done' ? 'success' : 'warning'
        )
        await loadPlan()
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se uložit změnu trasy: ${error.message || error}`, 'error')
      }
    }

    async function initializePage() {
      try {
        await loadLookups()
        await loadPlan()
        if (state.plan) {
          statusLine.hidden = true
        } else {
          setStatus('Tahle trasa už tu není nebo nejde načíst.', 'warning')
        }
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se načíst detail trasy: ${error.message || error}`, 'error')
        renderDetail()
      }
    }

    initializePage()
  </script>
</body>
</html>
