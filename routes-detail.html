<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <title>OLVEND | Detail trasy</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b0b0d;
      --panel: rgba(18,19,24,0.94);
      --panel-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f6;
      --muted: #a5a8b2;
      --soft: #7d818c;
      --accent: #d5101a;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(213,16,26,0.12), transparent 24%),
        linear-gradient(135deg, #09090b, #101116, #0b0b0e);
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .main {
      min-width: 0;
      padding: 24px;
    }

    .page-shell {
      display: grid;
      gap: 18px;
      width: min(100%, 1480px);
      margin: 0 auto;
    }

    .mobile-nav-shell {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
    }

    .btn.danger {
      background: rgba(255,91,102,0.18);
      border: 1px solid rgba(255,91,102,0.24);
      color: #ffc5ca;
    }

    .status-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .status-line.success { color: #9be7b8; }
    .status-line.warning { color: #ffd68f; }
    .status-line.error { color: #ffb0b6; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.1;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .panel-body {
      padding: 18px;
    }

    .route-detail-panel {
      border-radius: 22px;
    }

    .route-detail-header {
      align-items: center;
      background:
        linear-gradient(90deg, rgba(213,16,26,0.08), transparent 36%),
        rgba(255,255,255,0.02);
    }

    .route-title-block {
      min-width: 0;
    }

    .route-title-block h2 {
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .route-title-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .route-header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .route-board {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.62fr);
      gap: 16px;
      align-items: stretch;
    }

    .route-board-main {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .route-metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }

    .route-metric {
      min-width: 0;
      padding: 13px 14px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .route-metric:nth-child(4n) {
      border-right: 0;
    }

    .route-metric:nth-last-child(-n + 4) {
      border-bottom: 0;
    }

    .route-metric label,
    .route-money label {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .route-metric strong {
      min-width: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.25;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    .route-money-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .route-money {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: grid;
      gap: 8px;
    }

    .route-money strong {
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .route-money.primary {
      border-color: rgba(213,16,26,0.22);
      background: rgba(213,16,26,0.08);
    }

    .route-board-side {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      min-width: 0;
    }

    .route-map-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .route-map-toolbar strong {
      font-size: 14px;
    }

    .route-map-toolbar span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .route-badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .route-badge.live { color: #baf3cf; border-color: rgba(46,204,113,0.24); background: rgba(46,204,113,0.12); }
    .route-badge.saved { color: #baf3cf; border-color: rgba(46,204,113,0.24); background: rgba(46,204,113,0.12); }
    .route-badge.window { color: #bbd8ff; border-color: rgba(88,166,255,0.24); background: rgba(88,166,255,0.12); }
    .route-badge.heuristic { color: #ffe1aa; border-color: rgba(255,182,72,0.24); background: rgba(255,182,72,0.12); }
    .route-badge.critical { color: #ffc5ca; border-color: rgba(255,91,102,0.24); background: rgba(255,91,102,0.12); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .mini-stat {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-stat-label {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .mini-stat-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .cash-report-list {
      display: grid;
      gap: 10px;
    }

    .cash-report-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.35fr) minmax(130px, 0.75fr) minmax(130px, 0.75fr) minmax(140px, 0.8fr) minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border-radius: 16px;
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .cash-report-title {
      display: grid;
      gap: 4px;
      align-self: center;
      min-width: 0;
    }

    .cash-report-title strong {
      font-size: 15px;
      line-height: 1.25;
    }

    .cash-report-title span,
    .cash-report-field small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .cash-report-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .cash-report-field label {
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cash-report-field input,
    .cash-report-field select {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 9px 11px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
    }

    .cash-report-field input::placeholder {
      color: var(--soft);
    }

    .cash-report-field select option {
      background: #12151d;
      color: #fff;
    }

    .cash-report-diff {
      font-weight: 800;
      color: var(--muted);
    }

    .cash-report-diff.positive { color: #9be7b8; }
    .cash-report-diff.negative { color: #ffb0b6; }

    .map-shell {
      height: 360px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      margin-top: 18px;
    }

    .route-board-side .map-shell {
      height: 100%;
      min-height: 330px;
      margin-top: 0;
    }

    #routeMap { width: 100%; height: 100%; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #12151d; color: #fff; }
    .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.5; }

    .number-pin {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #d5101a;
      border: 2px solid rgba(255,255,255,0.8);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(213,16,26,0.35);
    }

    .section-stack {
      display: grid;
      gap: 18px;
    }

    .stop-list {
      display: grid;
      gap: 12px;
    }

    .stop-card {
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 14px;
    }

    .stop-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .subtext {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .timeline-item strong {
      font-size: 14px;
    }

    .timeline-item span {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed rgba(255,255,255,0.14);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside.sidebar {
        display: none;
      }

      .mobile-nav-shell {
        display: block;
      }

      .main {
        padding: 16px;
      }

      .topbar {
        flex-direction: column;
      }

      .title h1 {
        font-size: 30px;
      }

      .timeline-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .timeline-item span {
        text-align: left;
      }

      .route-board {
        grid-template-columns: 1fr;
      }

      .route-board-side .map-shell {
        height: 320px;
      }

      .route-metric-grid,
      .route-money-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .route-metric:nth-child(4n) {
        border-right: 1px solid var(--border);
      }

      .route-metric:nth-child(2n) {
        border-right: 0;
      }

      .route-metric:nth-last-child(-n + 4) {
        border-bottom: 1px solid var(--border);
      }

      .route-metric:nth-last-child(-n + 2) {
        border-bottom: 0;
      }

      .cash-report-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .route-detail-header,
      .route-header-actions,
      .route-map-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .route-header-actions .btn,
      .route-map-toolbar .btn {
        width: 100%;
      }

      .route-metric-grid,
      .route-money-strip {
        grid-template-columns: 1fr;
      }

      .route-metric,
      .route-metric:nth-child(2n),
      .route-metric:nth-child(4n),
      .route-metric:nth-last-child(-n + 2),
      .route-metric:nth-last-child(-n + 4) {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .route-metric:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="mobile-nav-shell" id="mobileNavShell"></div>
      <div class="page-shell">
        <header class="topbar">
          <div class="title">
            <h1>Detail trasy</h1>
            <p>Jedna trasa, všechny důležité informace na jednom místě. Seznam zůstal zpátky v historii.</p>
          </div>
          <div class="actions">
            <a class="btn secondary" href="routes-history.html">Zpět na seznam</a>
          </div>
        </header>

        <div class="status-line" id="statusLine">Načítám detail trasy…</div>

        <div class="section-stack" id="detailShell">
          <section class="panel">
            <div class="panel-body">
              <div class="empty-state">Načítám trasu…</div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./sidebar.js?v=20260712lightfix2"></script>
  <script type="module">
    import { supabase } from './supabase.js'

    const LOCAL_STORAGE_KEY = 'olvendRoutePilotPlans'
    const statusLine = document.getElementById('statusLine')
    const detailShell = document.getElementById('detailShell')
    const routeId = new URLSearchParams(window.location.search).get('id')

    const state = {
      plan: null,
      employees: [],
      vehicles: [],
      warehouses: [],
      cashReports: [],
      map: null,
      mapLayer: null,
    }

    function setStatus(message, tone = '') {
      statusLine.hidden = false
      statusLine.textContent = message
      statusLine.className = `status-line${tone ? ` ${tone}` : ''}`
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    }

    function formatNumber(value, digits = 0) {
      const number = Number(value ?? 0)
      if (Number.isNaN(number)) return '0'
      return number.toLocaleString('cs-CZ', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      })
    }

    function formatDateLabel(dateString) {
      if (!dateString) return 'Bez data'
      const date = new Date(`${dateString}T12:00:00`)
      if (Number.isNaN(date.getTime())) return dateString
      return date.toLocaleDateString('cs-CZ')
    }

    function formatDateTime(value) {
      if (!value) return '—'
      return new Date(value).toLocaleString('cs-CZ', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      })
    }

    function formatMoney(value) {
      return new Intl.NumberFormat('cs-CZ', {
        style: 'currency',
        currency: 'CZK',
        maximumFractionDigits: 0,
      }).format(Number(value || 0))
    }

    function getCashReport(machineId) {
      return state.cashReports.find((report) => String(report.machine_id) === String(machineId)) || null
    }

    function getCashDifferenceClass(value) {
      const number = Number(value || 0)
      if (number > 0) return 'positive'
      if (number < 0) return 'negative'
      return ''
    }

    function getStopForCashMachine(machineId, locationId) {
      const stops = Array.isArray(state.plan?.orderedStops) ? state.plan.orderedStops : []
      return stops.find((stop) => String(stop.machine_id || stop.machineId || '') === String(machineId)) ||
        stops.find((stop) => locationId && String(stop.location_id || stop.locationId || '') === String(locationId)) ||
        null
    }

    function renderCashReportSection(plan) {
      const breakdown = Array.isArray(plan?.telemetryRevenue?.machineBreakdown)
        ? plan.telemetryRevenue.machineBreakdown
        : []

      return `
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Svoz hotovosti</h2>
              <p>Označ, jestli se hotovost opravdu svezla. Nesvezená hotovost se přičte do očekávání při další trase.</p>
            </div>
          </div>
          <div class="panel-body">
            ${breakdown.length ? `
              <div class="cash-report-list">
                ${breakdown.map((row) => {
                  const report = getCashReport(row.machineId)
                  const status = report?.collection_status || 'pending'
                  const expectedCash = Number(row.expectedCashCzk || report?.expected_cash_czk || 0)
                  const expectedCard = Number(row.expectedCardCzk || report?.expected_card_czk || 0)
                  const actualCash = report?.actual_cash_czk ?? ''
                  const diff = report?.difference_cash_czk
                  const diffText = status === 'collected' && diff != null
                    ? `${Number(diff) > 0 ? '+' : ''}${formatMoney(diff)}`
                    : status === 'not_collected'
                      ? 'Přenese se dál'
                      : 'Neuloženo'
                  return `
                    <article class="cash-report-row">
                      <div class="cash-report-title">
                        <strong>${escapeHtml(row.machineName || `Stroj ${row.machineId}`)}</strong>
                        <span>${escapeHtml(row.locationName || 'Bez lokality')} · karta ${escapeHtml(formatMoney(expectedCard))}</span>
                      </div>
                      <div class="cash-report-field">
                        <label>Oček. hotovost</label>
                        <strong>${escapeHtml(formatMoney(expectedCash))}</strong>
                      </div>
                      <div class="cash-report-field">
                        <label>Stav svozu</label>
                        <select data-cash-status="${escapeHtml(row.machineId)}">
                          <option value="pending"${status === 'pending' ? ' selected' : ''}>Čeká</option>
                          <option value="collected"${status === 'collected' ? ' selected' : ''}>Svezeno</option>
                          <option value="not_collected"${status === 'not_collected' ? ' selected' : ''}>Nesvezeno</option>
                        </select>
                      </div>
                      <div class="cash-report-field">
                        <label>Skutečně</label>
                        <input data-cash-actual="${escapeHtml(row.machineId)}" type="number" step="1" min="0" value="${escapeHtml(actualCash)}" placeholder="${escapeHtml(String(Math.round(expectedCash)))}" />
                      </div>
                      <div class="cash-report-field">
                        <label>Rozdíl / poznámka</label>
                        <input data-cash-note="${escapeHtml(row.machineId)}" type="text" value="${escapeHtml(report?.note || '')}" placeholder="např. chybí 50 Kč" />
                        <small class="cash-report-diff ${escapeHtml(getCashDifferenceClass(diff))}">${escapeHtml(diffText)}</small>
                      </div>
                      <button class="btn secondary" type="button" data-save-cash-report="${escapeHtml(row.machineId)}">Uložit</button>
                    </article>
                  `
                }).join('')}
              </div>
            ` : '<div class="empty-state">Pro tuhle trasu zatím nemám online tržby ze strojů. Jakmile bude v trase stroj s telemetrií, objeví se tady očekávaná hotovost a karta.</div>'}
          </div>
        </section>
      `
    }

    function getExecutionStatusMeta(status) {
      const normalized = String(status || 'draft').toLowerCase()
      const map = {
        draft: { label: 'Vytvořeno', cls: 'heuristic' },
        assigned: { label: 'Přiřazeno', cls: 'window' },
        in_progress: { label: 'V terénu', cls: 'live' },
        done: { label: 'Hotovo', cls: 'saved' },
        cancelled: { label: 'Zrušeno', cls: 'critical' },
      }
      return map[normalized] || map.draft
    }

    function getPlanKey(plan) {
      return String(plan?.id || plan?.local_saved_at || plan?.title || '')
    }

    function getSavedPlanEmployeeLabel(plan) {
      const payloadName = plan?.route_payload?.planned_employee_name
      if (payloadName && payloadName !== 'Bez výběru') return payloadName
      const employeeId = plan?.planned_employee_id
      if (!employeeId) return 'Bez zaměstnance'
      const employee = state.employees.find((item) => String(item.id) === String(employeeId))
      return employee ? ([employee.name, employee.surname].filter(Boolean).join(' ') || employee.email || 'Bez zaměstnance') : 'Bez zaměstnance'
    }

    function getWarehouseLabel(plan) {
      if (plan?.warehouse_id) {
        const warehouse = state.warehouses.find((item) => String(item.id) === String(plan.warehouse_id))
        if (warehouse?.name) return warehouse.name
      }
      return plan?.route_payload?.startPoint?.label || 'Bez skladu'
    }

    function buildPlan(plan) {
      const payload = plan.route_payload || {}
      const payloadStops = Array.isArray(payload.orderedStops) ? payload.orderedStops : []
      const dbStops = Array.isArray(plan.route_plan_stops) ? plan.route_plan_stops : []

      const orderedStops = (dbStops.length ? dbStops : payloadStops)
        .slice()
        .sort((a, b) => Number(a.stop_order || 0) - Number(b.stop_order || 0))
        .map((stop, index) => ({
          ...stop,
          id: stop.id || `${getPlanKey(plan)}-${index}`,
          title: stop.title || stop.name || `Zastávka ${index + 1}`,
          name: stop.name || stop.title || `Zastávka ${index + 1}`,
          address: stop.address || stop.address_snapshot || '',
          city: stop.city || stop.city_snapshot || '',
          latitude: stop.latitude != null ? Number(stop.latitude) : null,
          longitude: stop.longitude != null ? Number(stop.longitude) : null,
          estimatedServiceMinutes: Number(stop.estimatedServiceMinutes ?? stop.estimated_service_minutes ?? 0),
        }))

      return {
        ...plan,
        ...payload,
        orderedStops,
        title: plan.title || payload.title || `Trasa ${formatDateLabel(plan.planning_date)}`,
        vehicle_label: plan.vehicle_id
          ? state.vehicles.find((item) => String(item.id) === String(plan.vehicle_id))?.vehicle_label || 'Bez vozidla'
          : 'Bez vozidla',
        planned_employee_name: getSavedPlanEmployeeLabel(plan),
        estimatedDistanceKm: Number(plan.estimated_distance_km ?? payload.estimatedDistanceKm ?? 0),
        estimatedDriveMinutes: Number(plan.estimated_drive_minutes ?? payload.estimatedDriveMinutes ?? 0),
        estimatedServiceMinutes: Number(plan.estimated_service_minutes ?? payload.estimatedServiceMinutes ?? orderedStops.reduce((sum, stop) => sum + Number(stop.estimatedServiceMinutes || 0), 0)),
        telemetryRevenue: payload.telemetryRevenue || plan.telemetryRevenue || null,
      }
    }

    function buildMapSearchUrl(item) {
      if (item?.latitude != null && item?.longitude != null) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${item.latitude},${item.longitude}`)}`
      }
      const query = [item?.name, item?.title, item?.address, item?.city].filter(Boolean).join(', ')
      return query ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}` : '#'
    }

    function buildMultiStopMapsUrl(plan) {
      const stops = Array.isArray(plan?.orderedStops) ? plan.orderedStops.filter((stop) => stop.latitude != null && stop.longitude != null) : []
      if (!stops.length) return null

      const origin = plan.start_latitude != null && plan.start_longitude != null
        ? `${plan.start_latitude},${plan.start_longitude}`
        : `${stops[0].latitude},${stops[0].longitude}`

      const destination = plan.return_to_start
        ? origin
        : `${stops[stops.length - 1].latitude},${stops[stops.length - 1].longitude}`

      const waypointStops = plan.return_to_start ? stops : stops.slice(0, -1)
      const waypoints = waypointStops.map((stop) => `${stop.latitude},${stop.longitude}`).join('|')
      const params = new URLSearchParams({
        api: '1',
        origin,
        destination,
        travelmode: 'driving',
      })

      if (waypoints) params.set('waypoints', waypoints)
      return `https://www.google.com/maps/dir/?${params.toString()}`
    }

    function ensureMap() {
      const container = document.getElementById('routeMap')
      if (!container) return

      if (state.map) {
        const currentContainer = state.map.getContainer()
        if (currentContainer === container) return
        state.map.remove()
        state.map = null
        state.mapLayer = null
      }

      state.map = L.map('routeMap', { zoomControl: true }).setView([49.85, 15.5], 7)
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(state.map)
      state.mapLayer = L.layerGroup().addTo(state.map)
    }

    function renderMap(plan) {
      if (!document.getElementById('routeMap')) return
      ensureMap()
      state.mapLayer.clearLayers()

      const points = Array.isArray(plan?.orderedStops)
        ? plan.orderedStops.filter((stop) => stop.latitude != null && stop.longitude != null)
        : []

      if (!points.length) {
        state.map.setView([49.85, 15.5], 7)
        return
      }

      const bounds = []

      if (plan.start_latitude != null && plan.start_longitude != null) {
        L.circleMarker([plan.start_latitude, plan.start_longitude], {
          radius: 9,
          color: '#ffffff',
          weight: 2,
          fillColor: '#1e90ff',
          fillOpacity: 0.95,
        })
          .bindPopup(`<strong>Start</strong><br>${escapeHtml(plan.route_payload?.startPoint?.label || 'Sklad / základna')}`)
          .addTo(state.mapLayer)
        bounds.push([plan.start_latitude, plan.start_longitude])
      }

      const latLngs = points.map((stop, index) => {
        const latLng = [stop.latitude, stop.longitude]
        bounds.push(latLng)
        L.marker(latLng, {
          icon: L.divIcon({
            className: '',
            html: `<div class="number-pin">${index + 1}</div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
          }),
        })
          .bindPopup(`<strong>${escapeHtml(stop.title || stop.name)}</strong><br>${escapeHtml([stop.address, stop.city].filter(Boolean).join(', ') || 'Bez adresy')}`)
          .addTo(state.mapLayer)
        return latLng
      })

      if (latLngs.length >= 2) {
        L.polyline(latLngs, {
          color: '#d5101a',
          weight: 4,
          opacity: 0.82,
        }).addTo(state.mapLayer)
      }

      state.map.fitBounds(bounds, { padding: [30, 30] })
    }

    function renderDetail() {
      const plan = state.plan
      if (!plan) {
        detailShell.innerHTML = `
          <section class="panel">
            <div class="panel-body">
              <div class="empty-state">Trasa se nenašla. Vrať se do seznamu a otevři ji znovu.</div>
            </div>
          </section>
        `
        return
      }

      const statusMeta = getExecutionStatusMeta(plan.execution_status)
      const mapsUrl = buildMultiStopMapsUrl(plan)
      const stops = Array.isArray(plan.orderedStops) ? plan.orderedStops : []
      const canEdit = !['in_progress', 'done', 'cancelled'].includes(String(plan.execution_status || 'draft'))
      const canComplete = !['done', 'cancelled'].includes(String(plan.execution_status || 'draft'))
      const canCancel = !['done', 'cancelled'].includes(String(plan.execution_status || 'draft'))
      const routeKey = getPlanKey(plan)
      const telemetry = plan.telemetryRevenue || {}
      const revenue = Number(telemetry.revenue || 0)
      const cashAmount = Number(telemetry.cashAmount || 0)
      const cashlessAmount = Number(telemetry.cashlessAmount || 0)

      detailShell.innerHTML = `
        <section class="panel route-detail-panel">
          <div class="panel-header route-detail-header">
            <div class="route-title-block">
              <h2>${escapeHtml(plan.title)}</h2>
              <div class="route-title-meta">
                <span>${escapeHtml(formatDateLabel(plan.planning_date))}</span>
                <span>·</span>
                <span>${escapeHtml(plan.planned_employee_name || 'Bez zaměstnance')}</span>
                <span>·</span>
                <span>${formatNumber(stops.length)} zastávek</span>
              </div>
            </div>
            <div class="route-header-actions">
              <span class="route-badge ${escapeHtml(statusMeta.cls)}">${escapeHtml(statusMeta.label)}</span>
              ${canEdit ? `<a class="btn secondary" href="routes-create.html?edit=${encodeURIComponent(routeKey)}">Upravit</a>` : ''}
              ${canComplete ? '<button class="btn" id="markDoneBtn" type="button">Označit hotovo</button>' : ''}
            </div>
          </div>
          <div class="panel-body">
            <div class="route-board">
              <div class="route-board-main">
                <div class="route-metric-grid">
                  <div class="route-metric">
                    <label>Zaměstnanec</label>
                    <strong>${escapeHtml(plan.planned_employee_name || 'Bez zaměstnance')}</strong>
                  </div>
                  <div class="route-metric">
                    <label>Vozidlo</label>
                    <strong>${escapeHtml(plan.vehicle_label || 'Bez vozidla')}</strong>
                  </div>
                  <div class="route-metric">
                    <label>Sklad</label>
                    <strong>${escapeHtml(getWarehouseLabel(plan))}</strong>
                  </div>
                  <div class="route-metric">
                    <label>Odhad jízdy</label>
                    <strong>${formatNumber(plan.estimatedDistanceKm, 1)} km · ${formatNumber(plan.estimatedDriveMinutes)} min</strong>
                  </div>
                  <div class="route-metric">
                    <label>Datum</label>
                    <strong>${escapeHtml(formatDateLabel(plan.planning_date))}</strong>
                  </div>
                  <div class="route-metric">
                    <label>Zastávky</label>
                    <strong>${formatNumber(stops.length)}</strong>
                  </div>
                  <div class="route-metric">
                    <label>Servisní čas</label>
                    <strong>${formatNumber(plan.estimatedServiceMinutes)} min</strong>
                  </div>
                  <div class="route-metric">
                    <label>Návrat</label>
                    <strong>${plan.return_to_start ? 'Zpět na start' : 'Končí poslední zastávkou'}</strong>
                  </div>
                </div>
                <div class="route-money-strip">
                  <div class="route-money primary">
                    <label>Očekávaná tržba</label>
                    <strong>${escapeHtml(formatMoney(revenue))}</strong>
                  </div>
                  <div class="route-money">
                    <label>Hotově</label>
                    <strong>${escapeHtml(formatMoney(cashAmount))}</strong>
                  </div>
                  <div class="route-money">
                    <label>Kartou</label>
                    <strong>${escapeHtml(formatMoney(cashlessAmount))}</strong>
                  </div>
                </div>
                <div class="detail-actions">
                  ${mapsUrl ? `<a class="btn secondary" href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener noreferrer">Otevřít v Google Maps</a>` : ''}
                  ${canCancel ? '<button class="btn danger" id="cancelRouteBtn" type="button">Zrušit</button>' : ''}
                </div>
              </div>
              <div class="route-board-side">
                <div class="route-map-toolbar">
                  <strong>Mapa trasy</strong>
                  <span>${formatNumber(stops.length)} bodů · ${formatNumber(plan.estimatedDistanceKm, 1)} km</span>
                </div>
                <div class="map-shell">
                  <div id="routeMap"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        ${renderCashReportSection(plan)}

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Zastávky</h2>
              <p>Detailní průběh a body, které trasa obsahuje.</p>
            </div>
          </div>
          <div class="panel-body">
            <div class="stop-list">
              ${stops.length ? stops.map((stop, index) => {
                const stopStatus = stop.status === 'done'
                  ? { label: 'Hotovo', cls: 'saved' }
                  : stop.status === 'skipped'
                    ? { label: 'Přeskočeno', cls: 'heuristic' }
                    : stop.status === 'in_progress'
                      ? { label: 'Na místě', cls: 'live' }
                      : { label: 'Čeká', cls: 'window' }
                return `
                  <article class="stop-card">
                    <h3 class="stop-title">${escapeHtml(`${index + 1}. ${stop.title || stop.name || 'Zastávka'}`)}</h3>
                    <span class="subtext">${escapeHtml([stop.address, stop.city].filter(Boolean).join(', ') || 'Bez adresy')}</span>
                    <div class="meta-row">
                      <span class="route-badge ${escapeHtml(stopStatus.cls)}">${escapeHtml(stopStatus.label)}</span>
                      ${stop.priority_snapshot ? `<span class="route-badge">${escapeHtml(stop.priority_snapshot)}</span>` : ''}
                    </div>
                    <div class="summary-grid">
                      <div class="mini-stat">
                        <div class="mini-stat-label">Příjezd</div>
                        <div class="mini-stat-value">${escapeHtml(formatDateTime(stop.arrived_at))}</div>
                      </div>
                      <div class="mini-stat">
                        <div class="mini-stat-label">Dokončeno</div>
                        <div class="mini-stat-value">${escapeHtml(formatDateTime(stop.completed_at))}</div>
                      </div>
                      <div class="mini-stat">
                        <div class="mini-stat-label">Servisní čas</div>
                        <div class="mini-stat-value">${formatNumber(stop.estimatedServiceMinutes || stop.estimated_service_minutes || 0)} min</div>
                      </div>
                    </div>
                    <div class="detail-actions">
                      <a class="btn secondary" href="${escapeHtml(buildMapSearchUrl(stop))}" target="_blank" rel="noopener noreferrer">Otevřít bod</a>
                    </div>
                  </article>
                `
              }).join('') : '<div class="empty-state">Tahle trasa ještě nemá uložené zastávky.</div>'}
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Průběh trasy</h2>
              <p>Rychlá osa toho, co se s trasou stalo.</p>
            </div>
          </div>
          <div class="panel-body">
            <div class="timeline">
              <article class="timeline-item"><strong>Vytvořeno</strong><span>${escapeHtml(formatDateTime(plan.created_at))}</span></article>
              <article class="timeline-item"><strong>Přiřazeno</strong><span>${escapeHtml(formatDateTime(plan.assigned_at))}</span></article>
              <article class="timeline-item"><strong>Start</strong><span>${escapeHtml(formatDateTime(plan.started_at))}</span></article>
              <article class="timeline-item"><strong>Dokončeno</strong><span>${escapeHtml(formatDateTime(plan.completed_at))}</span></article>
            </div>
          </div>
        </section>
      `

      renderMap(plan)

      document.getElementById('markDoneBtn')?.addEventListener('click', () => updateRouteStatus('done'))
      document.getElementById('cancelRouteBtn')?.addEventListener('click', () => updateRouteStatus('cancelled'))
      detailShell.querySelectorAll('[data-save-cash-report]').forEach((button) => {
        button.addEventListener('click', () => saveCashReport(button.dataset.saveCashReport))
      })
    }

    async function loadLookups() {
      const [vehiclesResult, employeesResult, warehousesResult] = await Promise.all([
        supabase.from('vehicles').select('id, plate, brand, model, name, active').eq('active', true).order('plate', { ascending: true }),
        supabase.from('employees').select('id, name, surname, email, active').order('surname', { ascending: true }),
        supabase.from('warehouses').select('id, name').order('name', { ascending: true }),
      ])

      if (vehiclesResult.error) throw vehiclesResult.error
      if (employeesResult.error) throw employeesResult.error
      if (warehousesResult.error) throw warehousesResult.error

      state.vehicles = (vehiclesResult.data || []).map((vehicle) => ({
        ...vehicle,
        vehicle_label: [vehicle.plate, vehicle.brand, vehicle.model, vehicle.name].filter(Boolean).join(' · ') || `Vozidlo ${vehicle.id}`,
      }))
      state.employees = (employeesResult.data || []).filter((employee) => employee.active !== false)
      state.warehouses = warehousesResult.data || []
    }

    async function loadCashReports(routePlanId) {
      state.cashReports = []
      if (!Number.isFinite(Number(routePlanId))) return

      const { data, error } = await supabase
        .from('route_cash_reports')
        .select('id, route_plan_id, route_plan_stop_id, machine_id, location_id, collection_status, expected_cash_czk, expected_card_czk, expected_total_czk, actual_cash_czk, difference_cash_czk, telemetry_from_at, telemetry_to_at, reported_at, note')
        .eq('route_plan_id', Number(routePlanId))
        .order('reported_at', { ascending: false })

      if (error) {
        if (String(error.message || '').includes('route_cash_reports')) return
        throw error
      }

      state.cashReports = data || []
    }

    async function saveCashReport(machineId) {
      if (!state.plan || !Number.isFinite(Number(state.plan.id))) {
        setStatus('Svoz hotovosti jde uložit jen u trasy uložené v OLVEND.', 'warning')
        return
      }

      const breakdown = Array.isArray(state.plan.telemetryRevenue?.machineBreakdown)
        ? state.plan.telemetryRevenue.machineBreakdown
        : []
      const row = breakdown.find((item) => String(item.machineId) === String(machineId))
      if (!row) return

      const status = detailShell.querySelector(`[data-cash-status="${CSS.escape(String(machineId))}"]`)?.value || 'pending'
      const actualInput = detailShell.querySelector(`[data-cash-actual="${CSS.escape(String(machineId))}"]`)
      const noteInput = detailShell.querySelector(`[data-cash-note="${CSS.escape(String(machineId))}"]`)
      const expectedCash = Number(row.expectedCashCzk || 0)
      const expectedCard = Number(row.expectedCardCzk || 0)
      const expectedTotal = Number(row.expectedTotalCzk || 0)
      const actualText = String(actualInput?.value || '').trim()
      const actualCash = status === 'collected'
        ? (actualText ? Number(actualText) : expectedCash)
        : null
      const stop = getStopForCashMachine(machineId, row.locationId)

      if (status === 'collected' && !Number.isFinite(actualCash)) {
        setStatus('Skutečně převzatá hotovost musí být číslo.', 'warning')
        return
      }

      const payload = {
        route_plan_id: Number(state.plan.id),
        route_plan_stop_id: stop?.id && Number.isFinite(Number(stop.id)) ? Number(stop.id) : null,
        machine_id: Number(machineId),
        location_id: row.locationId ? Number(row.locationId) : null,
        collection_status: status,
        expected_cash_czk: expectedCash,
        expected_card_czk: expectedCard,
        expected_total_czk: expectedTotal,
        actual_cash_czk: actualCash,
        telemetry_from_at: row.telemetryFromAt || null,
        telemetry_to_at: row.lastSeen || null,
        reported_at: new Date().toISOString(),
        note: String(noteInput?.value || '').trim() || null,
      }

      try {
        const { data, error } = await supabase
          .from('route_cash_reports')
          .upsert(payload, { onConflict: 'route_plan_id,machine_id' })
          .select('id, route_plan_id, route_plan_stop_id, machine_id, location_id, collection_status, expected_cash_czk, expected_card_czk, expected_total_czk, actual_cash_czk, difference_cash_czk, telemetry_from_at, telemetry_to_at, reported_at, note')
          .single()

        if (error) throw error

        state.cashReports = [
          data,
          ...state.cashReports.filter((report) => String(report.machine_id) !== String(machineId)),
        ]

        setStatus(
          status === 'not_collected'
            ? 'Uloženo jako nesvezeno. Tahle hotovost se přičte do další trasy.'
            : status === 'collected'
              ? `Svoz uložen. Rozdíl: ${formatMoney(data.difference_cash_czk || 0)}.`
              : 'Stav svozu je uložený.',
          status === 'not_collected' ? 'warning' : 'success'
        )
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se uložit svoz hotovosti: ${error.message || error}`, 'error')
      }
    }

    async function loadPlan() {
      if (!routeId) {
        state.plan = null
        state.cashReports = []
        return
      }

      const numericId = Number(routeId)
      if (Number.isFinite(numericId) && String(numericId) === String(routeId)) {
        const { data, error } = await supabase
          .from('route_plans')
          .select('id, planning_date, title, vehicle_id, planned_employee_id, optimization_provider, provider_status, execution_status, assigned_at, started_at, completed_at, stop_count, estimated_distance_km, estimated_drive_minutes, estimated_service_minutes, route_payload, return_to_start, start_latitude, start_longitude, warehouse_id, created_at, route_plan_stops(id, location_id, machine_id, stop_order, status, arrived_at, completed_at, skipped_at, title, address_snapshot, city_snapshot, latitude, longitude, priority_snapshot, service_window_snapshot, estimated_service_minutes, note)')
          .eq('id', numericId)
          .maybeSingle()

        if (!error && data) {
          state.plan = buildPlan(data)
          await loadCashReports(data.id)
          return
        }

        if (error && !String(error.message || '').includes('route_plans')) {
          throw error
        }
      }

      const localPlans = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]')
      const localPlan = localPlans.find((item) => getPlanKey(item) === routeId)
      state.plan = localPlan ? buildPlan(localPlan) : null
      state.cashReports = []
    }

    async function updateRouteStatus(nextStatus) {
      if (!state.plan) return
      const routeKey = getPlanKey(state.plan)
      const nowIso = new Date().toISOString()

      const confirmed = window.confirm(
        nextStatus === 'done'
          ? 'Opravdu chceš označit trasu jako hotovou?'
          : 'Opravdu chceš trasu zrušit?'
      )
      if (!confirmed) return

      try {
        if (Number.isFinite(Number(state.plan.id))) {
          const patch = {
            execution_status: nextStatus,
            completed_at: nowIso,
          }

          const { error } = await supabase
            .from('route_plans')
            .update(patch)
            .eq('id', state.plan.id)

          if (error) throw error
        } else {
          const localPlans = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]')
          const updated = localPlans.map((item) => {
            if (getPlanKey(item) !== routeKey) return item
            return {
              ...item,
              execution_status: nextStatus,
              completed_at: nowIso,
            }
          })
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated))
        }

        setStatus(
          nextStatus === 'done' ? 'Trasa byla označena jako hotová.' : 'Trasa byla zrušena.',
          nextStatus === 'done' ? 'success' : 'warning'
        )
        await loadPlan()
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se uložit změnu trasy: ${error.message || error}`, 'error')
      }
    }

    async function initializePage() {
      try {
        await loadLookups()
        await loadPlan()
        if (state.plan) {
          statusLine.hidden = true
        } else {
          setStatus('Tahle trasa už tu není nebo nejde načíst.', 'warning')
        }
        renderDetail()
      } catch (error) {
        console.error(error)
        setStatus(`Nepodařilo se načíst detail trasy: ${error.message || error}`, 'error')
        renderDetail()
      }
    }

    initializePage()
  </script>
