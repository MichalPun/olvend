<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <title>OLVEND | QR štítky</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0b0b0d;
      --panel: rgba(18,19,24,0.94);
      --panel-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f6;
      --muted: #a5a8b2;
      --soft: #7d818c;
      --accent: #d5101a;
      --accent-hover: #b90d16;
      --success: #2ecc71;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: 0.2s ease;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(213,16,26,0.12), transparent 25%),
        linear-gradient(135deg, #09090b, #101116, #0b0b0e);
    }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .main { min-width: 0; padding: 24px; }
    .page-shell { display: grid; gap: 18px; width: min(100%, 1540px); margin: 0 auto; }
    .mobile-nav-shell { display: none; position: sticky; top: 0; z-index: 20; margin-bottom: 14px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .title h1 {
      margin: 0 0 8px;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 760px;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: #fff; box-shadow: 0 18px 36px rgba(213,16,26,0.22); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-body { padding: 18px; }
    .status-line { color: var(--muted); font-size: 14px; line-height: 1.55; }
    .content-grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .control-stack { display: grid; gap: 18px; position: sticky; top: 24px; }
    .panel-title {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.1;
    }
    .panel-subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .field-grid { display: grid; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(213,16,26,0.5);
      box-shadow: 0 0 0 3px rgba(213,16,26,0.12);
    }
    .small-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .selection-list {
      display: grid;
      gap: 10px;
      max-height: 56vh;
      overflow: auto;
      padding-right: 4px;
    }
    .selection-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: var(--panel-soft);
    }
    .selection-item input { width: 18px; min-height: 18px; margin-top: 3px; }
    .selection-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .selection-note { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .preview-wrap {
      display: grid;
      gap: 18px;
    }
    .print-root {
      position: fixed;
      left: -200vw;
      top: -200vh;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }
    body.print-view {
      background: #fff;
      color: #111;
    }
    body.print-view .layout { display: none !important; }
    body.print-view .print-root {
      position: static;
      left: auto;
      top: auto;
      width: auto;
      height: auto;
      overflow: visible;
      opacity: 1;
      pointer-events: auto;
      display: block;
      visibility: visible;
      min-height: 100vh;
    }
    .print-page { padding: 10mm; }
    .print-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 0;
      background: #fff;
      color: #111;
      flex-wrap: wrap;
    }
    .print-toolbar-copy {
      display: grid;
      gap: 4px;
    }
    .print-toolbar-title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }
    .print-toolbar-note {
      color: #5a5f6a;
      font-size: 14px;
      line-height: 1.5;
    }
    .print-toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .print-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8mm;
    }
    .preview-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .label-card {
      position: relative;
      overflow: hidden;
      background: #fff;
      color: #151515;
      border-radius: 22px;
      padding: 18px;
      min-height: 390px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .label-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(213,16,26,0.12), transparent 30%),
        linear-gradient(180deg, transparent, rgba(0,0,0,0.01));
      pointer-events: none;
    }
    .label-brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .label-logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .label-logo span { color: var(--accent); }
    .label-chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #fff2f3;
      color: #7f0f16;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(213,16,26,0.16);
    }
    .label-machine h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
    }
    .label-machine p {
      margin: 6px 0 0;
      color: #4b4f59;
      font-size: 14px;
      line-height: 1.45;
    }
    .label-main {
      display: grid;
      grid-template-columns: 138px 1fr;
      gap: 16px;
      align-items: start;
    }
    .qr-box {
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 10px;
      display: grid;
      place-items: center;
      min-height: 138px;
    }
    .qr-box img {
      display: block;
      width: 118px;
      height: 118px;
      object-fit: contain;
    }
    .label-instructions {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .instruction-block {
      padding: 12px 14px;
      border-radius: 16px;
      background: #eef1f6;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .instruction-label {
      display: block;
      margin-bottom: 6px;
      color: #7b808a;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .instruction-value {
      display: block;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }
    .label-evidence {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .evidence-pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: #fff2f3;
      border: 1px solid rgba(213,16,26,0.18);
      color: #6f0e15;
      font-size: 12px;
      font-weight: 800;
    }
    .label-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .footer-operator {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .footer-operator-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 8px 16px;
      align-items: start;
    }
    .footer-operator-col {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .footer-title {
      color: #7b808a;
      font-size: 10px;
      line-height: 1.3;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .footer-line {
      color: #5b6070;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }
    .footer-line.compact {
      line-height: 1.3;
    }
    .empty-state {
      padding: 28px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .count-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }
    @media (max-width: 1120px) {
      .content-grid { grid-template-columns: 1fr; }
      .control-stack { position: static; }
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      .mobile-nav-shell { display: block; }
      aside.sidebar { display: none; }
      .preview-grid { grid-template-columns: 1fr; }
      .label-main { grid-template-columns: 1fr; }
    }
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body {
        background: #fff;
        color: #111;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body.printing > :not(.print-root) {
        display: none !important;
      }
      body.printing .print-root {
        position: static !important;
        left: auto !important;
        top: auto !important;
        width: auto !important;
        height: auto !important;
        overflow: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        display: block !important;
        visibility: visible !important;
      }
      body.printing .print-root * { visibility: visible !important; }
      body.printing .print-root,
      body.printing .print-root .print-page,
      body.printing .print-root .print-grid {
        background: #fff !important;
        color: #111 !important;
      }
      .print-toolbar { display: none !important; }
      .print-page {
        padding: 0 !important;
      }
      .print-grid {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 8mm !important;
        align-items: start !important;
      }
      .label-card {
        min-height: 86mm;
        height: auto !important;
        break-inside: avoid;
        page-break-inside: avoid;
        box-shadow: none !important;
        background: #fff !important;
        color: #111 !important;
        border: 1px solid rgba(0,0,0,0.12) !important;
        padding: 14px !important;
      }
      .label-card::after {
        display: none !important;
      }
      .label-main {
        grid-template-columns: 118px 1fr !important;
        gap: 12px !important;
      }
      .qr-box {
        min-height: 118px !important;
        padding: 8px !important;
      }
      .qr-box img {
        width: 100px !important;
        height: 100px !important;
      }
      .label-machine h3 {
        font-size: 18px !important;
      }
      .label-machine p,
      .instruction-value {
        font-size: 12px !important;
        line-height: 1.35 !important;
      }
      .instruction-block {
        padding: 10px 12px !important;
        background: #eef1f6 !important;
      }
      .label-chip,
      .evidence-pill,
      .footer-line,
      .instruction-label,
      .footer-title {
        font-size: 10px !important;
      }
      .label-logo,
      .label-machine h3,
      .instruction-value,
      .footer-line,
      .instruction-label,
      .label-machine p,
      .label-chip,
      .evidence-pill {
        color: inherit !important;
      }
      .label-logo span {
        color: #d5101a !important;
      }
      .label-chip,
      .evidence-pill,
      .qr-box {
        box-shadow: none !important;
      }
      .label-chip,
      .evidence-pill {
        background: #fff2f3 !important;
        border: 1px solid rgba(213,16,26,0.22) !important;
      }
      .qr-box {
        background: #fff !important;
      }
      .instruction-block {
        border: 1px solid rgba(0,0,0,0.10) !important;
      }
      .label-footer {
        border-top: 1px solid rgba(0,0,0,0.12) !important;
        grid-template-columns: minmax(0, 1fr) auto !important;
      }
      .footer-operator-grid {
        grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr) !important;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="mobile-nav-shell" id="mobileNavShell"></div>
      <div class="page-shell">
        <div class="topbar">
          <div class="title">
            <h1>QR štítky</h1>
            <p>Vyber typ štítku a tiskni.</p>
          </div>
          <div class="actions">
            <button class="btn secondary" id="refreshBtn" type="button">Obnovit</button>
            <button class="btn primary" id="printBtn" type="button">Tisk štítků</button>
          </div>
        </div>

        <section class="panel">
          <div class="panel-body">
            <div class="status-line" id="statusLine">Načítám automaty a QR štítky...</div>
            <div class="content-grid">
              <div class="control-stack">
                <section class="panel">
                  <div class="panel-body">
                    <h2 class="panel-title">Výběr automatů</h2>
                    <div class="field-grid">
                      <div class="field">
                        <label for="labelType">Typ štítku</label>
                        <select id="labelType">
                          <option value="compact">Krátký štítek</option>
                          <option value="info">Informační štítek</option>
                        </select>
                      </div>
                      <div class="field">
                        <label for="searchInput">Hledat</label>
                        <input id="searchInput" type="text" placeholder="Název, lokalita, typ, ev. číslo..." />
                      </div>
                      <div class="field">
                        <label for="locationFilter">Lokalita</label>
                        <select id="locationFilter"><option value="">Všechny lokality</option></select>
                      </div>
                      <div class="field">
                        <label for="activeFilter">Aktivita</label>
                        <select id="activeFilter">
                          <option value="active">Jen aktivní</option>
                          <option value="">Všechny</option>
                          <option value="inactive">Jen neaktivní</option>
                        </select>
                      </div>
                    </div>
                    <div class="small-actions" style="margin-top:16px;">
                      <button class="btn secondary" id="selectVisibleBtn" type="button">Vybrat viditelné</button>
                      <button class="btn secondary" id="clearSelectionBtn" type="button">Vyčistit</button>
                    </div>
                    <div class="selection-list" id="selectionList" style="margin-top:16px;"></div>
                  </div>
                </section>
              </div>

              <div class="preview-wrap">
                <div class="preview-head">
                  <div>
                    <h2 class="panel-title" style="margin:0;">Náhled štítků</h2>
                  </div>
                  <div class="count-chip" id="selectedCountChip">Vybráno 0</div>
                </div>
                <section class="panel">
                  <div class="panel-body">
                    <div class="preview-grid" id="previewGrid"></div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div class="print-root" id="printRoot" aria-hidden="true"></div>

  <script src="./sidebar.js?v=20260422b"></script>
  <script type="module">
    import { supabase } from './supabase.js'

    const PRINT_JOB_KEY = 'olvend-machine-qr-print-job'
    const params = new URLSearchParams(window.location.search)
    const isPrintMode = params.get('mode') === 'print'
    const statusLine = document.getElementById('statusLine')
    const refreshBtn = document.getElementById('refreshBtn')
    const printBtn = document.getElementById('printBtn')
    const searchInput = document.getElementById('searchInput')
    const labelType = document.getElementById('labelType')
    const locationFilter = document.getElementById('locationFilter')
    const activeFilter = document.getElementById('activeFilter')
    const selectVisibleBtn = document.getElementById('selectVisibleBtn')
    const clearSelectionBtn = document.getElementById('clearSelectionBtn')
    const selectionList = document.getElementById('selectionList')
    const previewGrid = document.getElementById('previewGrid')
    const selectedCountChip = document.getElementById('selectedCountChip')
    const printRoot = document.getElementById('printRoot')

    let machines = []
    let locations = []
    let filteredMachines = []
    let selectedLabelType = 'compact'
    const selectedIds = new Set()
    let printTriggered = false

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    function normalizeText(value) {
      return String(value ?? '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim()
    }

    function setStatus(message, tone = 'muted') {
      statusLine.textContent = message || ''
      statusLine.style.color = tone === 'error' ? '#ff9ba1' : tone === 'success' ? '#9be7ba' : ''
    }

    function getLocationLabel(locationId) {
      const location = locations.find((item) => String(item.id) === String(locationId))
      if (!location) return 'Bez lokality'
      return [location.name, location.city].filter(Boolean).join(' · ')
    }

    function getEvidenceNumber(machine) {
      if (machine?.evidence_number != null && machine?.evidence_number !== '') return String(machine.evidence_number)
      const token = String(machine?.qr_token || '')
      const match = token.match(/vendsoft-(\d+)/i)
      return match ? match[1] : null
    }

    function buildQrTargetUrl(machine) {
      return `${window.location.origin}${window.location.pathname.replace(/\/[^/]*$/, '/') || '/'}machine-qr.html?qr=${encodeURIComponent(machine.qr_token || '')}`
    }

    function buildQrImageUrl(machine) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=0&data=${encodeURIComponent(buildQrTargetUrl(machine))}`
    }

    function syncSelectionFromQuery() {
      if (isPrintMode) return
      const params = new URLSearchParams(window.location.search)
      const machineId = params.get('machine')
      const qrToken = params.get('qr')
      if (machineId) selectedIds.add(String(machineId))
      if (qrToken) {
        const found = machines.find((item) => String(item.qr_token) === String(qrToken))
        if (found) selectedIds.add(String(found.id))
      }
    }

    function populateLocationFilter() {
      const options = ['<option value="">Všechny lokality</option>']
      locations
        .slice()
        .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'cs'))
        .forEach((location) => {
          const label = [location.name, location.city].filter(Boolean).join(' · ')
          options.push(`<option value="${escapeHtml(String(location.id))}">${escapeHtml(label)}</option>`)
        })
      locationFilter.innerHTML = options.join('')
    }

    function applyFilters() {
      const query = normalizeText(searchInput.value)
      const locationId = locationFilter.value
      const active = activeFilter.value

      filteredMachines = machines.filter((machine) => {
        if (locationId && String(machine.location_id || '') !== String(locationId)) return false
        if (active === 'active' && machine.active === false) return false
        if (active === 'inactive' && machine.active !== false) return false
        if (!query) return true
        const haystack = normalizeText([
          machine.name,
          machine.machine_type,
          machine.brand,
          machine.model,
          machine.serial_number,
          getEvidenceNumber(machine),
          machine.qr_token,
          getLocationLabel(machine.location_id)
        ].filter(Boolean).join(' '))
        return haystack.includes(query)
      })
    }

    function renderSelectionList() {
      if (!filteredMachines.length) {
        selectionList.innerHTML = '<div class="empty-state">Tomuhle filtru teď neodpovídá žádný automat.</div>'
        return
      }

      selectionList.innerHTML = filteredMachines.map((machine) => `
        <label class="selection-item">
          <input type="checkbox" value="${escapeHtml(String(machine.id))}" ${selectedIds.has(String(machine.id)) ? 'checked' : ''} />
          <div>
            <div class="selection-title">${escapeHtml(machine.name || 'Bez názvu')}</div>
            <div class="selection-note">${escapeHtml(getLocationLabel(machine.location_id))}</div>
            <div class="selection-note">${escapeHtml([machine.machine_type, machine.brand, machine.model].filter(Boolean).join(' · ') || 'Bez detailu')}</div>
            <div class="selection-note">${escapeHtml(getEvidenceNumber(machine) ? `Ev. č. ${getEvidenceNumber(machine)}` : 'Bez evidenčního čísla')}</div>
          </div>
        </label>
      `).join('')
    }

    function buildInstructionText() {
      if (selectedLabelType === 'info') {
        return 'Automat nefunguje, nevydal zboží nebo je problém s platbou? Naskenuj QR a odešli hlášení.'
      }
      return 'Naskenuj při problému s automatem nebo platbou.'
    }

    function buildLabelMarkup(machine) {
      const evidenceNumber = getEvidenceNumber(machine)
      const qrImageUrl = buildQrImageUrl(machine)
      const typeLabel = selectedLabelType === 'info' ? 'Informační štítek' : 'Servis QR'

      return `
        <article class="label-card">
          <div class="label-brand">
            <div class="label-logo">OL<span>VEND</span></div>
            <div class="label-chip">${escapeHtml(typeLabel)}</div>
          </div>
          <div class="label-machine">
            <h3>${escapeHtml(machine.name || 'Bez názvu')}</h3>
            <p>${escapeHtml(getLocationLabel(machine.location_id))}</p>
          </div>
          <div class="label-main">
            <div class="qr-box">
              <img src="${escapeHtml(qrImageUrl)}" alt="QR ${escapeHtml(machine.name || 'automatu')}" loading="lazy" />
            </div>
            <div class="label-instructions">
              <div class="label-evidence">
                <div class="evidence-pill">${escapeHtml(evidenceNumber ? `Ev. č. ${evidenceNumber}` : 'Ev. č. bez čísla')}</div>
                <div class="evidence-pill">${escapeHtml(machine.machine_type || 'Automat')}</div>
              </div>
              <div class="instruction-block">
                <span class="instruction-label">${selectedLabelType === 'info' ? 'Jak použít QR' : 'Pomoc s automatem'}</span>
                <span class="instruction-value">${escapeHtml(buildInstructionText())}</span>
              </div>
            </div>
          </div>
          <div class="label-footer">
            <div class="footer-operator">
              <div class="footer-title">Provozovatel</div>
              <div class="footer-operator-grid">
                <div class="footer-operator-col">
                  <div class="footer-line">OLMIKA s.r.o.</div>
                  <div class="footer-line compact">Lidická 700/19 · 602 00 Brno</div>
                </div>
                <div class="footer-operator-col">
                  <div class="footer-line compact">IČ: 04579968 · DIČ: CZ04579968</div>
                  <div class="footer-line compact">www.olmika.cz</div>
                </div>
              </div>
            </div>
            <div class="footer-line"><strong>Ev. č.</strong> ${escapeHtml(evidenceNumber || 'Bez čísla')}</div>
          </div>
        </article>
      `
    }

    function getSelectedMachines() {
      return machines.filter((machine) => selectedIds.has(String(machine.id)))
    }

    function renderPreview() {
      const selectedMachines = getSelectedMachines()
      selectedCountChip.textContent = `Vybráno ${selectedMachines.length}`

      if (!selectedMachines.length) {
        previewGrid.innerHTML = '<div class="empty-state">Vyber vlevo aspoň jeden automat. Hned tady uvidíš, jak budou štítky vypadat při tisku.</div>'
        return
      }

      previewGrid.innerHTML = selectedMachines.map(buildLabelMarkup).join('')
    }

    function buildPrintMarkup(selectedMachines) {
      return `
        <section class="print-toolbar">
          <div class="print-toolbar-copy">
            <div class="print-toolbar-title">QR štítky k tisku</div>
            <div class="print-toolbar-note">Zkontroluj rozložení a pak spusť tisk. Tahle stránka už ukazuje jen vybrané štítky.</div>
          </div>
          <div class="print-toolbar-actions">
            <button class="btn secondary" type="button" id="backFromPrintViewBtn">Zpět</button>
            <button class="btn primary" type="button" id="confirmPrintBtn">Tisknout teď</button>
          </div>
        </section>
        <main class="print-page">
          <section class="print-grid">
            ${selectedMachines.map(buildLabelMarkup).join('')}
          </section>
        </main>
      `
    }

    function persistPrintJob(selectedMachines) {
      sessionStorage.setItem(PRINT_JOB_KEY, JSON.stringify({
        ids: selectedMachines.map((machine) => String(machine.id)),
        labelType: selectedLabelType || 'compact'
      }))
    }

    function restorePrintJob() {
      try {
        const raw = sessionStorage.getItem(PRINT_JOB_KEY)
        if (!raw) return false
        const payload = JSON.parse(raw)
        const ids = Array.isArray(payload?.ids) ? payload.ids.map((item) => String(item)) : []
        selectedIds.clear()
        ids.forEach((id) => selectedIds.add(id))
        selectedLabelType = payload?.labelType || 'compact'
        if (labelType) labelType.value = selectedLabelType
        return ids.length > 0
      } catch (error) {
        console.error(error)
        return false
      }
    }

    function clearPrintJob() {
      sessionStorage.removeItem(PRINT_JOB_KEY)
    }

    function waitForImages(target = document) {
      const root = target?.querySelectorAll ? target : document
      const images = Array.from(root.querySelectorAll('img') || [])
      if (!images.length) return Promise.resolve()

      return Promise.all(images.map((img) => {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve()
        return new Promise((resolve) => {
          const done = () => resolve()
          img.addEventListener('load', done, { once: true })
          img.addEventListener('error', done, { once: true })
          window.setTimeout(done, 2500)
        })
      }))
    }

    function waitForPrintCycle() {
      return new Promise((resolve) => {
        let resolved = false
        let fallbackTimer = null

        const done = () => {
          if (resolved) return
          resolved = true
          window.removeEventListener('afterprint', done)
          if (fallbackTimer) window.clearTimeout(fallbackTimer)
          resolve()
        }

        window.addEventListener('afterprint', done, { once: true })
        fallbackTimer = window.setTimeout(done, 4000)
      })
    }

    function leavePrintMode() {
      clearPrintJob()
      window.location.replace('machine-qr-print.html')
    }

    async function triggerPrintFromView() {
      if (printTriggered) return
      printTriggered = true

      try {
        setStatus('Připravuju tisk štítků...', 'muted')
        document.body.classList.add('printing', 'print-view')
        await waitForImages(printRoot)
        await new Promise((resolve) => window.setTimeout(resolve, 300))
        window.focus()
        window.print()
        await waitForPrintCycle()
        setStatus('Tisk štítků je připravený.', 'success')
      } catch (error) {
        console.error(error)
        setStatus('Tisk štítků se nepodařilo připravit.', 'error')
      } finally {
        document.body.classList.remove('printing')
        printTriggered = false
      }
    }

    async function runPrintMode() {
      if (printTriggered) return

      const selectedMachines = getSelectedMachines()
      if (!selectedMachines.length) {
        setStatus('Pro tisk chybí vybrané štítky.', 'error')
        window.setTimeout(leavePrintMode, 1200)
        return
      }

      printRoot.innerHTML = buildPrintMarkup(selectedMachines)
      document.body.classList.add('print-view')

      printRoot.querySelector('#backFromPrintViewBtn')?.addEventListener('click', leavePrintMode)
      printRoot.querySelector('#confirmPrintBtn')?.addEventListener('click', triggerPrintFromView)
      setStatus(`Připraveno ${selectedMachines.length} štítků. Klikni na „Tisknout teď“.`, 'success')
    }

    function openPrintWindow() {
      const selectedMachines = getSelectedMachines()
      if (!selectedMachines.length) {
        setStatus('Nejdřív vyber aspoň jeden štítek k tisku.', 'error')
        return
      }
      persistPrintJob(selectedMachines)
      window.location.href = 'machine-qr-print.html?mode=print'
    }

    function renderAll() {
      applyFilters()
      renderSelectionList()
      renderPreview()
      setStatus(`Vidíš ${filteredMachines.length} automatů. Vybrané štítky můžeš rovnou vytisknout nebo uložit do PDF.`, 'success')
    }

    async function loadData() {
      setStatus('Načítám automaty a lokality...')
      const [{ data: machineData, error: machineError }, { data: locationData, error: locationError }] = await Promise.all([
        supabase
          .from('machines')
          .select('*')
          .order('name', { ascending: true }),
        supabase
          .from('locations')
          .select('id, name, city')
          .order('name', { ascending: true })
      ])

      if (machineError) throw machineError
      if (locationError) throw locationError

      machines = machineData || []
      locations = locationData || []
      syncSelectionFromQuery()
      if (isPrintMode && !restorePrintJob()) {
        setStatus('Pro tisk se nepodařilo obnovit vybrané štítky. Otevírám běžný přehled.', 'error')
        window.setTimeout(() => {
          window.location.replace('machine-qr-print.html')
        }, 1200)
        return
      }
      populateLocationFilter()
      renderAll()
      if (isPrintMode) {
        await runPrintMode()
      }
    }

    selectionList.addEventListener('change', (event) => {
      const input = event.target
      if (!(input instanceof HTMLInputElement) || input.type !== 'checkbox') return
      const id = String(input.value)
      if (input.checked) selectedIds.add(id)
      else selectedIds.delete(id)
      renderPreview()
    })

    searchInput.addEventListener('input', renderAll)
    labelType.addEventListener('change', () => {
      selectedLabelType = labelType.value || 'compact'
      renderPreview()
    })
    locationFilter.addEventListener('change', renderAll)
    activeFilter.addEventListener('change', renderAll)

    selectVisibleBtn.addEventListener('click', () => {
      filteredMachines.forEach((machine) => selectedIds.add(String(machine.id)))
      renderSelectionList()
      renderPreview()
    })

    clearSelectionBtn.addEventListener('click', () => {
      selectedIds.clear()
      renderSelectionList()
      renderPreview()
    })

    refreshBtn.addEventListener('click', loadData)
    printBtn.addEventListener('click', openPrintWindow)

    loadData().catch((error) => {
      console.error(error)
      selectionList.innerHTML = '<div class="empty-state">Nepodařilo se načíst automaty pro tisk QR štítků.</div>'
      previewGrid.innerHTML = '<div class="empty-state">Náhled QR štítků zatím není k dispozici.</div>'
      setStatus(`Nepodařilo se načíst QR štítky: ${error.message}`, 'error')
    })
  </script>
</body>
</html>
