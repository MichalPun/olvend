<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <title>OLVEND | Telemetrie</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f5;
      --ink: #20242a;
      --muted: #6f7782;
      --line: #d9dee5;
      --line-strong: #c4ccd6;
      --blue: #2563eb;
      --red: #d5101a;
      --green: #22a06b;
      --amber: #f5a524;
      --danger: #e5484d;
      --shadow: 0 18px 44px rgba(16, 24, 40, 0.1);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .layout { display: grid; grid-template-columns: 240px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { display:flex; flex-direction:column; padding:24px 18px; border-right:1px solid rgba(12,18,28,0.1); background:#101319; }
    .mobile-nav-shell { display:none; position:sticky; top:0; z-index:20; margin-bottom:10px; }
    .main { min-width: 0; padding: 18px; }
    .page { display:grid; gap: 12px; width: min(100%, 1680px); margin: 0 auto; }
    .topbar {
      display:grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 14px;
      align-items:end;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .meta-line { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; color:var(--muted); font-size:12px; font-weight:700; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    button, input, select { font: inherit; }
    .btn {
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      height: 36px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }
    .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn.danger { color: var(--danger); border-color: #f0b6ba; background: #fff7f7; }
    .btn:disabled { opacity: .55; cursor: wait; }
    .toolbar {
      display:grid;
      grid-template-columns: 280px 160px minmax(180px, 1fr) 160px;
      gap: 8px;
      align-items:center;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
    }
    .input, .select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      outline: none;
      font-size: 13px;
    }
    .input:focus, .select:focus, .sheet-input:focus { border-color: var(--blue); box-shadow: inset 0 0 0 1px var(--blue); }
    .workspace { display:grid; grid-template-columns: 310px minmax(0, 1fr); gap: 12px; min-height: 680px; }
    .machine-list, .sheet-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .machine-list { display:grid; grid-template-rows: auto auto minmax(0, 1fr); }
    .machine-list-head { padding: 10px; border-bottom: 1px solid var(--line); display:grid; gap:8px; }
    .segments { display:grid; grid-template-columns: repeat(3, 1fr); border:1px solid var(--line-strong); }
    .segment {
      border:0;
      border-right:1px solid var(--line-strong);
      height:32px;
      background:#fff;
      cursor:pointer;
      font-size:12px;
      font-weight:800;
      color:var(--muted);
    }
    .segment:last-child { border-right:0; }
    .segment.active { background:#111827; color:#fff; }
    .machine-scroll { overflow:auto; max-height: calc(100vh - 250px); }
    .machine-row {
      width:100%;
      display:grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 8px;
      align-items:center;
      border:0;
      border-bottom:1px solid var(--line);
      background:#fff;
      padding: 10px;
      text-align:left;
      cursor:pointer;
    }
    .machine-row:nth-child(even) { background:#fafbfc; }
    .machine-row.active { background:#eaf1ff; box-shadow: inset 3px 0 0 var(--blue); }
    .machine-code { font-weight:900; color:#111827; }
    .machine-name { font-weight:800; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .machine-sub { color:var(--muted); font-size:12px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pill {
      display:inline-flex;
      align-items:center;
      height:22px;
      padding:0 8px;
      border:1px solid var(--line-strong);
      background:#fff;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill.ok { color:#0f7a4f; background:#e9f8f1; border-color:#b8e3cf; }
    .pill.warn { color:#9a5c00; background:#fff6dd; border-color:#f4d58a; }
    .pill.bad { color:#b42318; background:#fff0f0; border-color:#f0b6ba; }
    .quick-stats {
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .stat { padding: 10px 12px; border-right: 1px solid var(--line); min-width:0; }
    .stat:last-child { border-right:0; }
    .stat-label { color:var(--muted); font-size:11px; font-weight:900; text-transform:uppercase; }
    .stat-value { margin-top:4px; font-size:18px; font-weight:900; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sheet-head {
      display:grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items:center;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }
    .machine-title { display:flex; gap:8px; align-items:center; min-width:0; }
    .machine-title strong { font-size:18px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .link-grid {
      display:grid;
      grid-template-columns: 110px 150px 110px 150px auto;
      gap: 8px;
      align-items:center;
    }
    .cell-label { color:var(--muted); font-size:11px; font-weight:900; text-transform:uppercase; }
    .sheet-wrap { overflow:auto; max-height: calc(100vh - 272px); }
    table { width:100%; min-width: 1240px; border-collapse: collapse; table-layout: fixed; }
    th, td { border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      height: 34px;
      background: #f0f3f7;
      color: #687180;
      font-size: 12px;
      font-weight: 900;
      text-align:left;
      padding: 0 8px;
    }
    th.num, td.num { text-align:right; }
    tr:nth-child(even) td { background:#fbfcfd; }
    tr:hover td { background:#eef6ff; }
    td { height: 34px; padding: 0; background:#fff; vertical-align:middle; }
    .sheet-input {
      width:100%;
      min-width:0;
      height:34px;
      border:0;
      background:transparent;
      color:var(--ink);
      padding: 0 8px;
      outline:none;
      font-size:13px;
    }
    .sheet-input.num { text-align:right; }
    .stock-cell { display:grid; grid-template-columns: 1fr 42px; align-items:center; height:34px; }
    .stock-bar { height:18px; margin-left:6px; background:#f1f3f5; position:relative; overflow:hidden; border:1px solid #e3e7ec; }
    .stock-bar span { position:absolute; inset:0 auto 0 0; width:0; background:#a8ddb5; }
    .stock-bar.warn span { background:#ffd58c; }
    .stock-bar.bad span { background:#f5a3a8; }
    .stock-bar strong { position:absolute; inset:0; display:grid; place-items:center; font-size:12px; z-index:1; }
    .row-actions { display:flex; gap:5px; justify-content:center; }
    .icon-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line-strong);
      background:#fff;
      cursor:pointer;
      font-weight:900;
      color:var(--muted);
    }
    .status-line { min-height:20px; color:var(--muted); font-size:12px; font-weight:800; padding: 0 2px; }
    .status-line.success { color:#0f7a4f; }
    .status-line.error { color:#b42318; }
    .empty { padding: 28px; color: var(--muted); font-weight:800; text-align:center; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display:none; }
      .mobile-nav-shell { display:block; }
      .workspace { grid-template-columns:1fr; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .link-grid { grid-template-columns: 1fr 1fr; }
      .quick-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .main { padding: 10px; }
      .topbar, .sheet-head { grid-template-columns:1fr; }
      .actions { justify-content:flex-start; }
      .toolbar { grid-template-columns:1fr; }
      h1 { font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="mobile-nav-shell" id="mobileNavShell"></div>
      <div class="page">
        <section class="topbar">
          <div>
            <h1>Telemetrie</h1>
            <div class="meta-line">
              <span>DEX</span>
              <span>Planogram</span>
              <span>Sloty</span>
              <span>Countery</span>
            </div>
          </div>
          <div class="actions">
            <button class="btn" id="reloadBtn" type="button">Obnovit</button>
            <button class="btn" id="templateBtn" type="button">Vzorové řádky</button>
            <button class="btn primary" id="saveBtn" type="button">Uložit</button>
          </div>
        </section>

        <section class="toolbar">
          <input class="input" id="searchInput" type="search" placeholder="Hledat automat, ID, sériové číslo" />
          <select class="select" id="providerSelect">
            <option value="IMA">IMA / VendSoft</option>
            <option value="GP">GP</option>
          </select>
          <input class="input" id="telemetryUrl" type="text" readonly />
          <div class="status-line" id="statusLine"></div>
        </section>

        <section class="workspace">
          <aside class="machine-list">
            <div class="machine-list-head">
              <div class="segments">
                <button class="segment active" type="button" data-type-filter="all">Vše</button>
                <button class="segment" type="button" data-type-filter="food">Potraviny</button>
                <button class="segment" type="button" data-type-filter="coffee">Káva</button>
              </div>
              <div class="status-line" id="listStatus"></div>
            </div>
            <div class="quick-stats" id="listStats"></div>
            <div class="machine-scroll" id="machineList"></div>
          </aside>

          <section class="sheet-panel">
            <div class="sheet-head">
              <div class="machine-title">
                <span class="pill" id="machineTypePill">-</span>
                <strong id="activeMachineTitle">Vyber automat</strong>
                <span class="pill" id="linkPill">Bez linku</span>
              </div>
              <div class="link-grid">
                <span class="cell-label">Telemetry ID</span>
                <input class="input" id="telemetryIdInput" type="text" />
                <span class="cell-label">Poslední DEX</span>
                <input class="input" id="lastDexInput" type="text" readonly />
                <button class="btn" id="saveLinkBtn" type="button">Uložit link</button>
              </div>
            </div>
            <div class="quick-stats" id="machineStats"></div>
            <div class="sheet-wrap">
              <table aria-label="Telemetrický planogram">
                <colgroup>
                  <col style="width:74px" />
                  <col style="width:78px" />
                  <col style="width:98px" />
                  <col style="width:100px" />
                  <col style="width:300px" />
                  <col style="width:120px" />
                  <col style="width:92px" />
                  <col style="width:92px" />
                  <col style="width:92px" />
                  <col style="width:108px" />
                  <col style="width:116px" />
                  <col style="width:92px" />
                </colgroup>
                <thead>
                  <tr>
                    <th>Volba</th>
                    <th class="num">Cena</th>
                    <th>Aktuálně</th>
                    <th class="num">DEX ks</th>
                    <th>Název produktu</th>
                    <th>SKU</th>
                    <th class="num">Poslední</th>
                    <th class="num">Kapacita</th>
                    <th class="num">DEX cena</th>
                    <th class="num">Potřebné</th>
                    <th>Trvanlivost</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="sheetBody">
                  <tr><td colspan="12"><div class="empty">Vyber automat vlevo</div></td></tr>
                </tbody>
              </table>
            </div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <script src="./sidebar.js?v=20260526telemetry"></script>
  <script type="module">
    import { supabase } from './supabase.js'

    const TELEMETRY_ENDPOINT = 'https://rerjlkrhiytgscjerqgs.supabase.co/functions/v1/gp-vendsoft-telemetry'
    const state = {
      machines: [],
      links: [],
      slots: [],
      states: [],
      counters: [],
      activeMachineId: null,
      typeFilter: 'all'
    }

    const els = {
      status: document.getElementById('statusLine'),
      listStatus: document.getElementById('listStatus'),
      listStats: document.getElementById('listStats'),
      machineList: document.getElementById('machineList'),
      sheetBody: document.getElementById('sheetBody'),
      search: document.getElementById('searchInput'),
      provider: document.getElementById('providerSelect'),
      telemetryUrl: document.getElementById('telemetryUrl'),
      title: document.getElementById('activeMachineTitle'),
      typePill: document.getElementById('machineTypePill'),
      linkPill: document.getElementById('linkPill'),
      telemetryId: document.getElementById('telemetryIdInput'),
      lastDex: document.getElementById('lastDexInput'),
      machineStats: document.getElementById('machineStats'),
      save: document.getElementById('saveBtn'),
      saveLink: document.getElementById('saveLinkBtn'),
      reload: document.getElementById('reloadBtn'),
      template: document.getElementById('templateBtn')
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    function normalizeText(value) {
      return String(value ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
    }

    function numberOrNull(value) {
      const raw = String(value ?? '').replace(',', '.').trim()
      if (!raw) return null
      const parsed = Number(raw)
      return Number.isFinite(parsed) ? parsed : null
    }

    function intOrNull(value) {
      const parsed = numberOrNull(value)
      return parsed == null ? null : Math.round(parsed)
    }

    function getEvidence(machine) {
      if (machine?.evidence_number != null && machine.evidence_number !== '') return String(machine.evidence_number)
      const match = String(machine?.qr_token || '').match(/vendsoft-(\d+)/i)
      return match ? match[1] : ''
    }

    function isCoffee(machine) {
      return normalizeText(machine?.machine_type).includes('coffee') || normalizeText(machine?.name).includes('luce') || normalizeText(machine?.name).includes('kava')
    }

    function getMachineKind(machine) {
      return isCoffee(machine) ? 'coffee' : 'food'
    }

    function getLink(machineId) {
      return state.links.find((item) => String(item.machine_id) === String(machineId) && item.provider === els.provider.value) || null
    }

    function getTelemetryState(machineId) {
      return state.states.find((item) => String(item.machine_id) === String(machineId) && item.provider === els.provider.value) || null
    }

    function getSlots(machineId) {
      return state.slots
        .filter((item) => String(item.machine_id) === String(machineId) && item.active !== false)
        .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0) || String(a.slot_code || '').localeCompare(String(b.slot_code || ''), 'cs', { numeric: true }))
    }

    function getCounter(machineId, slot) {
      const slotCode = String(slot.slot_code || '').replace(/^0+(\d)/, '$1')
      return state.counters.find((item) => String(item.machine_id) === String(machineId) && item.provider === els.provider.value && String(item.selection_code || '').replace(/^0+(\d)/, '$1') === slotCode) || null
    }

    function formatDateTime(value) {
      if (!value) return ''
      const date = new Date(value)
      if (Number.isNaN(date.getTime())) return String(value)
      return date.toLocaleString('cs-CZ', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })
    }

    function setStatus(message, type = '') {
      els.status.textContent = message || ''
      els.status.className = `status-line ${type}`.trim()
    }

    function renderStats() {
      const linked = state.machines.filter((machine) => getLink(machine.id)).length
      const withSlots = new Set(state.slots.filter((slot) => slot.active !== false).map((slot) => String(slot.machine_id))).size
      els.listStats.innerHTML = [
        ['Automaty', state.machines.length],
        ['Linky', linked],
        ['Planogram', withSlots],
        ['Káva', state.machines.filter(isCoffee).length],
        ['Potraviny', state.machines.filter((machine) => !isCoffee(machine)).length]
      ].map(([label, value]) => `<div class="stat"><div class="stat-label">${escapeHtml(label)}</div><div class="stat-value">${escapeHtml(value)}</div></div>`).join('')
    }

    function getFilteredMachines() {
      const query = normalizeText(els.search.value)
      return state.machines.filter((machine) => {
        const kind = getMachineKind(machine)
        if (state.typeFilter !== 'all' && kind !== state.typeFilter) return false
        const link = getLink(machine.id)
        const haystack = normalizeText([getEvidence(machine), machine.name, machine.machine_type, machine.brand, machine.model, machine.serial_number, link?.external_machine_id].filter(Boolean).join(' '))
        return !query || haystack.includes(query)
      })
    }

    function renderMachines() {
      const machines = getFilteredMachines()
      els.listStatus.textContent = `${machines.length} z ${state.machines.length}`
      els.machineList.innerHTML = machines.map((machine) => {
        const link = getLink(machine.id)
        const slotCount = getSlots(machine.id).length
        const active = String(machine.id) === String(state.activeMachineId)
        const pillClass = link ? 'ok' : 'warn'
        return `
          <button class="machine-row ${active ? 'active' : ''}" type="button" data-machine-id="${escapeHtml(machine.id)}">
            <span class="machine-code">${escapeHtml(getEvidence(machine) || machine.id)}</span>
            <span>
              <span class="machine-name">${escapeHtml(machine.name || 'Bez názvu')}</span>
              <span class="machine-sub">${escapeHtml([machine.machine_type, machine.serial_number].filter(Boolean).join(' · ') || 'Bez detailu')}</span>
            </span>
            <span class="pill ${pillClass}">${escapeHtml(link?.external_machine_id || `${slotCount} slotů`)}</span>
          </button>
        `
      }).join('') || '<div class="empty">Nic nenalezeno</div>'
      renderStats()
    }

    function renderMachineHeader(machine) {
      if (!machine) {
        els.title.textContent = 'Vyber automat'
        els.typePill.textContent = '-'
        els.linkPill.textContent = 'Bez linku'
        els.telemetryId.value = ''
        els.lastDex.value = ''
        els.machineStats.innerHTML = ''
        return
      }
      const link = getLink(machine.id)
      const telemetry = getTelemetryState(machine.id)
      const slots = getSlots(machine.id)
      const low = slots.filter((slot) => Number(slot.current_units ?? slot.capacity_units ?? 0) <= Math.max(1, Number(slot.desired_units || 0))).length
      els.title.textContent = `[${getEvidence(machine) || machine.id}] ${machine.name || 'Automat'}`
      els.typePill.textContent = isCoffee(machine) ? 'Káva' : 'Potraviny'
      els.linkPill.textContent = link ? `ID ${link.external_machine_id}` : 'Bez linku'
      els.linkPill.className = `pill ${link ? 'ok' : 'warn'}`
      els.telemetryId.value = link?.external_machine_id || ''
      els.lastDex.value = telemetry?.last_seen_at ? formatDateTime(telemetry.last_seen_at) : ''
      els.machineStats.innerHTML = [
        ['Sloty', slots.length],
        ['Doplnit', low],
        ['Countery', telemetry?.counters_payload?.product_counter_count ?? '-'],
        ['Terminál', telemetry?.counters_payload?.terminal_id ?? '-'],
        ['Stav', telemetry?.connectivity_status || '-']
      ].map(([label, value]) => `<div class="stat"><div class="stat-label">${escapeHtml(label)}</div><div class="stat-value">${escapeHtml(value)}</div></div>`).join('')
    }

    function stockClass(current, capacity) {
      if (!capacity) return ''
      const ratio = Number(current || 0) / Number(capacity)
      if (ratio <= 0.25) return 'bad'
      if (ratio <= 0.55) return 'warn'
      return ''
    }

    function rowHtml(slot = {}, index = 0) {
      const current = slot.current_units ?? ''
      const capacity = slot.capacity_units ?? ''
      const pct = capacity ? Math.max(0, Math.min(100, Math.round((Number(current || 0) / Number(capacity)) * 100))) : 0
      const counter = state.activeMachineId ? getCounter(state.activeMachineId, slot) : null
      return `
        <tr data-slot-id="${escapeHtml(slot.id || '')}">
          <td><input class="sheet-input" data-field="slot_code" value="${escapeHtml(slot.slot_code || '')}" /></td>
          <td><input class="sheet-input num" data-field="price_czk" inputmode="decimal" value="${escapeHtml(slot.price_czk ?? '')}" /></td>
          <td>
            <div class="stock-cell">
              <div class="stock-bar ${stockClass(current, capacity)}"><span style="width:${pct}%"></span><strong>${escapeHtml(current || 0)} / ${escapeHtml(capacity || 0)}</strong></div>
              <input class="sheet-input num" data-field="current_units" inputmode="numeric" value="${escapeHtml(current)}" />
            </div>
          </td>
          <td><input class="sheet-input num" value="${escapeHtml(counter?.last_total_count ?? '')}" readonly /></td>
          <td><input class="sheet-input" data-field="product_name" value="${escapeHtml(slot.product_name || '')}" /></td>
          <td><input class="sheet-input" data-field="product_sku" value="${escapeHtml(slot.product_sku || '')}" /></td>
          <td><input class="sheet-input num" data-field="last_units" inputmode="numeric" value="${escapeHtml(slot.last_units ?? slot.capacity_units ?? '')}" /></td>
          <td><input class="sheet-input num" data-field="capacity_units" inputmode="numeric" value="${escapeHtml(capacity)}" /></td>
          <td><input class="sheet-input num" data-field="dex_price_czk" inputmode="decimal" value="${escapeHtml(slot.dex_price_czk ?? slot.price_czk ?? '')}" /></td>
          <td><input class="sheet-input num" data-field="desired_units" inputmode="numeric" value="${escapeHtml(slot.desired_units ?? '')}" /></td>
          <td><input class="sheet-input" data-field="expiry_date" type="date" value="${escapeHtml(slot.expiry_date || '')}" /></td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" type="button" data-row-action="insert" title="Vložit řádek">+</button>
              <button class="icon-btn" type="button" data-row-action="remove" title="Odebrat řádek">×</button>
            </div>
            <input type="hidden" data-field="sort_order" value="${escapeHtml(slot.sort_order ?? index)}" />
            <input type="hidden" data-field="telemetry_key" value="${escapeHtml(slot.telemetry_key || slot.slot_code || '')}" />
          </td>
        </tr>
      `
    }

    function renderSheet() {
      const machine = state.machines.find((item) => String(item.id) === String(state.activeMachineId))
      renderMachineHeader(machine)
      if (!machine) {
        els.sheetBody.innerHTML = '<tr><td colspan="12"><div class="empty">Vyber automat vlevo</div></td></tr>'
        return
      }
      const slots = getSlots(machine.id)
      els.sheetBody.innerHTML = slots.length
        ? slots.map(rowHtml).join('')
        : '<tr><td colspan="12"><div class="empty">Bez řádků. Použij Vzorové řádky nebo + v tabulce.</div></td></tr>'
    }

    function makeTemplateRows(machine) {
      const coffee = isCoffee(machine)
      const names = coffee
        ? ['Espresso', 'Espresso lungo', 'Cappuccino', 'Latte macchiato', 'Caffe latte', 'Horká čokoláda', 'Čaj citron', 'Flat white']
        : ['QXE Energetický nápoj 250ml plech', 'Hell Energetický nápoj classic 250ml', 'Red Bull 0,25l', 'Relax Limonáda liči 330ml plech', 'Pepsi Cola 500ml PET', 'Kofola Original 500ml PET', 'ATM - Belgická bageta', 'ATM - Kuřecí stripsy']
      return names.map((name, index) => ({
        slot_code: coffee ? String(index + 1) : String([1, 2, 3, 4, 12, 14, 23, 24][index]),
        product_name: name,
        price_czk: coffee ? [25, 30, 35, 39, 39, 35, 25, 45][index] : [19, 27, 48, 25, 33, 32, 55, 55][index],
        dex_price_czk: coffee ? [25, 30, 35, 39, 39, 35, 25, 45][index] : [19, 27, 48, 25, 33, 29, 55, 55][index],
        current_units: coffee ? 999 : [3, 6, 4, 5, 4, 6, 2, 1][index],
        capacity_units: coffee ? 999 : [6, 6, 6, 6, 6, 6, 5, 5][index],
        desired_units: coffee ? 0 : [3, 0, 2, 1, 2, 0, 3, 4][index],
        sort_order: index,
        active: true
      }))
    }

    function addTemplateRows() {
      const machine = state.machines.find((item) => String(item.id) === String(state.activeMachineId))
      if (!machine) return
      const currentRows = Array.from(els.sheetBody.querySelectorAll('tr[data-slot-id]'))
      const templateRows = makeTemplateRows(machine).map((slot, index) => rowHtml(slot, currentRows.length + index)).join('')
      if (!currentRows.length) els.sheetBody.innerHTML = templateRows
      else els.sheetBody.insertAdjacentHTML('beforeend', templateRows)
    }

    function readRows() {
      return Array.from(els.sheetBody.querySelectorAll('tr')).map((tr, index) => {
        const get = (field) => tr.querySelector(`[data-field="${field}"]`)?.value ?? ''
        const slotCode = get('slot_code').trim()
        const productName = get('product_name').trim()
        if (!slotCode && !productName) return null
        const capacity = intOrNull(get('capacity_units'))
        const current = intOrNull(get('current_units'))
        return {
          id: tr.dataset.slotId || null,
          payload: {
            machine_id: Number(state.activeMachineId),
            slot_code: slotCode,
            product_name: productName || 'Bez názvu',
            product_sku: get('product_sku').trim() || null,
            price_czk: numberOrNull(get('price_czk')),
            dex_price_czk: numberOrNull(get('dex_price_czk')),
            capacity_units: capacity,
            current_units: current,
            fill_percent: current != null && capacity ? Math.round((current / capacity) * 10000) / 100 : null,
            last_units: intOrNull(get('last_units')),
            desired_units: intOrNull(get('desired_units')),
            expiry_date: get('expiry_date') || null,
            telemetry_key: get('telemetry_key').trim() || slotCode || null,
            sort_order: index,
            active: true
          }
        }
      }).filter(Boolean)
    }

    async function saveLink() {
      const machineId = Number(state.activeMachineId)
      const externalId = els.telemetryId.value.trim()
      if (!machineId || !externalId) throw new Error('Chybí automat nebo Telemetry ID.')
      const { error } = await supabase.from('machine_external_links').upsert({
        machine_id: machineId,
        provider: els.provider.value,
        external_machine_id: externalId,
        telemetry_enabled: true,
        note: 'Nastaveno v Telemetrie.'
      }, { onConflict: 'provider,external_machine_id' })
      if (error) throw error
    }

    async function saveRows() {
      const rows = readRows()
      for (const row of rows) {
        if (row.id) {
          const { error } = await supabase.from('machine_planogram_slots').update(row.payload).eq('id', row.id)
          if (error) throw error
        } else {
          const { error } = await supabase.from('machine_planogram_slots').insert([row.payload])
          if (error) throw error
        }
      }
      await saveLink().catch((error) => {
        if (els.telemetryId.value.trim()) throw error
      })
    }

    async function loadData() {
      setStatus('Načítám...')
      const [machinesRes, linksRes, statesRes, slotsRes, countersRes] = await Promise.all([
        supabase.from('machines').select('id, name, machine_type, brand, model, serial_number, evidence_number, qr_token, active, status').eq('active', true).order('evidence_number', { ascending: true, nullsFirst: false }),
        supabase.from('machine_external_links').select('machine_id, provider, external_machine_id, telemetry_enabled'),
        supabase.from('machine_telemetry_state').select('machine_id, provider, last_seen_at, connectivity_status, counters_payload'),
        supabase.from('machine_planogram_slots').select('id, machine_id, slot_code, product_name, product_sku, price_czk, dex_price_czk, capacity_units, current_units, fill_percent, last_units, desired_units, expiry_date, telemetry_key, active, sort_order'),
        supabase.from('telemetry_planogram_counters').select('provider, machine_id, planogram_slot_id, selection_code, last_total_count, last_event_at')
      ])
      if (machinesRes.error) throw machinesRes.error
      if (linksRes.error) throw linksRes.error
      if (statesRes.error) throw statesRes.error
      if (slotsRes.error) throw slotsRes.error
      state.machines = machinesRes.data || []
      state.links = linksRes.data || []
      state.states = statesRes.data || []
      state.slots = slotsRes.data || []
      state.counters = countersRes.error ? [] : countersRes.data || []
      if (!state.activeMachineId && state.machines.length) {
        const firstFood = state.machines.find((machine) => !isCoffee(machine))
        state.activeMachineId = firstFood?.id || state.machines[0].id
      }
      els.telemetryUrl.value = TELEMETRY_ENDPOINT
      renderMachines()
      renderSheet()
      setStatus('Načteno', 'success')
    }

    els.machineList.addEventListener('click', (event) => {
      const button = event.target.closest('[data-machine-id]')
      if (!button) return
      state.activeMachineId = button.dataset.machineId
      renderMachines()
      renderSheet()
    })

    document.querySelectorAll('[data-type-filter]').forEach((button) => {
      button.addEventListener('click', () => {
        state.typeFilter = button.dataset.typeFilter
        document.querySelectorAll('[data-type-filter]').forEach((item) => item.classList.toggle('active', item === button))
        renderMachines()
      })
    })

    els.search.addEventListener('input', renderMachines)
    els.provider.addEventListener('change', () => {
      renderMachines()
      renderSheet()
    })
    els.template.addEventListener('click', addTemplateRows)
    els.reload.addEventListener('click', () => loadData().catch((error) => setStatus(error.message, 'error')))
    els.saveLink.addEventListener('click', async () => {
      try {
        els.saveLink.disabled = true
        await saveLink()
        await loadData()
        setStatus('Link uložen', 'success')
      } catch (error) {
        setStatus(error.message, 'error')
      } finally {
        els.saveLink.disabled = false
      }
    })
    els.save.addEventListener('click', async () => {
      try {
        els.save.disabled = true
        await saveRows()
        await loadData()
        setStatus('Uloženo', 'success')
      } catch (error) {
        setStatus(error.message, 'error')
      } finally {
        els.save.disabled = false
      }
    })
    els.sheetBody.addEventListener('click', async (event) => {
      const action = event.target.closest('[data-row-action]')?.dataset.rowAction
      if (!action) return
      const row = event.target.closest('tr')
      if (action === 'insert') {
        row.insertAdjacentHTML('afterend', rowHtml({}, els.sheetBody.querySelectorAll('tr').length))
      }
      if (action === 'remove') {
        const id = row.dataset.slotId
        if (id) {
          const { error } = await supabase.from('machine_planogram_slots').update({ active: false }).eq('id', id)
          if (error) return setStatus(error.message, 'error')
        }
        row.remove()
      }
    })
    els.sheetBody.addEventListener('input', (event) => {
      const field = event.target.dataset.field
      if (!['current_units', 'capacity_units'].includes(field)) return
      const row = event.target.closest('tr')
      const current = intOrNull(row.querySelector('[data-field="current_units"]')?.value)
      const capacity = intOrNull(row.querySelector('[data-field="capacity_units"]')?.value)
      const bar = row.querySelector('.stock-bar')
      const label = row.querySelector('.stock-bar strong')
      const pct = capacity ? Math.max(0, Math.min(100, Math.round((Number(current || 0) / Number(capacity)) * 100))) : 0
      bar.className = `stock-bar ${stockClass(current, capacity)}`.trim()
      bar.querySelector('span').style.width = `${pct}%`
      label.textContent = `${current || 0} / ${capacity || 0}`
    })

    loadData().catch((error) => setStatus(error.message, 'error'))
  </script>
</body>
</html>
