<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OLVEND v1.0 novinka</title>
  <desc id="desc">Uvodni vizual pro interni oznameni o spusteni mobilni dochazky OLVEND</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#111217" />
      <stop offset="100%" stop-color="#0b0b0e" />
    </linearGradient>
    <radialGradient id="glowRed" cx="0%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#d5101a" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#d5101a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowBlue" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2c35" />
      <stop offset="100%" stop-color="#1a1c23" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4d57" />
      <stop offset="100%" stop-color="#d5101a" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#d5101a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glowRed)" />
  <rect width="1600" height="900" fill="url(#glowBlue)" />

  <circle cx="1260" cy="160" r="240" fill="#d5101a" opacity="0.08" />
  <circle cx="150" cy="760" r="220" fill="#d5101a" opacity="0.07" />

  <g transform="translate(110 120)">
    <rect x="0" y="0" width="150" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
    <circle cx="24" cy="21" r="6" fill="#d5101a" filter="url(#glow)" />
    <text x="40" y="27" fill="#f4f4f6" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" letter-spacing="1.2">NOVINKA</text>

    <text x="0" y="130" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" letter-spacing="-3">OLVEND</text>
    <text x="405" y="130" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" letter-spacing="-3">v1.0</text>

    <text x="0" y="220" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800" letter-spacing="-2">Docházka v mobilu je spuštěná</text>
    <text x="0" y="285" fill="#b9bec9" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">
      Operátorky a technici teď mají Pokyny dne, zahájení směny,
    </text>
    <text x="0" y="327" fill="#b9bec9" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">
      pauzu i ukončení směny přehledně přímo v telefonu.
    </text>

    <g transform="translate(0 390)">
      <rect x="0" y="0" width="310" height="88" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
      <text x="28" y="33" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.1">UMÍ DNES</text>
      <text x="28" y="63" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Pokyny dne</text>

      <rect x="330" y="0" width="310" height="88" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
      <text x="358" y="33" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.1">SMĚNA</text>
      <text x="358" y="63" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Start a konec směny</text>

      <rect x="660" y="0" width="310" height="88" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
      <text x="688" y="33" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.1">BĚHEM DNE</text>
      <text x="688" y="63" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Pauza a ovládání</text>
    </g>

    <text x="0" y="640" fill="#7d818c" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">
      Interní spuštění pro tým OLMIKA
    </text>
  </g>

  <g transform="translate(1070 120)" filter="url(#softShadow)">
    <rect x="0" y="0" width="330" height="660" rx="42" fill="#0f1014" stroke="url(#panelStroke)" stroke-width="2"/>
    <rect x="22" y="22" width="286" height="616" rx="30" fill="#121318" />
    <rect x="120" y="10" width="90" height="10" rx="5" fill="#20232b" />

    <rect x="42" y="62" width="246" height="70" rx="22" fill="#171920" stroke="rgba(255,255,255,0.05)" />
    <text x="62" y="92" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="1">POKYNY DNE</text>
    <text x="62" y="118" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">1 nový pokyn</text>

    <rect x="42" y="152" width="246" height="132" rx="26" fill="rgba(213,16,26,0.12)" stroke="rgba(213,16,26,0.28)" />
    <text x="62" y="188" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Směna zahájena v 07:53</text>
    <text x="62" y="216" fill="#b9bec9" font-family="Arial, Helvetica, sans-serif" font-size="15">Místo BLUČINA · Bez vozidla</text>
    <text x="62" y="242" fill="#b9bec9" font-family="Arial, Helvetica, sans-serif" font-size="15">Manažer v kanceláři</text>

    <rect x="42" y="306" width="246" height="170" rx="26" fill="#161820" stroke="rgba(255,255,255,0.06)" />
    <text x="62" y="340" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="1">OVLÁDÁNÍ SMĚNY</text>
    <rect x="62" y="366" width="206" height="42" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" />
    <text x="145" y="393" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Pauza</text>
    <rect x="62" y="420" width="206" height="42" rx="18" fill="url(#accent)" />
    <text x="165" y="447" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Ukončit směnu</text>

    <rect x="42" y="498" width="246" height="116" rx="24" fill="#161820" stroke="rgba(255,255,255,0.06)" />
    <text x="62" y="530" fill="#8e95a3" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="1">TENTO TÝDEN</text>
    <text x="62" y="573" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">1,6 h</text>
    <text x="62" y="600" fill="#b9bec9" font-family="Arial, Helvetica, sans-serif" font-size="14">Základní přehled odpracovaného času</text>
  </g>
</svg>
