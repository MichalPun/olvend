<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OLMIKA" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>OLMIKA | Mobilní pilot</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #090a0d;
      --panel: #12151b;
      --panel-soft: #191d25;
      --border: rgba(255, 255, 255, 0.11);
      --text: #f5f7fb;
      --muted: #a8adba;
      --soft: #7d8493;
      --red: #d71825;
      --red-soft: rgba(215, 24, 37, 0.18);
      --green: #27c978;
      --green-soft: rgba(39, 201, 120, 0.16);
      --blue: #63a8ff;
      --blue-soft: rgba(99, 168, 255, 0.16);
      --yellow: #ffbf57;
      --yellow-soft: rgba(255, 191, 87, 0.15);
      --radius: 22px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(215, 24, 37, 0.18), transparent 32rem),
        linear-gradient(180deg, #090a0d 0%, #10131a 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: rgba(9, 10, 13, 0.95);
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: calc(14px + env(safe-area-inset-top)) 18px 14px;
      background: rgba(9, 10, 13, 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h3 {
      font-size: 17px;
      line-height: 1.2;
    }

    .status-pill {
      flex: 0 0 auto;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(215, 24, 37, 0.45);
      background: var(--red-soft);
      color: #ffd6da;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.running {
      border-color: rgba(39, 201, 120, 0.45);
      background: var(--green-soft);
      color: #d8ffe9;
    }

    main {
      padding: 18px 14px 116px;
    }

    .hero {
      display: grid;
      gap: 16px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(215, 24, 37, 0.95), rgba(161, 14, 24, 0.96));
      box-shadow: var(--shadow);
    }

    .hero.ready {
      background: linear-gradient(145deg, #146541, #0f4e35);
    }

    .hero p {
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border-radius: 18px;
      color: #0e1118;
      background: #ffffff;
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }

    .secondary-btn {
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--border);
    }

    .danger-btn {
      color: #ffe5e8;
      background: rgba(215, 24, 37, 0.22);
      border: 1px solid rgba(215, 24, 37, 0.44);
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 10px;
      gap: 12px;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tile,
    .card,
    details {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .tile {
      min-height: 128px;
      display: grid;
      align-content: space-between;
      padding: 16px;
      text-align: left;
      color: var(--text);
    }

    .tile small,
    .card small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--blue-soft);
      color: #b9d8ff;
      font-size: 20px;
      font-weight: 900;
    }

    .icon.red { background: var(--red-soft); color: #ffc5ca; }
    .icon.green { background: var(--green-soft); color: #cffff0; }
    .icon.yellow { background: var(--yellow-soft); color: #ffe2ad; }

    .card {
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    .row strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .badge {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      color: #dfffea;
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.red {
      color: #ffd4d8;
      background: var(--red-soft);
    }

    .badge.yellow {
      color: #ffe3ae;
      background: var(--yellow-soft);
    }

    .form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 52px;
      padding: 14px;
      border-radius: 15px;
      border: 1px solid var(--border);
      outline: none;
      color: var(--text);
      background: var(--panel-soft);
      font-size: 16px;
      font-weight: 800;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.35;
    }

    details {
      overflow: hidden;
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      list-style: none;
      font-weight: 900;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .details-body {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 10;
      width: min(100%, 430px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: rgba(13, 15, 21, 0.95);
      backdrop-filter: blur(18px);
    }

    .nav-btn {
      min-width: 0;
      min-height: 64px;
      border-radius: 18px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
      font-weight: 900;
    }

    .nav-btn.active {
      color: #fff;
      background: var(--red-soft);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .message {
      margin-bottom: 14px;
      padding: 13px 15px;
      border: 1px solid rgba(99, 168, 255, 0.35);
      border-radius: 16px;
      color: #d6e9ff;
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .message.error {
      border-color: rgba(215, 24, 37, 0.42);
      color: #ffd4d8;
      background: var(--red-soft);
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    @media (min-width: 700px) {
      body {
        padding: 24px 0;
      }

      .shell {
        min-height: calc(100vh - 48px);
        border-radius: 34px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mobilní pilot</p>
        <h1 id="screenTitle">Dnes</h1>
      </div>
      <span class="status-pill" id="shiftStatus">Načítám</span>
    </header>

    <main>
      <div id="messageArea"></div>

      <section class="screen active" data-screen="today">
        <div class="hero" id="shiftHero">
          <h2 id="heroTitle">Připravuji směnu</h2>
          <p id="heroText">Načítám pokyny dne, vozidla a tvůj stav směny.</p>
          <button class="primary-btn" id="shiftMainButton" type="button">Načítám</button>
        </div>

        <div class="section" id="instructionSection">
          <div class="section-head">
            <h2>Pokyny dne</h2>
            <span id="instructionCount">0</span>
          </div>
          <div class="stack" id="instructionList"></div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>Rychlé akce</h2>
            <span>Dnes</span>
          </div>
          <div class="grid">
            <button class="tile" data-open-screen="service" type="button">
              <span class="icon red">S</span>
              <span>
                <h3>Servisy</h3>
                <small>Otevřené zásahy a technické práce.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="stock" type="button">
              <span class="icon yellow">K</span>
              <span>
                <h3>Sklad</h3>
                <small>Nakládka, vykládka, vratky, objednat.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="vehicle" type="button">
              <span class="icon green">A</span>
              <span>
                <h3>Auto</h3>
                <small>Kilometry, tankování, závada vozidla.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="more" type="button">
              <span class="icon">V</span>
              <span>
                <h3>Více</h3>
                <small>Docházka, volno, dokumenty.</small>
              </span>
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>Teď důležité</h2>
            <span id="importantCount">0</span>
          </div>
          <div class="stack" id="importantList"></div>
        </div>
      </section>

      <section class="screen" data-screen="shift">
        <div class="card">
          <div class="form">
            <label>
              Vozidlo
              <select id="vehicleSelect"></select>
            </label>
            <label id="startKmLabel">
              Počáteční stav km
              <input id="startOdometerInput" inputmode="numeric" autocomplete="off" />
            </label>
            <label>
              Potvrzení pokynů
              <select id="instructionAckSelect">
                <option value="confirmed">Pokyny dne jsem četl a rozumím jim</option>
                <option value="none">Dnes nejsou žádné povinné pokyny</option>
              </select>
            </label>
            <button class="primary-btn" id="startShiftButton" type="button">Zahájit směnu</button>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="service">
        <div class="section-head">
          <h2>Servisy</h2>
          <span id="serviceCount">0</span>
        </div>
        <div class="stack" id="serviceList"></div>
      </section>

      <section class="screen" data-screen="stock">
        <div class="section-head">
          <h2>Sklad</h2>
          <span id="stockRequestCount">0</span>
        </div>
        <div class="grid">
          <button class="tile" data-stock-type="vehicle_order" type="button">
            <span class="icon yellow">O</span>
            <span><h3>Objednat</h3><small>Požadavek na vychystání skladníkem.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_load" type="button">
            <span class="icon green">N</span>
            <span><h3>Nakládka</h3><small>Potvrzení připraveného zboží.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_unload" type="button">
            <span class="icon">V</span>
            <span><h3>Vykládka</h3><small>Vrácení použitelného zboží na sklad.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_writeoff" type="button">
            <span class="icon red">W</span>
            <span><h3>Vratky</h3><small>Prošlé, poškozené nebo odpis.</small></span>
          </button>
        </div>

        <details class="section" open>
          <summary>
            Nový skladový doklad
            <span class="badge" id="stockTypeBadge">Objednat</span>
          </summary>
          <div class="details-body">
            <div class="form">
              <label>
                Produkt
                <input id="stockProductInput" list="productOptions" placeholder="Začni psát název, SKU nebo EAN" />
                <datalist id="productOptions"></datalist>
              </label>
              <label>
                Množství
                <input id="stockQuantityInput" inputmode="decimal" value="1" />
              </label>
              <label>
                Poznámka
                <textarea id="stockNoteInput" placeholder="Volitelné"></textarea>
              </label>
              <button class="primary-btn" id="createStockRequestButton" type="button">Uložit požadavek</button>
            </div>
          </div>
        </details>

        <div class="section">
          <div class="section-head">
            <h2>Moje doklady</h2>
            <span>Dnes</span>
          </div>
          <div class="stack" id="stockRequestList"></div>
        </div>
      </section>

      <section class="screen" data-screen="vehicle">
        <div class="card">
          <div class="form">
            <label>
              Tankování litry
              <input id="fuelLitersInput" inputmode="decimal" placeholder="Např. 42,5" />
            </label>
            <label>
              Částka
              <input id="fuelCostInput" inputmode="decimal" placeholder="Např. 1850" />
            </label>
            <label>
              Poznámka k vozidlu
              <textarea id="vehicleNoteInput" placeholder="Závada, servis vozidla, účtenka zatím mimo pilot"></textarea>
            </label>
            <button class="primary-btn" id="saveVehicleLogButton" type="button">Uložit k vozidlu</button>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="more">
        <div class="stack">
          <div class="card">
            <h2>Zaměstnanec</h2>
            <p style="margin-top: 8px; color: var(--muted); font-weight: 800;" id="employeeSummary">Načítám profil</p>
          </div>
          <button class="secondary-btn" type="button" disabled>Moje docházka</button>
          <button class="secondary-btn" type="button" disabled>Žádost o volno</button>
          <button class="secondary-btn" type="button" disabled>Dokumenty a smlouva</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-open-screen="today" type="button">Dnes</button>
      <button class="nav-btn" data-open-screen="service" type="button">Servis</button>
      <button class="nav-btn" data-open-screen="stock" type="button">Sklad</button>
      <button class="nav-btn" data-open-screen="vehicle" type="button">Auto</button>
      <button class="nav-btn" data-open-screen="more" type="button">Více</button>
    </nav>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    const state = {
      employee: null,
      attendanceDay: null,
      vehicleLog: null,
      vehicles: [],
      products: [],
      services: [],
      instructions: [],
      stockRequests: [],
      selectedStockType: 'vehicle_order'
    }

    const todayIso = new Date().toISOString().slice(0, 10)

    const els = {
      messageArea: document.getElementById('messageArea'),
      screenTitle: document.getElementById('screenTitle'),
      shiftStatus: document.getElementById('shiftStatus'),
      shiftHero: document.getElementById('shiftHero'),
      heroTitle: document.getElementById('heroTitle'),
      heroText: document.getElementById('heroText'),
      shiftMainButton: document.getElementById('shiftMainButton'),
      instructionCount: document.getElementById('instructionCount'),
      instructionList: document.getElementById('instructionList'),
      importantCount: document.getElementById('importantCount'),
      importantList: document.getElementById('importantList'),
      vehicleSelect: document.getElementById('vehicleSelect'),
      startKmLabel: document.getElementById('startKmLabel'),
      startOdometerInput: document.getElementById('startOdometerInput'),
      startShiftButton: document.getElementById('startShiftButton'),
      serviceCount: document.getElementById('serviceCount'),
      serviceList: document.getElementById('serviceList'),
      stockRequestCount: document.getElementById('stockRequestCount'),
      stockTypeBadge: document.getElementById('stockTypeBadge'),
      stockProductInput: document.getElementById('stockProductInput'),
      productOptions: document.getElementById('productOptions'),
      stockQuantityInput: document.getElementById('stockQuantityInput'),
      stockNoteInput: document.getElementById('stockNoteInput'),
      createStockRequestButton: document.getElementById('createStockRequestButton'),
      stockRequestList: document.getElementById('stockRequestList'),
      fuelLitersInput: document.getElementById('fuelLitersInput'),
      fuelCostInput: document.getElementById('fuelCostInput'),
      vehicleNoteInput: document.getElementById('vehicleNoteInput'),
      saveVehicleLogButton: document.getElementById('saveVehicleLogButton'),
      employeeSummary: document.getElementById('employeeSummary')
    }

    const screenNames = {
      today: 'Dnes',
      shift: 'Zahájení',
      service: 'Servis',
      stock: 'Sklad',
      vehicle: 'Auto',
      more: 'Více'
    }

    const stockTypeLabels = {
      vehicle_order: 'Objednat',
      vehicle_load: 'Nakládka',
      vehicle_unload: 'Vykládka',
      vehicle_sale: 'Prodej z vozidla',
      vehicle_return: 'Vratka',
      vehicle_writeoff: 'Odpis'
    }

    function showMessage(text, type = 'info') {
      els.messageArea.innerHTML = text ? `<div class="message ${type === 'error' ? 'error' : ''}">${escapeHtml(text)}</div>` : ''
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    function parseNumber(value) {
      const normalized = String(value ?? '').replace(',', '.').trim()
      if (!normalized) return null
      const number = Number(normalized)
      return Number.isFinite(number) ? number : null
    }

    function formatDateTime(value) {
      if (!value) return ''
      return new Intl.DateTimeFormat('cs-CZ', {
        day: 'numeric',
        month: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(value))
    }

    function getEmployeeName(employee = state.employee) {
      return [employee?.name, employee?.surname].filter(Boolean).join(' ') || employee?.email || 'Zaměstnanec'
    }

    function openScreen(screen) {
      document.querySelectorAll('.screen').forEach((item) => item.classList.toggle('active', item.dataset.screen === screen))
      document.querySelectorAll('.nav-btn').forEach((item) => item.classList.toggle('active', item.dataset.openScreen === screen))
      els.screenTitle.textContent = screenNames[screen] || 'Dnes'
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function renderShiftState() {
      const day = state.attendanceDay
      const isRunning = day?.status === 'open' && day?.actual_start && !day?.actual_end
      const isClosed = day?.status === 'closed' || Boolean(day?.actual_end)

      els.shiftStatus.textContent = isRunning ? 'Směna běží' : isClosed ? 'Směna ukončena' : 'Směna nezahájena'
      els.shiftStatus.classList.toggle('running', isRunning)
      els.shiftHero.classList.toggle('ready', isRunning || isClosed)

      if (isRunning) {
        els.heroTitle.textContent = 'Směna běží'
        els.heroText.textContent = `Začátek ${formatDateTime(day.actual_start)}. Pauzy a konec směny se ukládají do docházky.`
        els.shiftMainButton.textContent = 'Ukončit směnu'
      } else if (isClosed) {
        els.heroTitle.textContent = 'Dnes hotovo'
        els.heroText.textContent = `Směna byla ukončena ${formatDateTime(day.actual_end)}.`
        els.shiftMainButton.textContent = 'Zobrazit dnešek'
      } else {
        els.heroTitle.textContent = 'Začni směnu'
        els.heroText.textContent = 'Nejdřív potvrď pokyny dne, vyber auto a odsouhlas km.'
        els.shiftMainButton.textContent = 'Zahájit směnu'
      }
    }

    function renderInstructions() {
      els.instructionCount.textContent = `${state.instructions.length}`
      if (!state.instructions.length) {
        els.instructionList.innerHTML = '<div class="empty">Na dnešek nejsou žádné pokyny k potvrzení.</div>'
        return
      }

      els.instructionList.innerHTML = state.instructions.map((instruction) => `
        <div class="row">
          <div>
            <strong>${escapeHtml(instruction.title || 'Pokyn dne')}</strong>
            <span>${escapeHtml(instruction.message)}</span>
          </div>
          <span class="badge ${instruction.priority === 'critical' ? 'red' : instruction.priority === 'important' ? 'yellow' : ''}">
            ${instruction.requires_acknowledgement ? 'Potvrdit' : 'Info'}
          </span>
        </div>
      `).join('')
    }

    function renderVehicles() {
      els.vehicleSelect.innerHTML = [
        '<option value="">Bez auta</option>',
        ...state.vehicles.map((vehicle) => (
          `<option value="${vehicle.id}" data-km="${vehicle.current_odometer_km || ''}">${escapeHtml(vehicle.name || vehicle.plate)} · ${escapeHtml(vehicle.plate || '')}</option>`
        ))
      ].join('')
    }

    function renderServices() {
      const openServices = state.services.filter((item) => item.status !== 'done' && item.status !== 'cancelled')
      els.serviceCount.textContent = `${openServices.length}`

      if (!openServices.length) {
        els.serviceList.innerHTML = '<div class="empty">Nemáš přiřazený žádný otevřený servis.</div>'
        return
      }

      els.serviceList.innerHTML = openServices.map((item) => {
        const old = item.created_at && (Date.now() - new Date(item.created_at).getTime()) > 3 * 24 * 60 * 60 * 1000
        return `
          <details ${old ? 'open' : ''}>
            <summary>
              <span>${escapeHtml(item.title)}</span>
              <span class="badge ${old ? 'red' : item.priority === 'high' || item.priority === 'critical' ? 'yellow' : ''}">
                ${old ? 'Dlouho čeká' : escapeHtml(item.priority || 'normal')}
              </span>
            </summary>
            <div class="details-body">
              <div class="row">
                <div>
                  <strong>${escapeHtml(item.location_name || 'Lokalita')}</strong>
                  <span>${escapeHtml(item.description || 'Bez popisu')} ${item.due_date ? ` · termín ${escapeHtml(item.due_date)}` : ''}</span>
                </div>
              </div>
              <button class="primary-btn" data-service-action="start" data-id="${item.id}" type="button">Zahájit zásah</button>
              <button class="secondary-btn" data-service-action="followup" data-id="${item.id}" type="button">Uložit jako otevřené</button>
              <button class="danger-btn" data-service-action="replace" data-id="${item.id}" type="button">Nelze vyřešit na místě</button>
            </div>
          </details>
        `
      }).join('')
    }

    function renderImportant() {
      const items = []
      const oldServices = state.services.filter((item) => item.created_at && (Date.now() - new Date(item.created_at).getTime()) > 3 * 24 * 60 * 60 * 1000 && item.status !== 'done')
      oldServices.slice(0, 2).forEach((item) => items.push({
        title: item.title,
        text: 'Doplň důvod, proč zásah ještě není uzavřený.',
        badge: 'Servis',
        type: 'red'
      }))
      state.stockRequests.filter((item) => ['requested', 'ready'].includes(item.status)).slice(0, 2).forEach((item) => items.push({
        title: stockTypeLabels[item.request_type] || 'Sklad',
        text: item.status === 'ready' ? 'Vychystáno k potvrzení.' : 'Čeká na skladníka.',
        badge: item.status === 'ready' ? 'Převzít' : 'Čeká',
        type: item.status === 'ready' ? 'green' : 'yellow'
      }))

      els.importantCount.textContent = `${items.length}`
      els.importantList.innerHTML = items.length
        ? items.map((item) => `
          <div class="row">
            <div>
              <strong>${escapeHtml(item.title)}</strong>
              <span>${escapeHtml(item.text)}</span>
            </div>
            <span class="badge ${item.type === 'red' ? 'red' : item.type === 'yellow' ? 'yellow' : ''}">${escapeHtml(item.badge)}</span>
          </div>
        `).join('')
        : '<div class="empty">Teď není nic blokujícího.</div>'
    }

    function renderProducts() {
      els.productOptions.innerHTML = state.products.map((product) => {
        const label = [product.name, product.sku, product.ean].filter(Boolean).join(' · ')
        return `<option value="${escapeHtml(label)}"></option>`
      }).join('')
    }

    function renderStockRequests() {
      els.stockRequestCount.textContent = `${state.stockRequests.length}`
      els.stockTypeBadge.textContent = stockTypeLabels[state.selectedStockType] || 'Doklad'
      els.createStockRequestButton.textContent = state.selectedStockType === 'vehicle_order' ? 'Odeslat objednávku' : 'Uložit doklad'

      if (!state.stockRequests.length) {
        els.stockRequestList.innerHTML = '<div class="empty">Zatím tu nejsou žádné mobilní skladové doklady.</div>'
        return
      }

      els.stockRequestList.innerHTML = state.stockRequests.map((request) => `
        <div class="row">
          <div>
            <strong>${escapeHtml(stockTypeLabels[request.request_type] || request.request_type)} #${request.id}</strong>
            <span>${escapeHtml(request.note || 'Bez poznámky')} · ${escapeHtml(request.status)} · ${escapeHtml(request.requested_for_date || '')}</span>
          </div>
          <span class="badge ${request.status === 'ready' ? '' : request.status === 'cancelled' ? 'red' : 'yellow'}">${escapeHtml(request.status)}</span>
        </div>
      `).join('')
    }

    function renderEmployee() {
      els.employeeSummary.textContent = `${getEmployeeName()} · ${state.employee?.role || 'bez role'}`
    }

    function renderAll() {
      renderShiftState()
      renderInstructions()
      renderVehicles()
      renderServices()
      renderImportant()
      renderProducts()
      renderStockRequests()
      renderEmployee()
    }

    async function hydrateCurrentUser() {
      const { data: sessionData, error: sessionError } = await supabase.auth.getSession()
      if (sessionError) throw sessionError

      const authUser = sessionData?.session?.user
      if (!authUser) {
        window.location.href = 'index.html'
        return false
      }

      const { data, error } = await supabase
        .from('employees')
        .select('id, name, surname, role, email, auth_user_id, active')
        .eq('auth_user_id', authUser.id)
        .maybeSingle()

      if (error) throw error
      if (!data) {
        window.location.href = 'index.html'
        return false
      }
      state.employee = data
      return true
    }

    async function loadAttendanceDay() {
      const { data, error } = await supabase
        .from('attendance_days')
        .select('*')
        .eq('employee_id', state.employee.id)
        .eq('attendance_date', todayIso)
        .maybeSingle()
      if (error) throw error
      state.attendanceDay = data
    }

    async function loadVehicleLog() {
      if (!state.attendanceDay?.id) {
        state.vehicleLog = null
        return
      }
      const { data, error } = await supabase
        .from('vehicle_operation_logs')
        .select('*')
        .eq('attendance_day_id', state.attendanceDay.id)
        .maybeSingle()
      if (error && error.code !== 'PGRST116') throw error
      state.vehicleLog = data || null
    }

    async function loadReferenceData() {
      const [vehicles, products] = await Promise.all([
        supabase.from('vehicles').select('id, name, plate, current_odometer_km, warehouse_id, active').eq('active', true).order('name', { ascending: true }),
        supabase.from('products').select('id, name, sku, ean, base_unit').order('name', { ascending: true }).limit(120)
      ])
      if (vehicles.error) throw vehicles.error
      if (products.error) throw products.error
      state.vehicles = vehicles.data || []
      state.products = products.data || []
    }

    async function loadInstructions() {
      const { data, error } = await supabase
        .from('daily_instructions')
        .select('*')
        .eq('is_active', true)
        .lte('valid_from', todayIso)
        .or(`valid_to.is.null,valid_to.gte.${todayIso}`)
        .order('priority', { ascending: true })
      if (error) {
        state.instructions = []
        return
      }
      state.instructions = (data || []).filter((item) => {
        if (item.target_type === 'company') return true
        if (item.target_type === 'role') return String(item.target_role || '').toLowerCase() === String(state.employee.role || '').toLowerCase()
        return String(item.target_employee_id || '') === String(state.employee.id || '')
      })
    }

    async function loadServices() {
      const { data, error } = await supabase
        .from('service_requests')
        .select('id, title, description, priority, status, due_date, created_at, location_id, assigned_employee_id')
        .eq('assigned_employee_id', state.employee.id)
        .neq('status', 'cancelled')
        .order('created_at', { ascending: false })
        .limit(30)
      if (error) {
        state.services = []
        return
      }
      state.services = data || []
    }

    async function loadStockRequests() {
      const { data, error } = await supabase
        .from('mobile_stock_requests')
        .select('*')
        .eq('employee_id', state.employee.id)
        .gte('requested_for_date', todayIso)
        .order('created_at', { ascending: false })
        .limit(20)
      if (error) {
        state.stockRequests = []
        return
      }
      state.stockRequests = data || []
    }

    async function reloadData() {
      await loadAttendanceDay()
      await Promise.all([
        loadVehicleLog(),
        loadReferenceData(),
        loadInstructions(),
        loadServices(),
        loadStockRequests()
      ])
      renderAll()
    }

    async function startShift() {
      const vehicleId = els.vehicleSelect.value || null
      const selectedVehicle = state.vehicles.find((vehicle) => String(vehicle.id) === String(vehicleId))
      const startKm = vehicleId ? parseNumber(els.startOdometerInput.value) : null

      if (vehicleId && startKm === null) {
        showMessage('Doplň počáteční stav km.', 'error')
        return
      }

      const payload = {
        employee_id: state.employee.id,
        attendance_date: todayIso,
        status: 'open',
        actual_start: new Date().toISOString(),
        vehicle_id: vehicleId,
        start_warehouse_id: selectedVehicle?.warehouse_id || null
      }

      const { data, error } = await supabase
        .from('attendance_days')
        .upsert(payload, { onConflict: 'employee_id,attendance_date' })
        .select('*')
        .single()
      if (error) throw error

      state.attendanceDay = data
      await supabase.from('attendance_events').insert({
        attendance_day_id: data.id,
        employee_id: state.employee.id,
        event_type: 'shift_start',
        note: vehicleId ? `Vozidlo ${selectedVehicle?.plate || vehicleId}, km ${startKm}` : 'Bez vozidla',
        created_by: state.employee.id
      })

      if (vehicleId) {
        await supabase.from('vehicle_operation_logs').insert({
          vehicle_id: vehicleId,
          employee_id: state.employee.id,
          attendance_day_id: data.id,
          log_date: todayIso,
          started_at: payload.actual_start,
          start_odometer_km: startKm,
          status: 'open'
        })
      }

      showMessage('Směna byla zahájena.')
      openScreen('today')
      await reloadData()
    }

    async function endShift() {
      if (!state.attendanceDay?.id) {
        openScreen('shift')
        return
      }

      const endAt = new Date().toISOString()
      const update = { status: 'closed', actual_end: endAt }
      const { error } = await supabase.from('attendance_days').update(update).eq('id', state.attendanceDay.id)
      if (error) throw error

      await supabase.from('attendance_events').insert({
        attendance_day_id: state.attendanceDay.id,
        employee_id: state.employee.id,
        event_type: 'shift_end',
        created_by: state.employee.id
      })

      if (state.vehicleLog?.id) {
        await supabase.from('vehicle_operation_logs').update({
          ended_at: endAt,
          status: 'closed'
        }).eq('id', state.vehicleLog.id)
      }

      showMessage('Děkujeme za směnu. Dnešní práce je uložená.')
      await reloadData()
    }

    async function createStockRequest() {
      const productText = els.stockProductInput.value.trim()
      const quantity = parseNumber(els.stockQuantityInput.value)

      if (!productText) {
        showMessage('Vyber nebo napiš produkt.', 'error')
        return
      }
      if (!quantity || quantity <= 0) {
        showMessage('Zadej množství větší než nula.', 'error')
        return
      }

      const product = state.products.find((item) => {
        const haystack = [item.name, item.sku, item.ean].filter(Boolean).join(' · ')
        return haystack === productText || productText.toLowerCase().includes(String(item.name || '').toLowerCase())
      })

      const vehicleId = state.attendanceDay?.vehicle_id || state.vehicleLog?.vehicle_id || null
      const { data: request, error } = await supabase
        .from('mobile_stock_requests')
        .insert({
          request_type: state.selectedStockType,
          status: state.selectedStockType === 'vehicle_order' ? 'requested' : 'confirmed',
          employee_id: state.employee.id,
          vehicle_id: vehicleId,
          attendance_day_id: state.attendanceDay?.id || null,
          requested_for_date: todayIso,
          confirmed_by: state.selectedStockType === 'vehicle_order' ? null : state.employee.id,
          confirmed_at: state.selectedStockType === 'vehicle_order' ? null : new Date().toISOString(),
          note: els.stockNoteInput.value.trim() || null
        })
        .select('*')
        .single()
      if (error) throw error

      const { error: itemError } = await supabase.from('mobile_stock_request_items').insert({
        request_id: request.id,
        product_id: product?.id || null,
        product_name: product?.name || productText,
        sku: product?.sku || null,
        unit: product?.base_unit || 'ks',
        requested_quantity: quantity,
        confirmed_quantity: state.selectedStockType === 'vehicle_order' ? null : quantity,
        note: els.stockNoteInput.value.trim() || null
      })
      if (itemError) throw itemError

      els.stockProductInput.value = ''
      els.stockQuantityInput.value = '1'
      els.stockNoteInput.value = ''
      showMessage(state.selectedStockType === 'vehicle_order' ? 'Objednávka byla odeslána skladníkovi.' : 'Skladový doklad byl uložen.')
      await loadStockRequests()
      renderStockRequests()
      renderImportant()
    }

    async function saveVehicleLog() {
      if (!state.vehicleLog?.id) {
        showMessage('Nejdřív zahaj směnu s vozidlem.', 'error')
        return
      }

      const fuelLiters = parseNumber(els.fuelLitersInput.value)
      const fuelCost = parseNumber(els.fuelCostInput.value)
      const { error } = await supabase.from('vehicle_operation_logs').update({
        fuel_liters: fuelLiters,
        fuel_cost: fuelCost,
        fuel_note: els.vehicleNoteInput.value.trim() || null
      }).eq('id', state.vehicleLog.id)
      if (error) throw error

      showMessage('Údaje k vozidlu jsou uložené.')
      await loadVehicleLog()
    }

    async function handleServiceAction(action, id) {
      if (action === 'start') {
        const { error } = await supabase.from('service_requests').update({
          status: 'in_progress',
          service_started_at: new Date().toISOString()
        }).eq('id', id)
        if (error) throw error
        showMessage('Zásah je označený jako rozpracovaný.')
      }

      if (action === 'followup') {
        const { error } = await supabase.from('mobile_service_followups').insert({
          service_request_id: id,
          employee_id: state.employee.id,
          attendance_day_id: state.attendanceDay?.id || null,
          followup_reason: 'Zásah zůstává otevřený, důvod bude doplněn v ostré obrazovce.',
          next_required_at: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString(),
          escalation_level: 1
        })
        if (error) throw error
        showMessage('Servis zůstává otevřený a kontrola se připomene znovu.')
      }

      if (action === 'replace') {
        const { error } = await supabase.from('service_requests').update({
          status: 'in_progress',
          service_result: 'need_machine_replacement',
          internal_service_note: 'Technik označil požadavek pro rozhodnutí manažera o výměně automatu.'
        }).eq('id', id)
        if (error) throw error
        showMessage('Požadavek je připravený pro manažerské rozhodnutí.')
      }

      await loadServices()
      renderServices()
      renderImportant()
    }

    function bindEvents() {
      document.querySelectorAll('[data-open-screen]').forEach((button) => {
        button.addEventListener('click', () => openScreen(button.dataset.openScreen))
      })

      els.shiftMainButton.addEventListener('click', () => {
        const day = state.attendanceDay
        const isRunning = day?.status === 'open' && day?.actual_start && !day?.actual_end
        if (isRunning) {
          endShift().catch(handleError)
        } else {
          openScreen(day?.actual_end ? 'today' : 'shift')
        }
      })

      els.vehicleSelect.addEventListener('change', () => {
        const selected = els.vehicleSelect.selectedOptions[0]
        const km = selected?.dataset.km || ''
        els.startOdometerInput.value = km
        els.startKmLabel.style.display = els.vehicleSelect.value ? 'grid' : 'none'
      })

      els.startShiftButton.addEventListener('click', () => startShift().catch(handleError))
      els.createStockRequestButton.addEventListener('click', () => createStockRequest().catch(handleError))
      els.saveVehicleLogButton.addEventListener('click', () => saveVehicleLog().catch(handleError))

      document.querySelectorAll('[data-stock-type]').forEach((button) => {
        button.addEventListener('click', () => {
          state.selectedStockType = button.dataset.stockType
          renderStockRequests()
          document.querySelector('details.section')?.setAttribute('open', '')
        })
      })

      els.serviceList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-service-action]')
        if (!button) return
        handleServiceAction(button.dataset.serviceAction, button.dataset.id).catch(handleError)
      })
    }

    function handleError(error) {
      console.error(error)
      showMessage(error?.message || 'Akci se nepodařilo provést.', 'error')
    }

    async function init() {
      bindEvents()
      try {
        const hasUser = await hydrateCurrentUser()
        if (!hasUser) return
        await reloadData()
        showMessage('Mobilní pilot je napojený na databázi. Zatím není zapojený do přihlášení zaměstnanců.')
      } catch (error) {
        handleError(error)
      }
    }

    init()
  </script>
</body>
</html>
