<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLVEND | Obnova aplikace</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #17212b;
      background: #f4f5f7;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.12);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.10);
    }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { margin: 0; color: #475467; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>Obnovuji OLVEND</h1>
    <p>Mažu lokální cache a načítám aktuální verzi reportu docházky.</p>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        localStorage.setItem('olvendPwaBootstrapVersion', '20260713-telemetry-reports-v6');
      } finally {
        window.location.replace('report-telemetry.html?fresh=20260713-telemetry-reports-v6');
      }
    })();
  </script>
</body>
</html>
