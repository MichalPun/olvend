    async function acknowledgeRequiredInstructions() {
      const required = state.instructions.filter((instruction) => instruction.requires_acknowledgement)
      const missing = required.filter((instruction) => !state.acknowledgements.some((ack) => String(ack.instruction_id) === String(instruction.id)))
      if (!missing.length) return

      const rows = missing.map((instruction) => ({
        instruction_id: instruction.id,
        employee_id: state.employee.id,
        acknowledged_at: new Date().toISOString()
      }))
      const { error } = await supabase
        .from('instruction_acknowledgements')
        .upsert(rows, { onConflict: 'instruction_id,employee_id' })
      if (error) throw error
    }

    async function startShift() {
      const vehicleId = els.vehicleSelect.value || null
      const selectedVehicle = state.vehicles.find((vehicle) => String(vehicle.id) === String(vehicleId))
      const startKm = vehicleId ? parseNumber(els.startOdometerInput.value) : null

      if (vehicleId && startKm === null) {
        showMessage('Doplň počáteční stav km.', 'error')
        return
      }

      await acknowledgeRequiredInstructions()

      const payload = {
        employee_id: state.employee.id,
        attendance_date: todayIso,
        status: 'open',
        actual_start: new Date().toISOString(),
        vehicle_id: vehicleId,
        start_warehouse_id: selectedVehicle?.warehouse_id || null
      }

      const { data, error } = await supabase
        .from('attendance_days')
        .upsert(payload, { onConflict: 'employee_id,attendance_date' })
        .select('*')
        .single()
      if (error) throw error

      state.attendanceDay = data
      await supabase.from('attendance_events').insert({
        attendance_day_id: data.id,
        employee_id: state.employee.id,
        event_type: 'shift_start',
        note: vehicleId ? `Vozidlo ${selectedVehicle?.plate || vehicleId}, km ${startKm}` : 'Bez vozidla',
        created_by: state.employee.id
      })

      if (vehicleId) {
        await supabase.from('vehicle_operation_logs').insert({
          vehicle_id: vehicleId,
          employee_id: state.employee.id,
          attendance_day_id: data.id,
          log_date: todayIso,
          started_at: payload.actual_start,
          start_odometer_km: startKm,
          status: 'open'
        })
      }

      showMessage('Směna byla zahájena.')
      openScreen('today')
      await reloadData()
    }

    async function toggleBreak() {
      if (!state.attendanceDay?.id || state.attendanceDay.actual_end) throw new Error('Pauzu lze měnit jen během aktivní směny.')

      const nowIso = new Date().toISOString()
      const breakState = getCurrentBreakState()
      if (!breakState.isOnBreak) {
        const { error } = await supabase.from('attendance_events').insert({
          attendance_day_id: state.attendanceDay.id,
          employee_id: state.employee.id,
          event_type: 'break_start',
          event_time: nowIso,
          note: 'Pauza zahájena v mobilní verzi.',
          created_by: state.employee.id
        })
        if (error) throw error
        showMessage('Pauza byla zahájena.')
      } else {
        const diffMinutes = Math.max(0, Math.round((new Date(nowIso).getTime() - new Date(breakState.lastBreakStart.event_time).getTime()) / 60000))
        const nextBreakMinutes = Number(state.attendanceDay.break_minutes || 0) + diffMinutes
        const { error: updateError } = await supabase.from('attendance_days').update({ break_minutes: nextBreakMinutes }).eq('id', state.attendanceDay.id)
        if (updateError) throw updateError
        const { error } = await supabase.from('attendance_events').insert({
          attendance_day_id: state.attendanceDay.id,
          employee_id: state.employee.id,
          event_type: 'break_end',
          event_time: nowIso,
          note: `Pauza ukončena · ${diffMinutes} min.`,
          created_by: state.employee.id
        })
        if (error) throw error
        showMessage('Pauza byla ukončena.')
      }
      await reloadData()
    }

    async function closeOpenBreakIfNeeded(endAt) {
      const breakState = getCurrentBreakState()
      if (!breakState.isOnBreak || !breakState.lastBreakStart) return 0
      const diffMinutes = Math.max(0, Math.round((new Date(endAt).getTime() - new Date(breakState.lastBreakStart.event_time).getTime()) / 60000))
      const nextBreakMinutes = Number(state.attendanceDay.break_minutes || 0) + diffMinutes
      const { error: updateError } = await supabase.from('attendance_days').update({ break_minutes: nextBreakMinutes }).eq('id', state.attendanceDay.id)
      if (updateError) throw updateError
      const { error } = await supabase.from('attendance_events').insert({
        attendance_day_id: state.attendanceDay.id,
        employee_id: state.employee.id,
        event_type: 'break_end',
        event_time: endAt,
        note: `Pauza automaticky ukončena při konci směny · ${diffMinutes} min.`,
        created_by: state.employee.id
      })
      if (error) throw error
      return diffMinutes
    }

    async function endShift() {
      if (!state.attendanceDay?.id) {
        openScreen('shift')
        return
      }

      const endAt = new Date().toISOString()
      const endKm = state.attendanceDay.vehicle_id ? parseNumber(els.endOdometerInput.value) : null
      const startKm = state.vehicleLog?.start_odometer_km != null ? Number(state.vehicleLog.start_odometer_km) : null
      if (state.attendanceDay.vehicle_id && endKm === null) throw new Error('Doplň konečný stav km.')
      if (startKm !== null && endKm !== null && endKm < startKm) throw new Error('Konečný stav km nesmí být menší než počáteční.')

      await closeOpenBreakIfNeeded(endAt)
      const breakMinutes = getComputedBreakMinutes(endAt)
      const payableMinutes = state.attendanceDay.actual_start
        ? Math.max(0, Math.round((new Date(endAt).getTime() - new Date(state.attendanceDay.actual_start).getTime()) / 60000) - breakMinutes)
        : 0

      const update = {
        status: 'closed',
        actual_end: endAt,
        break_minutes: breakMinutes,
        payable_minutes: payableMinutes,
        note: els.endShiftNoteInput.value.trim() || state.attendanceDay.note || null
      }
      const { error } = await supabase.from('attendance_days').update(update).eq('id', state.attendanceDay.id)
      if (error) throw error

      await supabase.from('attendance_events').insert({
        attendance_day_id: state.attendanceDay.id,
        employee_id: state.employee.id,
        event_type: 'shift_end',
        created_by: state.employee.id
      })

      if (state.vehicleLog?.id) {
        await supabase.from('vehicle_operation_logs').update({
          ended_at: endAt,
          end_odometer_km: endKm,
          status: 'closed'
        }).eq('id', state.vehicleLog.id)
      }
      if (state.attendanceDay.vehicle_id && endKm !== null) {
        await supabase.from('vehicles').update({ current_odometer_km: endKm }).eq('id', state.attendanceDay.vehicle_id)
      }

      showMessage('Děkujeme za směnu. Dnešní práce je uložená.')
      openScreen('today')
      await reloadData()
    }

    function resolveProductFromInput(productText) {
      const normalized = productText.toLowerCase()
      return state.products.find((item) => {
        const label = [item.name, item.sku, item.ean].filter(Boolean).join(' · ')
        const values = [item.name, item.sku, item.ean].filter(Boolean).map((value) => String(value).toLowerCase())
        return label === productText || values.includes(normalized) || label.toLowerCase().includes(normalized)
      })
    }

    function addStockDraftItem(options = {}) {
      const productText = els.stockProductInput.value.trim()
      const quantity = parseNumber(els.stockQuantityInput.value)

      if (!productText) {
        showMessage('Vyber nebo napiš produkt.', 'error')
        return false
      }
      if (!quantity || quantity <= 0) {
        showMessage('Zadej množství větší než nula.', 'error')
        return false
      }

      const product = resolveProductFromInput(productText)
      state.stockDraftItems.push({
        product_id: product?.id || null,
        product_name: product?.name || productText,
        sku: product?.sku || null,
        unit: product?.base_unit || 'ks',
        quantity,
        note: els.stockNoteInput.value.trim() || null
      })

      els.stockProductInput.value = ''
      els.stockQuantityInput.value = '1'
      els.stockNoteInput.value = ''
      renderStockDraft()
      if (!options.silent) showMessage('Položka je přidaná do rozpracovaného dokladu.')
      window.setTimeout(() => els.stockProductInput.focus({ preventScroll: true }), 20)
      return true
    }

    function removeStockDraftItem(index) {
      state.stockDraftItems.splice(index, 1)
      renderStockDraft()
    }

    async function createStockRequest() {
      if (els.stockProductInput.value.trim() && !addStockDraftItem({ silent: true })) {
        return
      }
      if (!state.stockDraftItems.length) {
        showMessage('Přidej alespoň jednu položku.', 'error')
        return
      }

      const isOrder = state.selectedStockType === 'vehicle_order'
      const note = els.stockNoteInput.value.trim() || null
      const draftItems = state.stockDraftItems.map((item) => ({ ...item }))
      const vehicleId = state.attendanceDay?.vehicle_id || state.vehicleLog?.vehicle_id || null
      els.createStockRequestButton.disabled = true
      try {
        const { data: request, error } = await supabase
          .from('mobile_stock_requests')
          .insert({
            request_type: state.selectedStockType,
            status: isOrder ? 'requested' : 'confirmed',
            employee_id: state.employee?.id || null,
            vehicle_id: vehicleId,
            attendance_day_id: state.attendanceDay?.id || null,
            requested_for_date: todayIso,
            confirmed_by: isOrder ? null : state.employee?.id || null,
            confirmed_at: isOrder ? null : new Date().toISOString(),
            note
          })
          .select('*')
          .single()
        if (error) throw new Error(`Nepodařilo se uložit hlavičku dokladu: ${error.message}`)
        if (!request?.id) throw new Error('Doklad se uložil bez čísla požadavku.')

        const itemRows = draftItems.map((item) => ({
          request_id: request.id,
          product_id: item.product_id,
          product_name: item.product_name,
          sku: item.sku,
          unit: item.unit,
          requested_quantity: item.quantity,
          confirmed_quantity: isOrder ? null : item.quantity,
          note: item.note
        }))

        const { data: savedItems, error: itemError } = await supabase
          .from('mobile_stock_request_items')
          .insert(itemRows)
          .select('*')
        if (itemError) {
          await supabase.from('mobile_stock_requests').delete().eq('id', request.id)
          throw new Error(`Nepodařilo se uložit položky dokladu: ${itemError.message}`)
        }

        const storedItems = savedItems?.length ? savedItems : itemRows
        if (request.status === 'confirmed') {
          await applyStockRequestToInventory(request, storedItems)
        }

        state.stockDraftItems = []
        showMessage(isOrder ? 'Objednávka byla odeslána skladníkovi.' : 'Skladový doklad byl uložený a promítnutý do zásob.')
        state.stockRequests = [request, ...state.stockRequests.filter((item) => String(item.id) !== String(request.id))]
        state.stockRequestItems = [
          ...storedItems.map((item) => ({ ...item })),
          ...state.stockRequestItems.filter((item) => String(item.request_id) !== String(request.id))
        ]
        renderStockRequests()
        renderImportant()
        try {
          await loadStockRequests()
          renderStockRequests()
          renderImportant()
        } catch (reloadError) {
          console.warn('Stock request was saved, but refresh failed.', reloadError)
          showMessage(isOrder
            ? 'Objednávka byla odeslána skladníkovi. Jen se nepodařilo obnovit seznam, zkus stránku později obnovit.'
            : 'Skladový doklad byl uložený. Jen se nepodařilo obnovit seznam, zkus stránku později obnovit.')
        }
      } catch (error) {
        showMessage(error?.message === 'Load failed'
          ? 'Objednávku se nepodařilo odeslat kvůli spojení se Supabase. Zkus prosím znovu na produkční adrese olvend.onrender.com/mobile.html.'
          : error.message, 'error')
      } finally {
        renderStockDraft()
      }
    }

    async function confirmReadyStockRequest(requestId) {
      const request = state.stockRequests.find((item) => String(item.id) === String(requestId))
      if (!request) throw new Error('Doklad už není v načteném seznamu.')
      if (request.status !== 'ready') throw new Error('Potvrdit lze jen doklad připravený skladníkem.')
      await applyStockRequestToInventory(request)
      showMessage('Nakládka byla potvrzená a promítnutá do zásob.')
      await loadStockRequests()
      renderStockRequests()
      renderImportant()
    }

    async function saveVehicleLog() {
      if (!state.vehicleLog?.id) {
        showMessage('Nejdřív zahaj směnu s vozidlem.', 'error')
        return
      }

      const fuelLiters = parseNumber(els.fuelLitersInput.value)
      const fuelCost = parseNumber(els.fuelCostInput.value)
      const fuelOdometer = parseNumber(els.fuelOdometerInput.value)
      const fuelReceiptUrl = els.fuelReceiptUrlInput.value.trim()
      if ((fuelLiters || fuelCost) && !fuelReceiptUrl) throw new Error('K tankování nahraj nebo doplň účtenku.')
      const { error } = await supabase.from('vehicle_operation_logs').update({
        fuel_odometer_km: fuelOdometer,
        fuel_liters: fuelLiters,
        fuel_cost: fuelCost,
        fuel_receipt_url: fuelReceiptUrl || null,
        fuel_note: els.vehicleNoteInput.value.trim() || null
      }).eq('id', state.vehicleLog.id)
      if (error) throw error

      showMessage('Údaje k vozidlu jsou uložené.')
      await loadVehicleLog()
    }

    async function uploadFuelReceipt(file) {
      if (!file) return
      if (!String(file.type || '').toLowerCase().startsWith('image/')) throw new Error('Nahrát jde jen obrázek účtenky.')
      state.fuelReceiptUploading = true
      els.fuelReceiptStatus.textContent = `Nahrávám ${file.name}...`
      try {
        const path = buildStoragePath('fuel-receipts', file)
        const { error } = await supabase.storage.from(SHIFT_DOCUMENTS_BUCKET).upload(path, file, {
          cacheControl: '3600',
          upsert: false,
          contentType: file.type || 'image/jpeg'
        })
        if (error) {
          const message = String(error.message || '')
          if (/bucket|not found|row-level security/i.test(message)) {
            throw new Error('Úložiště účtenek ještě není připravené. Spusť databázovou přípravu pro mobilní verzi 1.6.')
          }
          throw error
        }
        const { data } = supabase.storage.from(SHIFT_DOCUMENTS_BUCKET).getPublicUrl(path)
        if (!data?.publicUrl) throw new Error('Nepodařilo se získat odkaz na účtenku.')
        els.fuelReceiptUrlInput.value = data.publicUrl
        els.fuelReceiptStatus.textContent = 'Účtenka je nahraná a připravená k uložení.'
      } finally {
        state.fuelReceiptUploading = false
      }
    }

    async function ensureStockLocation(locationType, entityId, fallbackName) {
      const idColumn = locationType === 'warehouse' ? 'warehouse_id' : locationType === 'vehicle' ? 'vehicle_id' : ''
      if (!idColumn || !entityId) throw new Error('Chybí skladové místo pro pohyb zásob.')
      const { data: existing, error: existingError } = await supabase
        .from('stock_locations')
        .select('id')
        .eq('location_type', locationType)
        .eq(idColumn, entityId)
        .limit(1)
        .maybeSingle()
      if (existingError) throw existingError
      if (existing?.id) return existing.id

      const { data: created, error } = await supabase
        .from('stock_locations')
        .insert({
          location_type: locationType,
          [idColumn]: entityId,
          name: fallbackName,
          active: true
        })
        .select('id')
        .single()
      if (error) throw error
      return created.id
    }

    async function getBalanceRecord(stockLocationId, productId) {
      const { data, error } = await supabase
        .from('stock_location_balances')
        .select('id, quantity_on_hand')
        .eq('stock_location_id', stockLocationId)
        .eq('product_id', productId)
        .is('batch_id', null)
        .limit(1)
        .maybeSingle()
      if (error) throw error
      return data || null
    }

    async function applyBalanceDelta(stockLocationId, productId, delta) {
      if (!stockLocationId || !productId || !delta) return
      const record = await getBalanceRecord(stockLocationId, productId)
      const currentQty = Number(record?.quantity_on_hand || 0)
      const nextQty = Number((currentQty + delta).toFixed(3))
      if (record?.id) {
        const { error } = await supabase
          .from('stock_location_balances')
          .update({ quantity_on_hand: nextQty, updated_at: new Date().toISOString() })
          .eq('id', record.id)
        if (error) throw error
        return
      }
      const { error } = await supabase.from('stock_location_balances').insert({
        stock_location_id: stockLocationId,
        product_id: productId,
        quantity_on_hand: nextQty,
        reserved_quantity: 0
      })
      if (error) throw error
    }

    function getRequestQuantity(item) {
      return Number(item.confirmed_quantity ?? item.prepared_quantity ?? item.requested_quantity ?? 0)
    }

    async function applyStockRequestToInventory(request, items = getStockRequestItems(request.id)) {
      if (!request?.id) throw new Error('Chybí skladový doklad.')
      if (request.stock_applied_at) return
      if (!items.length) throw new Error('Skladový doklad nemá žádné položky.')

      const vehicleId = request.vehicle_id || state.attendanceDay?.vehicle_id || state.vehicleLog?.vehicle_id || null
      const vehicle = state.vehicles.find((item) => String(item.id) === String(vehicleId))
      const warehouseId = request.warehouse_id || vehicle?.warehouse_id || null
      const referenceId = request.stock_reference_id || `mobile-stock:${request.id}`
      const movementRows = []

      let warehouseLocationId = null
      let vehicleLocationId = null
      if (warehouseId && ['vehicle_load', 'vehicle_order', 'vehicle_unload'].includes(request.request_type)) {
        warehouseLocationId = await ensureStockLocation('warehouse', warehouseId, `Sklad ${warehouseId}`)
      }
      if (vehicleId) {
        vehicleLocationId = await ensureStockLocation('vehicle', vehicleId, vehicle ? [vehicle.name, vehicle.plate].filter(Boolean).join(' · ') : `Vozidlo ${vehicleId}`)
      }

      for (const item of items) {
        const productId = item.product_id
        const quantity = getRequestQuantity(item)
        if (!productId || quantity <= 0) continue

        if (request.request_type === 'vehicle_order' || request.request_type === 'vehicle_load') {
          if (!warehouseLocationId || !vehicleLocationId) throw new Error('Pro nakládku chybí sklad nebo vozidlo.')
          await applyBalanceDelta(warehouseLocationId, productId, -quantity)
          await applyBalanceDelta(vehicleLocationId, productId, quantity)
          movementRows.push({
            product_id: productId,
            from_stock_location_id: warehouseLocationId,
            to_stock_location_id: vehicleLocationId,
            movement_type: 'load_vehicle',
            quantity_base_units: quantity,
            reference_type: 'mobile_stock_request',
            reference_id: referenceId,
            created_by: state.employee.id,
            note: `Mobilní nakládka #${request.id}`
          })
        }

        if (request.request_type === 'vehicle_unload') {
          if (!warehouseLocationId || !vehicleLocationId) throw new Error('Pro vykládku chybí sklad nebo vozidlo.')
          await applyBalanceDelta(vehicleLocationId, productId, -quantity)
          await applyBalanceDelta(warehouseLocationId, productId, quantity)
          movementRows.push({
            product_id: productId,
            from_stock_location_id: vehicleLocationId,
            to_stock_location_id: warehouseLocationId,
            movement_type: 'return',
            quantity_base_units: quantity,
            reference_type: 'mobile_stock_request',
            reference_id: referenceId,
            created_by: state.employee.id,
            note: `Mobilní vykládka #${request.id}`
          })
        }

        if (request.request_type === 'vehicle_sale') {
          if (!vehicleLocationId) throw new Error('Pro prodej chybí vozidlo.')
          await applyBalanceDelta(vehicleLocationId, productId, -quantity)
          movementRows.push({
            product_id: productId,
            from_stock_location_id: vehicleLocationId,
            movement_type: 'sale',
            quantity_base_units: quantity,
            reference_type: 'mobile_stock_request',
            reference_id: referenceId,
            created_by: state.employee.id,
            note: `Mobilní prodej z vozidla #${request.id}`
          })
        }

        if (request.request_type === 'vehicle_return' || request.request_type === 'vehicle_writeoff') {
          if (!vehicleLocationId) throw new Error('Pro vratku/odpis chybí vozidlo.')
          await applyBalanceDelta(vehicleLocationId, productId, -quantity)
          movementRows.push({
            product_id: productId,
            from_stock_location_id: vehicleLocationId,
            movement_type: 'waste',
            quantity_base_units: quantity,
            reference_type: 'mobile_stock_request',
            reference_id: referenceId,
            created_by: state.employee.id,
            note: `Mobilní vratka/odpis #${request.id}`
          })
        }
      }

      if (!movementRows.length) throw new Error('Skladový doklad nemá platnou položku se skladovou kartou.')
      const { error: movementError } = await supabase.from('stock_movements_v13').insert(movementRows)
      if (movementError) throw movementError

      const { error: requestError } = await supabase
        .from('mobile_stock_requests')
        .update({
          status: 'confirmed',
          confirmed_by: state.employee.id,
          confirmed_at: new Date().toISOString(),
          stock_applied_at: new Date().toISOString(),
          stock_reference_id: referenceId
        })
        .eq('id', request.id)
      if (requestError) throw requestError
    }

    async function handleServiceAction(action, id) {
      if (action === 'start') {
        const { error } = await supabase.from('service_requests').update({
          status: 'in_progress',
          service_started_at: new Date().toISOString()
        }).eq('id', id)
        if (error) throw error
        showMessage('Zásah je označený jako rozpracovaný.')
      }

      if (action === 'followup') {
        const { error } = await supabase.from('mobile_service_followups').insert({
          service_request_id: id,
          employee_id: state.employee.id,
          attendance_day_id: state.attendanceDay?.id || null,
          followup_reason: 'Zásah zůstává otevřený, důvod bude doplněn v ostré obrazovce.',
          next_required_at: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString(),
          escalation_level: 1
        })
        if (error) throw error
        showMessage('Servis zůstává otevřený a kontrola se připomene znovu.')
      }

      if (action === 'replace') {
        const { error } = await supabase.from('service_requests').update({
          status: 'in_progress',
          service_result: 'need_machine_replacement',
          internal_service_note: 'Technik označil požadavek pro rozhodnutí manažera o výměně automatu.'
        }).eq('id', id)
        if (error) throw error
        showMessage('Požadavek je připravený pro manažerské rozhodnutí.')
      }

      if (action === 'save-result') {
        const result = els.serviceList.querySelector(`[data-service-result][data-id="${CSS.escape(String(id))}"]`)?.value || 'fixed'
        const work = els.serviceList.querySelector(`[data-service-work][data-id="${CSS.escape(String(id))}"]`)?.value.trim() || ''
        const next = els.serviceList.querySelector(`[data-service-next][data-id="${CSS.escape(String(id))}"]`)?.value.trim() || ''
        if (!work) throw new Error('Doplň, co se na zásahu udělalo.')

        const isDone = ['fixed', 'temporary_fixed', 'not_found'].includes(result)
        const payload = {
          service_result: result,
          work_performed: work,
          next_recommendation: next || null,
          internal_service_note: result === 'need_machine_replacement'
            ? 'Technik žádá manažerské rozhodnutí o výměně nebo deinstalaci automatu.'
            : next || null,
          status: isDone ? 'done' : 'in_progress',
          service_finished_at: isDone ? new Date().toISOString() : null,
          resolution_note: isDone ? work : null
        }
        const { error } = await supabase.from('service_requests').update(payload).eq('id', id)
        if (error) throw error

        if (!isDone) {
          const delayDays = result === 'need_spare_part' ? 3 : 2
          await supabase.from('mobile_service_followups').insert({
            service_request_id: id,
            employee_id: state.employee.id,
            attendance_day_id: state.attendanceDay?.id || null,
            followup_reason: next || work,
            next_required_at: new Date(Date.now() + delayDays * 24 * 60 * 60 * 1000).toISOString(),
            escalation_level: 1
          })
        }

        showMessage(isDone ? 'Servis byl uzavřený.' : 'Servis zůstává otevřený a bude se připomínat.')
      }

      await loadServices()
      renderServices()
      renderImportant()
    }

    function bindEvents() {
      document.querySelectorAll('[data-open-screen]').forEach((button) => {
        button.addEventListener('click', () => openScreen(button.dataset.openScreen))
      })

      els.shiftMainButton.addEventListener('click', () => {
        const day = state.attendanceDay
        const isRunning = day?.status === 'open' && day?.actual_start && !day?.actual_end
        if (isRunning) {
          openScreen('today')
        } else {
          openScreen(day?.actual_end ? 'today' : 'shift')
        }
      })
      els.breakButton.addEventListener('click', () => toggleBreak().catch(handleError))
      els.openEndShiftButton.addEventListener('click', () => openScreen('end'))

      els.vehicleSelect.addEventListener('change', () => {
        const selected = els.vehicleSelect.selectedOptions[0]
        const km = selected?.dataset.km || ''
        els.startOdometerInput.value = km
        els.startKmLabel.style.display = els.vehicleSelect.value ? 'grid' : 'none'
      })

      els.startShiftButton.addEventListener('click', () => startShift().catch(handleError))
      els.endShiftButton.addEventListener('click', () => endShift().catch(handleError))
      els.addStockDraftItemButton.addEventListener('click', () => addStockDraftItem())
      els.createStockRequestButton.addEventListener('click', () => createStockRequest().catch(handleError))
      els.stockProductInput.addEventListener('input', () => renderStockDraft())
      els.stockQuantityInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault()
          addStockDraftItem()
        }
      })
      els.saveVehicleLogButton.addEventListener('click', () => saveVehicleLog().catch(handleError))
      els.fuelReceiptFileInput.addEventListener('change', () => uploadFuelReceipt(els.fuelReceiptFileInput.files?.[0]).catch(handleError))

      document.querySelectorAll('[data-stock-type]').forEach((button) => {
        button.addEventListener('click', () => {
          activateStockType(button.dataset.stockType)
        })
      })

      document.querySelectorAll('[data-more-action]').forEach((button) => {
        button.addEventListener('click', () => handleMoreAction(button.dataset.moreAction))
      })

      els.serviceList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-service-action]')
        if (!button) return
        handleServiceAction(button.dataset.serviceAction, button.dataset.id).catch(handleError)
      })
      els.stockRequestList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-stock-request-action="confirm-ready"]')
        if (!button) return
        confirmReadyStockRequest(button.dataset.requestId).catch(handleError)
      })
      els.stockDraftList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-remove-draft-index]')
        if (!button) return
        removeStockDraftItem(Number(button.dataset.removeDraftIndex))
      })
    }

    function handleError(error) {
      console.error(error)
      showMessage(error?.message || 'Akci se nepodařilo provést.', 'error')
    }

    async function init() {
      bindEvents()
      try {
        const hasUser = await hydrateCurrentUser()
        if (!hasUser) return
        await reloadData()
        showStartupMessage()
      } catch (error) {
        handleError(error)
      }
    }

    init()
  </script>
</body>
</html>
