<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OLMIKA" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>OLMIKA | Mobilní režim</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #090a0d;
      --panel: #12151b;
      --panel-soft: #191d25;
      --border: rgba(255, 255, 255, 0.11);
      --text: #f5f7fb;
      --muted: #a8adba;
      --soft: #7d8493;
      --red: #d71825;
      --red-soft: rgba(215, 24, 37, 0.18);
      --green: #27c978;
      --green-soft: rgba(39, 201, 120, 0.16);
      --blue: #63a8ff;
      --blue-soft: rgba(99, 168, 255, 0.16);
      --yellow: #ffbf57;
      --yellow-soft: rgba(255, 191, 87, 0.15);
      --radius: 22px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(215, 24, 37, 0.18), transparent 32rem),
        linear-gradient(180deg, #090a0d 0%, #10131a 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: rgba(9, 10, 13, 0.95);
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: calc(14px + env(safe-area-inset-top)) 18px 14px;
      background: rgba(9, 10, 13, 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h3 {
      font-size: 17px;
      line-height: 1.2;
    }

    .status-pill {
      flex: 0 0 auto;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(215, 24, 37, 0.45);
      background: var(--red-soft);
      color: #ffd6da;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.running {
      border-color: rgba(39, 201, 120, 0.45);
      background: var(--green-soft);
      color: #d8ffe9;
    }

    main {
      padding: 18px 14px 116px;
    }

    .hero {
      display: grid;
      gap: 16px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(215, 24, 37, 0.95), rgba(161, 14, 24, 0.96));
      box-shadow: var(--shadow);
    }

    .hero.ready {
      background: linear-gradient(145deg, #146541, #0f4e35);
    }

    .hero p {
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border-radius: 18px;
      color: #0e1118;
      background: #ffffff;
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }

    .secondary-btn {
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--border);
    }

    .danger-btn {
      color: #ffe5e8;
      background: rgba(215, 24, 37, 0.22);
      border: 1px solid rgba(215, 24, 37, 0.44);
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 10px;
      gap: 12px;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tile,
    .card,
    details {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .tile {
      min-height: 128px;
      display: grid;
      align-content: space-between;
      padding: 16px;
      text-align: left;
      color: var(--text);
    }

    .tile small,
    .card small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--blue-soft);
      color: #b9d8ff;
    }

    .icon svg,
    .nav-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon.red { background: var(--red-soft); color: #ffc5ca; }
    .icon.green { background: var(--green-soft); color: #cffff0; }
    .icon.yellow { background: var(--yellow-soft); color: #ffe2ad; }
    .icon.blue { background: var(--blue-soft); color: #b9d8ff; }
    .icon.amber { background: var(--yellow-soft); color: #ffe2ad; }

    .card {
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    .row strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .badge {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      color: #dfffea;
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.red {
      color: #ffd4d8;
      background: var(--red-soft);
    }

    .badge.yellow {
      color: #ffe3ae;
      background: var(--yellow-soft);
    }

    .stock-draft {
      display: grid;
      gap: 10px;
    }

    .draft-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.035);
    }

    .draft-line strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .draft-line span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .mini-btn {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 900;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 52px;
      padding: 14px;
      border-radius: 15px;
      border: 1px solid var(--border);
      outline: none;
      color: var(--text);
      background: var(--panel-soft);
      font-size: 16px;
      font-weight: 800;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.35;
    }

    details {
      overflow: hidden;
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      list-style: none;
      font-weight: 900;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .details-body {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 10;
      width: min(100%, 430px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: rgba(13, 15, 21, 0.95);
      backdrop-filter: blur(18px);
    }

    .nav-btn {
      min-width: 0;
      min-height: 64px;
      display: grid;
      place-items: center;
      gap: 3px;
      border-radius: 18px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 900;
    }

    .nav-btn.active {
      color: #fff;
      background: var(--red-soft);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .message {
      margin-bottom: 14px;
      padding: 13px 15px;
      border: 1px solid rgba(99, 168, 255, 0.35);
      border-radius: 16px;
      color: #d6e9ff;
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .message.error {
      border-color: rgba(215, 24, 37, 0.42);
      color: #ffd4d8;
      background: var(--red-soft);
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .compact-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .compact-actions .secondary-btn,
    .compact-actions .danger-btn {
      min-height: 54px;
      font-size: 15px;
    }

    .file-input {
      padding: 12px;
      font-size: 14px;
    }

    .service-form {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    @media (min-width: 700px) {
      body {
        padding: 24px 0;
      }

      .shell {
        min-height: calc(100vh - 48px);
        border-radius: 34px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mobilní režim 1.6</p>
        <h1 id="screenTitle">Dnes</h1>
      </div>
      <span class="status-pill" id="shiftStatus">Načítám</span>
    </header>

    <main>
      <div id="messageArea"></div>

      <section class="screen active" data-screen="today">
        <div class="hero" id="shiftHero">
          <h2 id="heroTitle">Připravuji směnu</h2>
          <p id="heroText">Načítám pokyny dne, vozidla a tvůj stav směny.</p>
          <button class="primary-btn" id="shiftMainButton" type="button">Načítám</button>
          <div class="compact-actions" id="runningShiftActions" hidden>
            <button class="secondary-btn" id="breakButton" type="button">Pauza</button>
            <button class="danger-btn" id="openEndShiftButton" type="button">Ukončit</button>
          </div>
        </div>

        <div class="section" id="instructionSection">
          <div class="section-head">
            <h2>Pokyny dne</h2>
            <span id="instructionCount">0</span>
          </div>
          <div class="stack" id="instructionList"></div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>Rychlé akce</h2>
            <span>Dnes</span>
          </div>
          <div class="grid">
            <button class="tile" data-open-screen="service" type="button">
              <span class="icon red"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 0 5.4-5.4l-3 3-3-3z"/></svg></span>
              <span>
                <h3>Servisy</h3>
                <small>Otevřené zásahy a technické práce.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="stock" type="button">
              <span class="icon amber"><svg viewBox="0 0 24 24"><path d="M4 7l8-4 8 4-8 4z"/><path d="M4 7v10l8 4 8-4V7"/><path d="M12 11v10"/></svg></span>
              <span>
                <h3>Sklad</h3>
                <small>Nakládka, vykládka, vratky, objednat.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="vehicle" type="button">
              <span class="icon green"><svg viewBox="0 0 24 24"><path d="M6 19c3 0 3-4 6-4s3 4 6 4"/><path d="M6 5h.01"/><path d="M18 5h.01"/><path d="M6 5c0 4 12 4 12 0"/></svg></span>
              <span>
                <h3>Trasa</h3>
                <small>Zastávky, stav dne a práce s vozidlem.</small>
              </span>
            </button>
            <button class="tile" data-open-screen="more" type="button">
              <span class="icon blue"><svg viewBox="0 0 24 24"><path d="M5 12h.01"/><path d="M12 12h.01"/><path d="M19 12h.01"/></svg></span>
              <span>
                <h3>Více</h3>
                <small>Docházka, volno, dokumenty.</small>
              </span>
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>Teď důležité</h2>
            <span id="importantCount">0</span>
          </div>
          <div class="stack" id="importantList"></div>
        </div>
      </section>

      <section class="screen" data-screen="shift">
        <div class="card">
          <div class="form">
            <label>
              Vozidlo
              <select id="vehicleSelect"></select>
            </label>
            <label id="startKmLabel">
              Počáteční stav km
              <input id="startOdometerInput" inputmode="numeric" autocomplete="off" />
            </label>
            <label>
              Potvrzení pokynů
              <select id="instructionAckSelect">
                <option value="confirmed">Pokyny dne jsem četl a rozumím jim</option>
                <option value="none">Dnes nejsou žádné povinné pokyny</option>
              </select>
            </label>
            <button class="primary-btn" id="startShiftButton" type="button">Zahájit směnu</button>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="end">
        <div class="card">
          <div class="form">
            <label id="endKmLabel">
              Konečný stav km
              <input id="endOdometerInput" inputmode="numeric" autocomplete="off" />
            </label>
            <label>
              Poznámka ke směně
              <textarea id="endShiftNoteInput" placeholder="Volitelné shrnutí směny"></textarea>
            </label>
            <button class="danger-btn" id="endShiftButton" type="button">Ukončit směnu</button>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="service">
        <div class="section-head">
          <h2>Servisy</h2>
          <span id="serviceCount">0</span>
        </div>
        <div class="stack" id="serviceList"></div>
      </section>

      <section class="screen" data-screen="stock">
        <div class="section-head">
          <h2>Sklad</h2>
          <span id="stockRequestCount">0</span>
        </div>
        <div class="grid">
          <button class="tile" data-stock-type="vehicle_order" type="button">
            <span class="icon red"><svg viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></span>
            <span><h3>Objednat</h3><small>Požadavek na vychystání skladníkem.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_load" type="button">
            <span class="icon green"><svg viewBox="0 0 24 24"><path d="M5 17h14"/><path d="M7 17V9h10v8"/><path d="M9 9V6h6v3"/><path d="M8 20h.01"/><path d="M16 20h.01"/></svg></span>
            <span><h3>Nakládka</h3><small>Potvrzení připraveného zboží.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_unload" type="button">
            <span class="icon blue"><svg viewBox="0 0 24 24"><path d="M19 7H5"/><path d="M17 7v8H7V7"/><path d="M9 18h6"/><path d="M12 15v6"/></svg></span>
            <span><h3>Vykládka</h3><small>Vrácení použitelného zboží na sklad.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_sale" type="button">
            <span class="icon green"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg></span>
            <span><h3>Prodej</h3><small>Dočasný odpis prodaných kusů z vozidla.</small></span>
          </button>
          <button class="tile" data-stock-type="vehicle_writeoff" type="button">
            <span class="icon amber"><svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"/><path d="M5 10h9a5 5 0 0 1 0 10h-1"/></svg></span>
            <span><h3>Vratky</h3><small>Prošlé, poškozené nebo odpis.</small></span>
          </button>
        </div>

        <details class="section" id="stockFormDetails" open>
          <summary>
            Nový skladový doklad
            <span class="badge" id="stockTypeBadge">Objednat</span>
          </summary>
          <div class="details-body">
            <div class="form">
              <label>
                Produkt
                <input id="stockProductInput" list="productOptions" placeholder="Začni psát název, SKU nebo EAN" />
                <datalist id="productOptions"></datalist>
              </label>
              <label>
                Množství
                <input id="stockQuantityInput" inputmode="decimal" value="1" />
              </label>
              <label>
                Poznámka
                <textarea id="stockNoteInput" placeholder="Volitelné"></textarea>
              </label>
              <button class="secondary-btn" id="addStockDraftItemButton" type="button">+ Přidat položku</button>
              <div class="stock-draft" id="stockDraftList"></div>
              <button class="primary-btn" id="createStockRequestButton" type="button">Uložit požadavek</button>
            </div>
          </div>
        </details>

        <div class="section">
          <div class="section-head">
            <h2>Moje doklady</h2>
            <span>Dnes</span>
          </div>
          <div class="stack" id="stockRequestList"></div>
        </div>
      </section>

      <section class="screen" data-screen="vehicle">
        <div class="card">
          <div class="form">
            <label>
              Stav km při tankování
              <input id="fuelOdometerInput" inputmode="numeric" placeholder="Např. 184240" />
            </label>
            <label>
              Tankování litry
              <input id="fuelLitersInput" inputmode="decimal" placeholder="Např. 42,5" />
            </label>
            <label>
              Částka
              <input id="fuelCostInput" inputmode="decimal" placeholder="Např. 1850" />
            </label>
            <label>
              Foto účtenky
              <input class="file-input" id="fuelReceiptFileInput" type="file" accept="image/*" capture="environment" />
            </label>
            <label>
              Odkaz na účtenku
              <input id="fuelReceiptUrlInput" type="url" placeholder="Vyplní se po nahrání, případně ruční URL" />
            </label>
            <div class="empty" id="fuelReceiptStatus">Účtenku můžeš vyfotit nebo vybrat z galerie.</div>
            <label>
              Poznámka k vozidlu
              <textarea id="vehicleNoteInput" placeholder="Závada, servis vozidla nebo poznámka k tankování"></textarea>
            </label>
            <button class="primary-btn" id="saveVehicleLogButton" type="button">Uložit k vozidlu</button>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="more">
        <div class="stack">
          <div class="card">
            <h2>Zaměstnanec</h2>
            <p style="margin-top: 8px; color: var(--muted); font-weight: 800;" id="employeeSummary">Načítám profil</p>
          </div>
          <div class="grid">
            <button class="tile" type="button" data-more-action="attendance">
              <span class="icon green"><svg viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 15h.01"/><path d="M12 15h.01"/><path d="M16 15h.01"/></svg></span>
              <span><h3>Docházka</h3><small>Směny, hodiny, pauzy a přehled dne.</small></span>
            </button>
            <button class="tile" type="button" data-more-action="leave">
              <span class="icon amber"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-7-11a7 7 0 0 1 14 0c0 6.65-7 11-7 11z"/><path d="M9 10h6"/></svg></span>
              <span><h3>Volno</h3><small>Dovolená, lékař, náhradní volno.</small></span>
            </button>
            <button class="tile" type="button" data-more-action="documents">
              <span class="icon blue"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/></svg></span>
              <span><h3>Dokumenty</h3><small>Smlouva, mzdové podklady, interní dokumenty.</small></span>
            </button>
            <button class="tile" type="button" data-more-action="profile">
              <span class="icon red"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg></span>
              <span><h3>Můj profil</h3><small>Kontakt, role a osobní nastavení.</small></span>
            </button>
            <button class="tile" type="button" onclick="window.location.href='dashboard.html'">
              <span class="icon blue"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
              <span><h3>PC přehled</h3><small>Dashboard a manažerské moduly.</small></span>
            </button>
            <button class="tile" type="button" onclick="window.location.href='settings.html'">
              <span class="icon amber"><svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05A1.8 1.8 0 0 0 15 19.4a1.8 1.8 0 0 0-1 .6 1.8 1.8 0 0 0-.5 1.3V21a2 2 0 1 1-4 0v-.08A1.8 1.8 0 0 0 8.1 19.4a1.8 1.8 0 0 0-1.98.36l-.05.05a2 2 0 1 1-2.83-2.83l.05-.05A1.8 1.8 0 0 0 3.6 15a1.8 1.8 0 0 0-.6-1 1.8 1.8 0 0 0-1.3-.5H1.6a2 2 0 1 1 0-4h.08A1.8 1.8 0 0 0 3.6 8.1a1.8 1.8 0 0 0-.36-1.98l-.05-.05a2 2 0 1 1 2.83-2.83l.05.05A1.8 1.8 0 0 0 8.1 3.6a1.8 1.8 0 0 0 1-.6 1.8 1.8 0 0 0 .5-1.3V1.6a2 2 0 1 1 4 0v.08A1.8 1.8 0 0 0 15 3.6a1.8 1.8 0 0 0 1.98-.36l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05A1.8 1.8 0 0 0 19.4 8.1a1.8 1.8 0 0 0 .6 1 1.8 1.8 0 0 0 1.3.5h.1a2 2 0 1 1 0 4h-.08A1.8 1.8 0 0 0 19.4 15z"/></svg></span>
              <span><h3>Nastavení</h3><small>Firemní a systémové volby.</small></span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-open-screen="today" type="button"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v10h12V10"/></svg><span>Dnes</span></button>
      <button class="nav-btn" data-open-screen="service" type="button"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 0 5.4-5.4l-3 3-3-3z"/></svg><span>Servis</span></button>
      <button class="nav-btn" data-open-screen="vehicle" type="button"><svg viewBox="0 0 24 24"><path d="M6 19c3 0 3-4 6-4s3 4 6 4"/><path d="M6 5h.01"/><path d="M18 5h.01"/></svg><span>Trasa</span></button>
      <button class="nav-btn" data-open-screen="stock" type="button"><svg viewBox="0 0 24 24"><path d="M4 7l8-4 8 4-8 4z"/><path d="M4 7v10l8 4 8-4V7"/></svg><span>Sklad</span></button>
      <button class="nav-btn" data-open-screen="more" type="button"><svg viewBox="0 0 24 24"><path d="M5 12h.01"/><path d="M12 12h.01"/><path d="M19 12h.01"/></svg><span>Více</span></button>
    </nav>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    const state = {
      employee: null,
      attendanceDay: null,
      vehicleLog: null,
      events: [],
      vehicles: [],
      products: [],
      services: [],
      instructions: [],
      acknowledgements: [],
      stockRequests: [],
      stockRequestItems: [],
      selectedStockType: 'vehicle_order',
      stockDraftItems: [],
      fuelReceiptUploading: false,
      setupWarnings: []
    }

    const todayIso = new Date().toISOString().slice(0, 10)
    const SHIFT_DOCUMENTS_BUCKET = 'shift-documents'
    const MOBILE_RELEASE_KEY = 'olvendSeenMobileReleaseNotesV16'

    const els = {
      messageArea: document.getElementById('messageArea'),
      screenTitle: document.getElementById('screenTitle'),
      shiftStatus: document.getElementById('shiftStatus'),
      shiftHero: document.getElementById('shiftHero'),
      heroTitle: document.getElementById('heroTitle'),
      heroText: document.getElementById('heroText'),
      shiftMainButton: document.getElementById('shiftMainButton'),
      runningShiftActions: document.getElementById('runningShiftActions'),
      breakButton: document.getElementById('breakButton'),
      openEndShiftButton: document.getElementById('openEndShiftButton'),
      instructionSection: document.getElementById('instructionSection'),
      instructionCount: document.getElementById('instructionCount'),
      instructionList: document.getElementById('instructionList'),
      importantCount: document.getElementById('importantCount'),
      importantList: document.getElementById('importantList'),
      vehicleSelect: document.getElementById('vehicleSelect'),
      startKmLabel: document.getElementById('startKmLabel'),
      startOdometerInput: document.getElementById('startOdometerInput'),
      startShiftButton: document.getElementById('startShiftButton'),
      endKmLabel: document.getElementById('endKmLabel'),
      endOdometerInput: document.getElementById('endOdometerInput'),
      endShiftNoteInput: document.getElementById('endShiftNoteInput'),
      endShiftButton: document.getElementById('endShiftButton'),
      serviceCount: document.getElementById('serviceCount'),
      serviceList: document.getElementById('serviceList'),
      stockRequestCount: document.getElementById('stockRequestCount'),
      stockFormDetails: document.getElementById('stockFormDetails'),
      stockTypeBadge: document.getElementById('stockTypeBadge'),
      stockProductInput: document.getElementById('stockProductInput'),
      productOptions: document.getElementById('productOptions'),
      stockQuantityInput: document.getElementById('stockQuantityInput'),
      stockNoteInput: document.getElementById('stockNoteInput'),
      addStockDraftItemButton: document.getElementById('addStockDraftItemButton'),
      stockDraftList: document.getElementById('stockDraftList'),
      createStockRequestButton: document.getElementById('createStockRequestButton'),
      stockRequestList: document.getElementById('stockRequestList'),
      fuelOdometerInput: document.getElementById('fuelOdometerInput'),
      fuelLitersInput: document.getElementById('fuelLitersInput'),
      fuelCostInput: document.getElementById('fuelCostInput'),
      fuelReceiptFileInput: document.getElementById('fuelReceiptFileInput'),
      fuelReceiptUrlInput: document.getElementById('fuelReceiptUrlInput'),
      fuelReceiptStatus: document.getElementById('fuelReceiptStatus'),
      vehicleNoteInput: document.getElementById('vehicleNoteInput'),
      saveVehicleLogButton: document.getElementById('saveVehicleLogButton'),
      employeeSummary: document.getElementById('employeeSummary')
    }

    const screenNames = {
      today: 'Dnes',
      shift: 'Zahájení',
      end: 'Ukončení',
      service: 'Servis',
      stock: 'Sklad',
      vehicle: 'Trasa',
      more: 'Více'
    }

    const stockTypeLabels = {
      vehicle_order: 'Objednat',
      vehicle_load: 'Nakládka',
      vehicle_unload: 'Vykládka',
      vehicle_sale: 'Prodej z vozidla',
      vehicle_return: 'Vratka',
      vehicle_writeoff: 'Odpis'
    }

    const stockTypeHelp = {
      vehicle_order: 'Vyber položku a množství. Požadavek uvidí skladník na PC jako vychystání.',
      vehicle_load: 'Potvrď položky, které fyzicky nakládáš do vozidla.',
      vehicle_unload: 'Zapiš použitelné kusy, které vracíš z vozidla zpět na sklad.',
      vehicle_sale: 'Dočasný prodej z vozidla. Použijeme do doby, než poběží telemetrie.',
      vehicle_writeoff: 'Zapiš prošlé, poškozené nebo jinak neprodejné kusy.'
    }

    function showMessage(text, type = 'info') {
      els.messageArea.innerHTML = text ? `<div class="message ${type === 'error' ? 'error' : ''}">${escapeHtml(text)}</div>` : ''
    }

    function showStartupMessage() {
      if (state.setupWarnings.length) {
        showMessage(state.setupWarnings[0], 'error')
        return
      }
      if (localStorage.getItem(MOBILE_RELEASE_KEY) !== '1.6') {
        localStorage.setItem(MOBILE_RELEASE_KEY, '1.6')
        showMessage('Nová verze 1.6: směna, servis, sklad a vozidlo jsou nově v mobilním režimu. Prosíme, hlaste cokoliv divného, ať to rychle doladíme.')
        return
      }
      showMessage('')
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    function parseNumber(value) {
      const normalized = String(value ?? '').replace(',', '.').trim()
      if (!normalized) return null
      const number = Number(normalized)
      return Number.isFinite(number) ? number : null
    }

    function formatNumber(value) {
      const number = Number(value || 0)
      return Number.isInteger(number)
        ? String(number)
        : new Intl.NumberFormat('cs-CZ', { maximumFractionDigits: 2 }).format(number)
    }

    function formatDateTime(value) {
      if (!value) return ''
      return new Intl.DateTimeFormat('cs-CZ', {
        day: 'numeric',
        month: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(value))
    }

    function getCurrentBreakState() {
      let openBreak = null
      const sorted = [...state.events].sort((a, b) => String(a.event_time || '').localeCompare(String(b.event_time || '')))
      sorted.forEach((event) => {
        if (event.event_type === 'break_start') openBreak = event
        if (event.event_type === 'break_end') openBreak = null
      })
      return {
        isOnBreak: Boolean(openBreak),
        lastBreakStart: openBreak
      }
    }

    function getComputedBreakMinutes(untilIso = new Date().toISOString()) {
      let total = 0
      let start = null
      const sorted = [...state.events].sort((a, b) => String(a.event_time || '').localeCompare(String(b.event_time || '')))
      sorted.forEach((event) => {
        if (event.event_type === 'break_start') start = event.event_time
        if (event.event_type === 'break_end' && start) {
          total += Math.max(0, Math.round((new Date(event.event_time).getTime() - new Date(start).getTime()) / 60000))
          start = null
        }
      })
      if (start) total += Math.max(0, Math.round((new Date(untilIso).getTime() - new Date(start).getTime()) / 60000))
      return total
    }

    function buildStoragePath(prefix, file) {
      const safeName = String(file?.name || 'uctenka.jpg')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9._-]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase() || 'uctenka.jpg'
      const employeeId = state.employee?.id || 'unknown'
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-')
      return `${prefix}/${todayIso}/${employeeId}/${timestamp}-${safeName}`
    }

    function getEmployeeName(employee = state.employee) {
      return [employee?.name, employee?.surname].filter(Boolean).join(' ') || employee?.email || 'Zaměstnanec'
    }

    function openScreen(screen) {
      document.querySelectorAll('.screen').forEach((item) => item.classList.toggle('active', item.dataset.screen === screen))
      document.querySelectorAll('.nav-btn').forEach((item) => item.classList.toggle('active', item.dataset.openScreen === screen))
      els.screenTitle.textContent = screenNames[screen] || 'Dnes'
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function renderShiftState() {
      const day = state.attendanceDay
      const isRunning = day?.status === 'open' && day?.actual_start && !day?.actual_end
      const isClosed = day?.status === 'closed' || Boolean(day?.actual_end)

      els.shiftStatus.textContent = isRunning ? 'Směna běží' : isClosed ? 'Směna ukončena' : 'Směna nezahájena'
      els.shiftStatus.classList.toggle('running', isRunning)
      els.shiftHero.classList.toggle('ready', isRunning || isClosed)
      els.runningShiftActions.hidden = !isRunning

      if (isRunning) {
        const breakMinutes = getComputedBreakMinutes()
        const breakState = getCurrentBreakState()
        els.heroTitle.textContent = 'Směna běží'
        els.heroText.textContent = `Začátek ${formatDateTime(day.actual_start)}. Pauza celkem ${breakMinutes} min.`
        els.shiftMainButton.textContent = 'Zobrazit dnešek'
        els.breakButton.textContent = breakState.isOnBreak ? 'Ukončit pauzu' : 'Pauza'
      } else if (isClosed) {
        els.heroTitle.textContent = 'Dnes hotovo'
        els.heroText.textContent = `Směna byla ukončena ${formatDateTime(day.actual_end)}.`
        els.shiftMainButton.textContent = 'Zobrazit dnešek'
      } else {
        els.heroTitle.textContent = 'Začni směnu'
        els.heroText.textContent = 'Nejdřív potvrď pokyny dne, vyber auto a odsouhlas km.'
        els.shiftMainButton.textContent = 'Zahájit směnu'
      }

      if (state.vehicleLog?.end_odometer_km != null) els.endOdometerInput.value = state.vehicleLog.end_odometer_km
      else if (state.vehicleLog?.start_odometer_km != null) els.endOdometerInput.value = state.vehicleLog.start_odometer_km
      els.endKmLabel.style.display = state.attendanceDay?.vehicle_id ? 'grid' : 'none'
    }

    function renderInstructions() {
      els.instructionSection.hidden = !state.instructions.length
      els.instructionCount.textContent = `${state.instructions.length}`
      if (!state.instructions.length) {
        els.instructionList.innerHTML = '<div class="empty">Na dnešek nejsou žádné pokyny k potvrzení.</div>'
        return
      }

      els.instructionList.innerHTML = state.instructions.map((instruction) => `
        <div class="row">
          <div>
            <strong>${escapeHtml(instruction.title || 'Pokyn dne')}</strong>
            <span>${escapeHtml(instruction.message)}</span>
          </div>
          <span class="badge ${instruction.priority === 'critical' ? 'red' : instruction.priority === 'important' ? 'yellow' : ''}">
            ${state.acknowledgements.some((ack) => String(ack.instruction_id) === String(instruction.id)) ? 'Potvrzeno' : instruction.requires_acknowledgement ? 'Potvrdit' : 'Info'}
          </span>
        </div>
      `).join('')
    }

    function renderVehicles() {
      els.vehicleSelect.innerHTML = [
        '<option value="">Bez auta</option>',
        ...state.vehicles.map((vehicle) => (
          `<option value="${vehicle.id}" data-km="${vehicle.current_odometer_km || ''}">${escapeHtml(vehicle.name || vehicle.plate)} · ${escapeHtml(vehicle.plate || '')}</option>`
        ))
      ].join('')
    }

    function isInstructionActiveToday(instruction) {
      if (!instruction?.is_active) return false
      if (instruction.is_persistent) return true
      const from = instruction.valid_from || todayIso
      const to = instruction.valid_to || from
      return todayIso >= from && todayIso <= to
    }

    function instructionTargetsEmployee(instruction) {
      if (!state.employee) return false
      if (instruction.target_type === 'company') return true
      if (instruction.target_type === 'role') {
        return String(instruction.target_role || '').trim().toLowerCase() === String(state.employee.role || '').trim().toLowerCase()
      }
      if (instruction.target_type === 'employee') {
        return String(instruction.target_employee_id || '') === String(state.employee.id || '')
      }
      return false
    }

    function renderServices() {
      const openServices = state.services.filter((item) => item.status !== 'done' && item.status !== 'cancelled')
      els.serviceCount.textContent = `${openServices.length}`

      if (!openServices.length) {
        els.serviceList.innerHTML = '<div class="empty">Nemáš přiřazený žádný otevřený servis.</div>'
        return
      }

      els.serviceList.innerHTML = openServices.map((item) => {
        const old = item.created_at && (Date.now() - new Date(item.created_at).getTime()) > 3 * 24 * 60 * 60 * 1000
        return `
          <details ${old ? 'open' : ''}>
            <summary>
              <span>${escapeHtml(item.title)}</span>
              <span class="badge ${old ? 'red' : item.priority === 'high' || item.priority === 'critical' ? 'yellow' : ''}">
                ${old ? 'Dlouho čeká' : escapeHtml(item.priority || 'normal')}
              </span>
            </summary>
            <div class="details-body">
              <div class="row">
                <div>
                  <strong>${escapeHtml(item.location_name || 'Lokalita')}</strong>
                  <span>${escapeHtml(item.description || 'Bez popisu')} ${item.due_date ? ` · termín ${escapeHtml(item.due_date)}` : ''}</span>
                </div>
              </div>
              <button class="primary-btn" data-service-action="start" data-id="${item.id}" type="button">Zahájit zásah</button>
              <div class="service-form">
                <label>
                  Výsledek zásahu
                  <select data-service-result data-id="${item.id}">
                    <option value="fixed">Vyřešeno</option>
                    <option value="temporary_fixed">Dočasně opraveno</option>
                    <option value="need_spare_part">Čeká na díl</option>
                    <option value="return_later">Návrat / domluva</option>
                    <option value="need_machine_replacement">Nelze vyřešit na místě</option>
                    <option value="not_found">Závada nenalezena</option>
                  </select>
                </label>
                <label>
                  Co se udělalo
                  <textarea data-service-work data-id="${item.id}" placeholder="Popiš zásah stručně a konkrétně">${escapeHtml(item.work_performed || '')}</textarea>
                </label>
                <label>
                  Díly / co chybí / další domluva
                  <textarea data-service-next data-id="${item.id}" placeholder="Díl, návrat, domluva, požadavek na manažera">${escapeHtml(item.next_recommendation || '')}</textarea>
                </label>
                <button class="primary-btn" data-service-action="save-result" data-id="${item.id}" type="button">Uložit výsledek</button>
              </div>
            </div>
          </details>
        `
      }).join('')
    }

    function renderImportant() {
      const items = []
      const oldServices = state.services.filter((item) => item.created_at && (Date.now() - new Date(item.created_at).getTime()) > 3 * 24 * 60 * 60 * 1000 && item.status !== 'done')
      oldServices.slice(0, 2).forEach((item) => items.push({
        title: item.title,
        text: 'Doplň důvod, proč zásah ještě není uzavřený.',
        badge: 'Servis',
        type: 'red'
      }))
      state.stockRequests.filter((item) => ['requested', 'ready'].includes(item.status)).slice(0, 2).forEach((item) => items.push({
        title: stockTypeLabels[item.request_type] || 'Sklad',
        text: item.status === 'ready' ? 'Vychystáno k potvrzení.' : 'Čeká na skladníka.',
        badge: item.status === 'ready' ? 'Převzít' : 'Čeká',
        type: item.status === 'ready' ? 'green' : 'yellow'
      }))

      els.importantCount.textContent = `${items.length}`
      els.importantList.innerHTML = items.length
        ? items.map((item) => `
          <div class="row">
            <div>
              <strong>${escapeHtml(item.title)}</strong>
              <span>${escapeHtml(item.text)}</span>
            </div>
            <span class="badge ${item.type === 'red' ? 'red' : item.type === 'yellow' ? 'yellow' : ''}">${escapeHtml(item.badge)}</span>
          </div>
        `).join('')
        : '<div class="empty">Teď není nic blokujícího.</div>'
    }

    function renderProducts() {
      els.productOptions.innerHTML = state.products.map((product) => {
        const label = [product.name, product.sku, product.ean].filter(Boolean).join(' · ')
        return `<option value="${escapeHtml(label)}"></option>`
      }).join('')
    }

    function renderStockRequests() {
      els.stockRequestCount.textContent = `${state.stockRequests.length}`
      els.stockTypeBadge.textContent = stockTypeLabels[state.selectedStockType] || 'Doklad'
      els.createStockRequestButton.textContent = state.selectedStockType === 'vehicle_order' ? 'Odeslat objednávku' : 'Uložit doklad'
      renderStockDraft()

      if (!state.stockRequests.length) {
        els.stockRequestList.innerHTML = '<div class="empty">Zatím tu nejsou žádné mobilní skladové doklady.</div>'
        return
      }

      els.stockRequestList.innerHTML = state.stockRequests.map((request) => `
        <div class="row">
          <div>
            <strong>${escapeHtml(stockTypeLabels[request.request_type] || request.request_type)} #${request.id}</strong>
            <span>${escapeHtml(getStockRequestItemSummary(request.id) || request.note || 'Bez položek')} · ${escapeHtml(request.status)} · ${escapeHtml(request.requested_for_date || '')}</span>
          </div>
          ${request.status === 'ready' ? `<button class="secondary-btn" style="width:auto; min-height:48px;" data-stock-request-action="confirm-ready" data-request-id="${request.id}" type="button">Převzít</button>` : `<span class="badge ${request.status === 'confirmed' ? '' : request.status === 'cancelled' ? 'red' : 'yellow'}">${escapeHtml(request.status)}</span>`}
        </div>
      `).join('')
    }

    function getStockRequestItems(requestId) {
      return state.stockRequestItems.filter((item) => String(item.request_id) === String(requestId))
    }

    function getStockRequestItemSummary(requestId) {
      return getStockRequestItems(requestId)
        .slice(0, 3)
        .map((item) => `${item.product_name || 'Produkt'} ${Number(item.prepared_quantity ?? item.confirmed_quantity ?? item.requested_quantity ?? 0).toFixed(0)} ${item.unit || 'ks'}`)
        .join(' / ')
    }

    function renderStockDraft() {
      if (!els.stockDraftList) return
      els.createStockRequestButton.disabled = !state.stockDraftItems.length && !els.stockProductInput.value.trim()
      if (!state.stockDraftItems.length) {
        els.stockDraftList.innerHTML = '<div class="empty">Rozpracovaný doklad je zatím prázdný. Přidej první položku.</div>'
        return
      }

      const total = state.stockDraftItems.reduce((sum, item) => sum + Number(item.quantity || 0), 0)
      els.stockDraftList.innerHTML = `
        <div class="section-head" style="margin: 2px 0 0;">
          <h2>Položky dokladu</h2>
          <span>${state.stockDraftItems.length} řádků · ${formatNumber(total)} ks</span>
        </div>
        ${state.stockDraftItems.map((item, index) => `
          <div class="draft-line">
            <div>
              <strong>${escapeHtml(item.product_name)}</strong>
              <span>${formatNumber(item.quantity)} ${escapeHtml(item.unit || 'ks')}${item.sku ? ` · ${escapeHtml(item.sku)}` : ''}${item.note ? ` · ${escapeHtml(item.note)}` : ''}</span>
            </div>
            <button class="mini-btn" data-remove-draft-index="${index}" type="button">Odebrat</button>
          </div>
        `).join('')}
      `
    }

    function renderEmployee() {
      els.employeeSummary.textContent = `${getEmployeeName()} · ${state.employee?.role || 'bez role'}`
    }

    function renderVehicleForm() {
      if (!state.vehicleLog) return
      els.fuelOdometerInput.value = state.vehicleLog.fuel_odometer_km ?? ''
      els.fuelLitersInput.value = state.vehicleLog.fuel_liters ?? ''
      els.fuelCostInput.value = state.vehicleLog.fuel_cost ?? ''
      els.fuelReceiptUrlInput.value = state.vehicleLog.fuel_receipt_url || ''
      els.vehicleNoteInput.value = state.vehicleLog.fuel_note || ''
      els.fuelReceiptStatus.textContent = state.vehicleLog.fuel_receipt_url

    async function hydrateCurrentUser() {
      const { data: sessionData, error: sessionError } = await supabase.auth.getSession()
      if (sessionError) throw sessionError

      const authUser = sessionData?.session?.user
      if (!authUser) {
        window.location.href = 'index.html'
        return false
      }

      const { data, error } = await supabase
        .from('employees')
        .select('id, name, surname, role, email, auth_user_id, active')
        .eq('auth_user_id', authUser.id)
        .maybeSingle()

      if (error) throw error
      if (!data) {
        window.location.href = 'index.html'
        return false
      }
      if (data.active === false) {
        await supabase.auth.signOut()
        throw new Error('Tento zaměstnanec už není aktivní. Přístup do mobilního režimu byl zastaven.')
      }
      state.employee = data
      return true
    }

    async function loadAttendanceDay() {
      const { data, error } = await supabase
        .from('attendance_days')
        .select('*')
        .eq('employee_id', state.employee.id)
        .eq('attendance_date', todayIso)
        .maybeSingle()
      if (error) throw error
      state.attendanceDay = data
    }

    async function loadVehicleLog() {
      if (!state.attendanceDay?.id) {
        state.vehicleLog = null
        return
      }
      const { data, error } = await supabase
        .from('vehicle_operation_logs')
        .select('*')
        .eq('attendance_day_id', state.attendanceDay.id)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle()
      if (error && error.code !== 'PGRST116') throw error
      state.vehicleLog = data || null
    }

    async function loadAttendanceEvents() {
      if (!state.attendanceDay?.id) {
        state.events = []
        return
      }
      const { data, error } = await supabase
        .from('attendance_events')
        .select('*')
        .eq('attendance_day_id', state.attendanceDay.id)
        .order('event_time', { ascending: true })
      if (error) throw error
      state.events = data || []
    }

    async function loadReferenceData() {
      const [vehicles, products] = await Promise.all([
        supabase.from('vehicles').select('id, name, plate, current_odometer_km, warehouse_id, active').eq('active', true).order('name', { ascending: true }),
        supabase.from('products').select('id, name, sku, ean, base_unit').order('name', { ascending: true }).limit(120)
      ])
      if (vehicles.error) throw vehicles.error
      if (products.error) throw products.error
      state.vehicles = vehicles.data || []
      state.products = products.data || []
    }

    async function loadInstructions() {
      const { data, error } = await supabase
        .from('daily_instructions')
        .select('*')
        .eq('is_active', true)
        .order('created_at', { ascending: false })
      if (error) {
        state.instructions = []
        return
      }
      state.instructions = (data || []).filter((item) => {
        return isInstructionActiveToday(item) && instructionTargetsEmployee(item)
      }).sort((a, b) => {
        const priorityOrder = { critical: 0, important: 1, info: 2 }
        return (priorityOrder[a.priority] ?? 3) - (priorityOrder[b.priority] ?? 3)
      })

      if (!state.instructions.length) {
        state.acknowledgements = []
        return
      }

      const requiredIds = state.instructions.map((item) => item.id)
      const { data: acknowledgements, error: ackError } = await supabase
        .from('instruction_acknowledgements')
        .select('id, instruction_id, employee_id, acknowledged_at')
        .eq('employee_id', state.employee.id)
        .in('instruction_id', requiredIds)
      if (ackError) {
        state.acknowledgements = []
        return
      }
      state.acknowledgements = acknowledgements || []
    }

    async function loadServices() {
      const { data, error } = await supabase
        .from('service_requests')
        .select('id, title, description, priority, status, due_date, created_at, location_id, assigned_employee_id, service_result, work_performed, used_parts, next_recommendation, internal_service_note')
        .eq('assigned_employee_id', state.employee.id)
        .neq('status', 'cancelled')
        .order('created_at', { ascending: false })
        .limit(30)
      if (error) {
        state.services = []
        return
      }
      state.services = data || []
    }

    async function loadStockRequests() {
      state.setupWarnings = state.setupWarnings.filter((message) => !message.includes('Mobilní'))
      const { data, error } = await supabase
        .from('mobile_stock_requests')
        .select('*')
        .eq('employee_id', state.employee.id)
        .gte('requested_for_date', todayIso)
        .order('created_at', { ascending: false })
        .limit(20)
      if (error) {
        state.stockRequests = []
        state.stockRequestItems = []
        state.setupWarnings.push('Mobilní sklad ještě není připravený v databázi. Je potřeba spustit SQL přípravu pro verzi 1.6.')
        return
      }
      state.stockRequests = data || []
      const requestIds = state.stockRequests.map((request) => request.id)
      if (!requestIds.length) {
        state.stockRequestItems = []
        return
      }
      const { data: items, error: itemsError } = await supabase
        .from('mobile_stock_request_items')
        .select('*')
        .in('request_id', requestIds)
        .order('id', { ascending: true })
      if (itemsError) {
        state.stockRequestItems = []
        state.setupWarnings.push(`Mobilní položky skladových dokladů se nepodařilo načíst: ${itemsError.message}`)
        return
      }
      state.stockRequestItems = items || []
    }
